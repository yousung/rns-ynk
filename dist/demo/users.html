<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사용자 관리 - 창고 관리 시스템</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="data.js"></script><script src="shared.js"></script>
  <style id="commonStyle"></style>
  <style>
    .role-developer { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .role-super-admin { background: rgba(168,85,247,0.15); color: #c084fc; }
    .role-admin { background: rgba(0,212,255,0.15); color: var(--cyan); }
    .role-user { background: var(--bg-surface); color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="app-layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-area">
      <div class="header-bar"><h1>사용자 관리</h1></div>
      <div class="content-area">
        <div class="overflow-x-auto">
          <table>
            <thead><tr><th>이름</th><th>이메일</th><th>역할</th><th>승인상태</th><th>액션</th></tr></thead>
            <tbody id="userBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('commonStyle').textContent = getCommonStyles();
    requireAuth();
    renderLayout('users');

    const userData = [...users];

    function render() {
      document.getElementById('userBody').innerHTML = userData.map(u => {
        const roleClass = 'role-' + u.role.replace('_', '-');
        const roleBadge = `<span class="badge ${roleClass}">${getRoleText(u.role)}</span>`;
        const status = u.is_approved
          ? `<span style="color:var(--green);font-size:0.875rem;font-weight:500;">승인됨</span>`
          : `<span style="color:var(--red);font-size:0.875rem;font-weight:500;">대기중</span>`;
        const action = u.is_approved
          ? `<button style="color:var(--red);font-size:0.875rem;cursor:pointer;" onclick="toggleApprove(${u.id})">거부</button>`
          : `<button class="btn-success text-sm" style="padding:4px 10px;" onclick="toggleApprove(${u.id})">승인</button>`;
        return `<tr>
          <td>${u.name}</td>
          <td style="font-family:'JetBrains Mono',monospace;font-size:0.8rem;">${u.email}</td>
          <td>${roleBadge}</td>
          <td>${status}</td>
          <td>${action}</td>
        </tr>`;
      }).join('');
    }

    function toggleApprove(id) {
      const u = userData.find(u2 => u2.id === id);
      if (u) { u.is_approved = !u.is_approved; render(); }
    }

    render();
  </script>
</body>
</html>
