<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>입고 처리 (단면도) - 창고 관리 시스템</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../../data.js"></script>
  <script src="shared.js"></script>
  <style id="commonStyle"></style>
  <style>
    .sched-item { padding:10px 12px; border-radius:6px; cursor:pointer; transition:all 0.15s; border-left:3px solid transparent; }
    .sched-item:hover { background:var(--bg-hover); }
    .sched-item.active { background:var(--cyan-dim); border-left-color:var(--cyan); color:var(--cyan); }
    .rack-btn { padding:5px 10px; border-radius:5px; font-size:0.78rem; font-weight:600; cursor:pointer;
      border:1px solid var(--border); background:var(--bg-surface); color:var(--text-secondary); transition:all 0.15s; }
    .rack-btn:hover { border-color:var(--border-bright); color:var(--text-primary); }
    .rack-btn.active { border-color:var(--cyan); background:var(--cyan-dim); color:var(--cyan); }
    .rack-btn.has-product { border-color:var(--amber); color:var(--amber); }
    .cross-cell { cursor:pointer; transition:all 0.12s; }
    .cross-cell:hover rect { opacity:0.85; }
  </style>
</head>
<body>
  <div class="app-layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-area">
      <div class="header-bar">
        <h1>입고 처리</h1>
        <span style="font-size:0.78rem;color:var(--text-secondary);background:var(--bg-surface);padding:3px 10px;border-radius:4px;border:1px solid var(--border);">E — 단면도</span>
      </div>
      <div class="content-area">
        <!-- 창고 탭 -->
        <div style="display:flex;gap:6px;margin-bottom:16px;" id="whTabs"></div>

        <div style="display:flex;gap:16px;">
          <!-- 예정 목록 -->
          <div style="width:190px;flex-shrink:0;">
            <div class="card" style="padding:16px;">
              <h3 style="font-size:0.85rem;font-weight:700;margin-bottom:12px;">입고 예정 목록</h3>
              <div id="schedList" style="display:flex;flex-direction:column;gap:6px;"></div>
            </div>
          </div>

          <!-- 단면도 영역 -->
          <div style="flex:1;display:flex;flex-direction:column;gap:12px;min-width:0;">
            <!-- 랙 선택 -->
            <div class="card" style="padding:14px 16px;">
              <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                <span style="font-size:0.8rem;color:var(--text-secondary);font-weight:600;flex-shrink:0;">랙 선택:</span>
                <div id="rackBtns" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
              </div>
            </div>

            <!-- 단면도 SVG -->
            <div class="card" style="padding:16px;" id="sectionCard">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
                <span style="font-size:0.85rem;font-weight:700;" id="sectionTitle">랙을 선택하세요</span>
                <div style="display:flex;gap:10px;align-items:center;font-size:0.72rem;color:var(--text-secondary);">
                  <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:rgba(94,226,198,0.25);border:1px solid rgba(94,226,198,0.5);display:inline-block;"></span>빈칸</span>
                  <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;border:2px solid var(--cyan);display:inline-block;"></span>선택됨</span>
                </div>
              </div>
              <div style="overflow:auto;">
                <svg id="sectionSvg" viewBox="0 0 600 280" width="600" height="280"></svg>
              </div>
            </div>

            <!-- 입고 실행 -->
            <div id="actionCard" class="card" style="display:none;padding:16px;">
              <h4 style="font-size:0.85rem;font-weight:700;margin-bottom:8px;">입고 실행</h4>
              <p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:12px;" id="actionInfo"></p>
              <button class="btn-success" onclick="executeInbound()">입고 실행</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('commonStyle').textContent = getCommonStyles();
    requireAuth();
    renderLayout('inbound-execute');

    let selWh = 3;
    let selSchedId = null;
    let selRackId = null;
    let selSlotKey = null;

    const CELL_W = 110, CELL_H = 36, PAD_L = 48, PAD_T = 32;

    const CATEGORY_COLORS = {
      '의료용 밴드': '#60A5FA', '붕대류': '#F59E0B', '보호대류': '#34D399',
      '원단/소재': '#A78BFA', '포장재': '#22D3EE', '접착제': '#F87171',
    };

    function renderWhTabs() {
      document.getElementById('whTabs').innerHTML = warehouses.map(w =>
        `<button onclick="selWh=${w.id};selRackId=null;selSlotKey=null;renderAll()" style="padding:5px 14px;border-radius:5px;font-size:0.82rem;font-weight:600;cursor:pointer;border:1px solid ${w.id===selWh?'var(--cyan)':'var(--border)'};background:${w.id===selWh?'var(--cyan-dim)':'var(--bg-surface)'};color:${w.id===selWh?'var(--cyan)':'var(--text-secondary)'};">${w.name}</button>`
      ).join('');
    }

    function renderSchedList() {
      const pending = inboundSchedules.filter(s => s.status === 'pending');
      document.getElementById('schedList').innerHTML = pending.map(s => {
        const p = products.find(pr => pr.id === s.product_id);
        return `<div class="sched-item ${s.id===selSchedId?'active':''}" onclick="selSchedId=${s.id};selSlotKey=null;renderAll()">
          <div style="font-weight:600;font-size:0.82rem;">${p.name}</div>
          <div style="font-size:0.72rem;margin-top:2px;">${s.quantity}개 · ${s.scheduled_date}</div>
          ${s.note?`<div style="font-size:0.7rem;color:var(--amber);margin-top:2px;">${s.note}</div>`:''}
        </div>`;
      }).join('') || '<div style="font-size:0.78rem;color:var(--text-secondary);">예정 없음</div>';
    }

    function renderRackBtns() {
      const whRacks = racks.filter(r => r.warehouse_id === selWh);
      const sched = selSchedId ? inboundSchedules.find(s => s.id === selSchedId) : null;
      const productPalletIds = sched
        ? new Set(inventoryItems.filter(i => i.product_id === sched.product_id).map(i => i.pallet_id))
        : null;

      document.getElementById('rackBtns').innerHTML = whRacks.map(rack => {
        const palletsInRack = pallets.filter(p => parseInt(p.location.split('-')[0]) === rack.id);
        const hasProduct = productPalletIds && palletsInRack.some(p => productPalletIds.has(p.id));
        const cls = selRackId === rack.id ? 'active' : hasProduct ? 'has-product' : '';
        return `<button class="rack-btn ${cls}" onclick="selRackId=${rack.id};selSlotKey=null;renderAll()">R${String(rack.rack_no).padStart(2,'0')}</button>`;
      }).join('');
    }

    function renderSectionSvg() {
      if (!selRackId) {
        document.getElementById('sectionSvg').innerHTML = `<text x="300" y="140" text-anchor="middle" fill="var(--text-secondary)" font-size="13">← 위에서 랙을 선택하세요</text>`;
        return;
      }
      const rack = racks.find(r => r.id === selRackId);
      if (!rack) return;

      document.getElementById('sectionTitle').textContent = `${rack.rack_no}번 랙 단면도 — ${rack.floors}층 × ${rack.groups}칸`;

      const sched = selSchedId ? inboundSchedules.find(s => s.id === selSchedId) : null;
      const svgW = PAD_L + rack.groups * CELL_W + 20;
      const svgH = PAD_T + rack.floors * CELL_H + 28;
      document.getElementById('sectionSvg').setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);
      document.getElementById('sectionSvg').setAttribute('width', svgW);
      document.getElementById('sectionSvg').setAttribute('height', svgH);

      let svg = '';

      // Column headers (groups = depth K1~K4)
      for (let g = 1; g <= rack.groups; g++) {
        const cx = PAD_L + (g - 1) * CELL_W + CELL_W / 2;
        svg += `<text x="${cx}" y="${PAD_T - 8}" text-anchor="middle" fill="var(--text-secondary)" font-size="10" font-weight="600">K${g}</text>`;
      }
      // Direction indicator
      svg += `<text x="${PAD_L}" y="${PAD_T - 18}" fill="var(--text-secondary)" font-size="8.5" opacity="0.6">← 전면</text>`;
      svg += `<text x="${PAD_L + rack.groups * CELL_W - 2}" y="${PAD_T - 18}" text-anchor="end" fill="var(--text-secondary)" font-size="8.5" opacity="0.6">후면 →</text>`;

      // Floor labels
      for (let fl = rack.floors; fl >= 1; fl--) {
        const row = rack.floors - fl;
        const cy = PAD_T + row * CELL_H + CELL_H / 2 + 4;
        svg += `<text x="${PAD_L - 8}" y="${cy}" text-anchor="end" fill="var(--text-secondary)" font-size="10" font-weight="600">${fl}F</text>`;
      }

      // Cells
      for (let fl = rack.floors; fl >= 1; fl--) {
        const row = rack.floors - fl;
        for (let g = 1; g <= rack.groups; g++) {
          const key = `${rack.id}-${fl}-${g}`;
          const x = PAD_L + (g - 1) * CELL_W;
          const y = PAD_T + row * CELL_H;
          const pallet = pallets.find(p => p.location === key);
          const items = pallet ? inventoryItems.filter(i => i.pallet_id === pallet.id) : [];
          const isSelected = selSlotKey === key;
          const isEmpty = !pallet;

          let fillColor = 'rgba(94,226,198,0.12)';
          let strokeColor = 'rgba(94,226,198,0.3)';
          let textColor = 'var(--text-secondary)';
          let label = '빈칸';
          let sublabel = '';

          if (!isEmpty) {
            const firstItem = items[0] ? products.find(pr => pr.id === items[0].product_id) : null;
            const catColor = firstItem ? (CATEGORY_COLORS[firstItem.category] || '#60A5FA') : '#60A5FA';
            fillColor = catColor + '22';
            strokeColor = catColor + '88';
            textColor = catColor;
            label = firstItem ? firstItem.name : '상품';
            sublabel = `${items.length}종`;
          }

          if (isSelected) {
            strokeColor = 'var(--cyan)';
            fillColor = 'rgba(0,212,255,0.12)';
          }

          svg += `<g class="cross-cell" onclick="selectSlot('${key}')">
            <rect x="${x+1}" y="${y+1}" width="${CELL_W-2}" height="${CELL_H-2}" fill="${fillColor}" stroke="${strokeColor}" stroke-width="${isSelected?2:1}" rx="3"/>`;

          if (isSelected) {
            svg += `<rect x="${x+1}" y="${y+1}" width="${CELL_W-2}" height="${CELL_H-2}" fill="none" stroke="var(--cyan)" stroke-width="2" rx="3"/>`;
          }

          if (!isEmpty) {
            const truncLabel = label.length > 7 ? label.substring(0, 7) + '…' : label;
            svg += `<text x="${x + CELL_W/2}" y="${y + CELL_H/2 - 3}" text-anchor="middle" fill="${textColor}" font-size="9.5" font-weight="600">${truncLabel}</text>`;
            svg += `<text x="${x + CELL_W/2}" y="${y + CELL_H/2 + 10}" text-anchor="middle" fill="${textColor}" font-size="8.5" opacity="0.8">${sublabel}</text>`;
          } else {
            svg += `<text x="${x + CELL_W/2}" y="${y + CELL_H/2 + 4}" text-anchor="middle" fill="${textColor}" font-size="9" opacity="0.5">${label}</text>`;
          }

          svg += `</g>`;
        }
      }

      document.getElementById('sectionSvg').innerHTML = svg;
    }

    function selectSlot(key) {
      selSlotKey = selSlotKey === key ? null : key;
      renderAll();
    }

    function renderActionCard() {
      const sched = selSchedId ? inboundSchedules.find(s => s.id === selSchedId) : null;
      if (selSlotKey && sched) {
        const [rId, fl, g] = selSlotKey.split('-').map(Number);
        const rk = racks.find(r => r.id === rId);
        const prod = products.find(p => p.id === sched.product_id);
        document.getElementById('actionInfo').textContent =
          `${prod.name} ${sched.quantity}개 → ${rk.rack_no}번 랙 ${fl}층 K${g} 슬롯`;
        document.getElementById('actionCard').style.display = 'block';
      } else {
        document.getElementById('actionCard').style.display = 'none';
      }
    }

    function executeInbound() {
      if (!selSchedId || !selSlotKey) return;
      const sched = inboundSchedules.find(s => s.id === selSchedId);
      const prod = products.find(p => p.id === sched.product_id);
      alert(`✅ 입고 완료!\n${prod.name} ${sched.quantity}개 → ${selSlotKey} 위치\n(데모: 실제 저장 없음)`);
      selSchedId = null; selRackId = null; selSlotKey = null;
      renderAll();
    }

    function renderAll() {
      renderWhTabs();
      renderSchedList();
      renderRackBtns();
      renderSectionSvg();
      renderActionCard();
    }

    renderAll();
  </script>
</body>
</html>
