<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>출고 예정 - 창고 관리 시스템</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="data.js"></script>
  <script src="shared.js"></script>
  <style id="commonStyle"></style>
  <style>
    .filter-btn { padding: 7px 16px; border-radius: 6px; font-size: 0.875rem; cursor: pointer; border: 1px solid var(--border); transition: all 0.2s; }
    .filter-btn.active { background: var(--cyan-dim); color: var(--cyan); border-color: var(--cyan); box-shadow: 0 0 8px rgba(0,212,255,0.2); }
    .filter-btn:not(.active) { background: var(--bg-surface); color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="app-layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-area">
      <div class="header-bar">
        <h1>출고 예정</h1>
        <button class="btn-primary ml-auto" onclick="openAddModal()">+ 예정 등록</button>
      </div>
      <div class="content-area">
        <div class="mb-4 flex gap-2" id="filterBar"></div>
        <div class="overflow-x-auto">
          <table>
            <thead>
              <tr>
                <th>번호</th><th>상품명</th><th>수량</th><th>예정일</th><th>상태</th><th>비고</th><th>액션</th>
              </tr>
            </thead>
            <tbody id="scheduleBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('commonStyle').textContent = getCommonStyles();
    requireAuth();
    renderLayout('outbound-schedule');

    let currentFilter = 'all';

    function renderFilterBar() {
      const filters = [
        { label: '전체', value: 'all' },
        { label: '대기', value: 'pending' },
        { label: '완료', value: 'done' },
        { label: '취소', value: 'cancelled' },
      ];
      document.getElementById('filterBar').innerHTML = filters.map(f =>
        `<button class="filter-btn ${currentFilter === f.value ? 'active' : ''}" onclick="setFilter('${f.value}')">${f.label}</button>`
      ).join('');
    }

    function setFilter(val) {
      currentFilter = val;
      renderFilterBar();
      renderTable();
    }

    function renderTable() {
      const filtered = currentFilter === 'all' ? outboundSchedules : outboundSchedules.filter(s => s.status === currentFilter);
      const statusLabel = { pending: '대기', done: '완료', cancelled: '취소' };
      document.getElementById('scheduleBody').innerHTML = filtered.map(s => {
        const product = products.find(p => p.id === s.product_id);
        return `
          <tr>
            <td>${s.id}</td>
            <td>${product.name}</td>
            <td>${s.quantity}개</td>
            <td>${s.scheduled_date}</td>
            <td><span class="badge badge-${s.status}">${statusLabel[s.status]}</span></td>
            <td>${s.note || '-'}</td>
            <td>
              <a href="outbound-execute.html" class="btn-primary text-sm" style="display:inline-block;text-decoration:none;padding:4px 10px;">처리</a>
            </td>
          </tr>
        `;
      }).join('');
    }

    function openAddModal() {
      alert('데모: 등록 기능은 준비 중입니다.');
    }

    renderFilterBar();
    renderTable();
  </script>
</body>
</html>
