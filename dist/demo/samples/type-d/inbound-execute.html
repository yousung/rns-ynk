<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>입고 처리 (정면도) - 창고 관리 시스템</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../../data.js"></script>
  <script src="shared.js"></script>
  <style id="commonStyle"></style>
  <style>
    .elev-wrap { overflow: auto; }
    .sched-item { padding:10px 12px; border-radius:6px; cursor:pointer; transition:all 0.15s; border-left:3px solid transparent; }
    .sched-item:hover { background:var(--bg-hover); }
    .sched-item.active { background:var(--cyan-dim); border-left-color:var(--cyan); color:var(--cyan); }
    .slot-btn { display:inline-flex; align-items:center; justify-content:center; flex-direction:column;
      width:64px; height:52px; border-radius:6px; border:1px solid var(--border); cursor:pointer;
      font-size:0.72rem; gap:2px; transition:all 0.15s; background:var(--bg-surface); color:var(--text-secondary); }
    .slot-btn:hover { border-color:var(--border-bright); color:var(--text-primary); }
    .slot-btn.filled { background:rgba(245,158,11,0.12); border-color:rgba(245,158,11,0.4); color:var(--amber); }
    .slot-btn.selected { background:var(--cyan-dim); border-color:var(--cyan); color:var(--cyan); box-shadow:0 0 8px rgba(0,212,255,0.3); }
    .legend-dot { width:12px; height:12px; border-radius:2px; flex-shrink:0; }
  </style>
</head>
<body>
  <div class="app-layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-area">
      <div class="header-bar">
        <h1>입고 처리</h1>
        <span style="font-size:0.78rem;color:var(--text-secondary);background:var(--bg-surface);padding:3px 10px;border-radius:4px;border:1px solid var(--border);">D — 정면도</span>
      </div>
      <div class="content-area">
        <!-- 창고 탭 -->
        <div style="display:flex;gap:6px;margin-bottom:16px;" id="whTabs"></div>

        <div style="display:flex;gap:16px;">
          <!-- 예정 목록 -->
          <div style="width:190px;flex-shrink:0;">
            <div class="card" style="padding:16px;">
              <h3 style="font-size:0.85rem;font-weight:700;margin-bottom:12px;color:var(--text-primary);">입고 예정 목록</h3>
              <div id="schedList" style="display:flex;flex-direction:column;gap:6px;"></div>
            </div>
          </div>

          <!-- 정면도 + 상세 -->
          <div style="flex:1;display:flex;flex-direction:column;gap:12px;min-width:0;">
            <div class="card" style="padding:16px;">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
                <span style="font-size:0.85rem;font-weight:700;">정면도 — 랙 배치</span>
                <div style="display:flex;gap:10px;align-items:center;font-size:0.72rem;color:var(--text-secondary);">
                  <span style="display:flex;align-items:center;gap:4px;"><span class="legend-dot" style="background:rgba(94,226,198,0.35);border:1px solid rgba(94,226,198,0.5);"></span>비어있음</span>
                  <span style="display:flex;align-items:center;gap:4px;"><span class="legend-dot" style="background:rgba(0,212,255,0.4);"></span>일부 재고</span>
                  <span style="display:flex;align-items:center;gap:4px;"><span class="legend-dot" style="background:rgba(245,158,11,0.5);"></span>절반 이상</span>
                  <span style="display:flex;align-items:center;gap:4px;"><span class="legend-dot" style="background:rgba(248,113,113,0.65);"></span>가득</span>
                  <span style="display:flex;align-items:center;gap:4px;"><span class="legend-dot" style="border:2px solid var(--cyan);background:transparent;"></span>선택됨</span>
                </div>
              </div>
              <div class="elev-wrap">
                <svg id="elevSvg" viewBox="0 0 820 220" width="820" height="220"></svg>
              </div>
            </div>

            <!-- 층/슬롯 상세 -->
            <div id="slotDetailCard" class="card" style="display:none;padding:16px;">
              <h4 style="font-size:0.85rem;font-weight:700;margin-bottom:12px;" id="slotDetailTitle"></h4>
              <div id="slotGrid" style="display:flex;flex-direction:column;gap:8px;"></div>
            </div>

            <!-- 입고 실행 -->
            <div id="actionCard" class="card" style="display:none;padding:16px;">
              <h4 style="font-size:0.85rem;font-weight:700;margin-bottom:8px;">입고 실행</h4>
              <p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:12px;" id="actionInfo"></p>
              <button class="btn-success" onclick="executeInbound()">입고 실행</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('commonStyle').textContent = getCommonStyles();
    requireAuth();
    renderLayout('inbound-execute');

    let selWh = 3;
    let selSchedId = null;
    let selRackId = null;
    let selSlotKey = null;

    const RACK_W = 20, RACK_G = 4, FLOOR_H = 28, PAD_L = 40, PAD_T = 16;
    const GRP_GAP = 32, MAX_FLOORS = 6;

    function heatColor(rate) {
      if (rate <= 0) return 'rgba(94,226,198,0.25)';
      if (rate < 0.34) return 'rgba(0,212,255,0.4)';
      if (rate < 0.67) return 'rgba(245,158,11,0.5)';
      return 'rgba(248,113,113,0.65)';
    }

    function getRackX(rackNo) {
      if (rackNo <= 15) return PAD_L + (rackNo - 1) * (RACK_W + RACK_G);
      return PAD_L + 15 * (RACK_W + RACK_G) + GRP_GAP + (rackNo - 16) * (RACK_W + RACK_G);
    }

    function getFloorY(floor, maxFloor) {
      return PAD_T + (MAX_FLOORS - floor) * FLOOR_H;
    }

    function renderWhTabs() {
      document.getElementById('whTabs').innerHTML = warehouses.map(w =>
        `<button onclick="selWh=${w.id};renderAll()" style="padding:5px 14px;border-radius:5px;font-size:0.82rem;font-weight:600;cursor:pointer;border:1px solid ${w.id===selWh?'var(--cyan)':'var(--border)'};background:${w.id===selWh?'var(--cyan-dim)':'var(--bg-surface)'};color:${w.id===selWh?'var(--cyan)':'var(--text-secondary)'};">${w.name}</button>`
      ).join('');
    }

    function renderSchedList() {
      const pending = inboundSchedules.filter(s => s.status === 'pending');
      document.getElementById('schedList').innerHTML = pending.map(s => {
        const p = products.find(pr => pr.id === s.product_id);
        return `<div class="sched-item ${s.id===selSchedId?'active':''}" onclick="selSchedId=${s.id};selRackId=null;selSlotKey=null;renderAll()">
          <div style="font-weight:600;font-size:0.82rem;">${p.name}</div>
          <div style="font-size:0.72rem;margin-top:2px;">${s.quantity}개 · ${s.scheduled_date}</div>
          ${s.note?`<div style="font-size:0.7rem;color:var(--amber);margin-top:2px;">${s.note}</div>`:''}
        </div>`;
      }).join('') || '<div style="font-size:0.78rem;color:var(--text-secondary);">예정 없음</div>';
    }

    function renderElevSvg() {
      const whRacks = racks.filter(r => r.warehouse_id === selWh);
      const sched = selSchedId ? inboundSchedules.find(s => s.id === selSchedId) : null;
      const productPalletIds = sched
        ? new Set(inventoryItems.filter(i => i.product_id === sched.product_id).map(i => i.pallet_id))
        : null;

      let svg = '';

      // Floor labels (left axis)
      for (let fl = 1; fl <= MAX_FLOORS; fl++) {
        const y = getFloorY(fl, MAX_FLOORS) + FLOOR_H / 2 + 4;
        svg += `<text x="${PAD_L - 6}" y="${y}" text-anchor="end" fill="var(--text-secondary)" font-size="9">${fl}F</text>`;
      }

      // Group labels
      const grp1X = PAD_L + 7 * (RACK_W + RACK_G) + RACK_W / 2;
      const grp2X = PAD_L + 15 * (RACK_W + RACK_G) + GRP_GAP + 7 * (RACK_W + RACK_G) + RACK_W / 2;
      const labelY = PAD_T + MAX_FLOORS * FLOOR_H + 16;
      svg += `<text x="${grp1X}" y="${labelY}" text-anchor="middle" fill="var(--text-secondary)" font-size="9" opacity="0.7">전면 (R01 ~ R15)</text>`;
      svg += `<text x="${grp2X}" y="${labelY}" text-anchor="middle" fill="var(--text-secondary)" font-size="9" opacity="0.7">후면 (R16 ~ R30)</text>`;

      // Separator line
      const sepX = PAD_L + 15 * (RACK_W + RACK_G) + GRP_GAP / 2;
      svg += `<line x1="${sepX}" y1="${PAD_T}" x2="${sepX}" y2="${PAD_T + MAX_FLOORS * FLOOR_H}" stroke="var(--border)" stroke-width="1" stroke-dasharray="3,3"/>`;

      whRacks.forEach(rack => {
        const x = getRackX(rack.rack_no);
        const isSelected = rack.id === selRackId;
        const palletsInRack = pallets.filter(p => parseInt(p.location.split('-')[0]) === rack.id);
        const hasProduct = productPalletIds && palletsInRack.some(p => productPalletIds.has(p.id));

        // Draw each floor cell
        for (let fl = 1; fl <= rack.floors; fl++) {
          const y = getFloorY(fl, rack.floors);
          const palletsOnFloor = palletsInRack.filter(p => parseInt(p.location.split('-')[1]) === fl);
          const rate = rack.groups > 0 ? palletsOnFloor.length / rack.groups : 0;
          let fill = heatColor(rate);
          if (productPalletIds && palletsOnFloor.some(p => productPalletIds.has(p.id))) fill = 'rgba(0,212,255,0.45)';
          svg += `<rect x="${x}" y="${y}" width="${RACK_W}" height="${FLOOR_H - 1}" fill="${fill}" stroke="rgba(30,58,95,0.5)" stroke-width="0.5" rx="1"/>`;
        }

        // Empty floors (rack has fewer floors than MAX_FLOORS)
        for (let fl = rack.floors + 1; fl <= MAX_FLOORS; fl++) {
          const y = getFloorY(fl, MAX_FLOORS);
          svg += `<rect x="${x}" y="${y}" width="${RACK_W}" height="${FLOOR_H - 1}" fill="rgba(30,41,59,0.3)" stroke="rgba(30,58,95,0.2)" stroke-width="0.5" rx="1"/>`;
        }

        // Selection / product border
        const totalH = rack.floors * FLOOR_H;
        const topY = getFloorY(rack.floors, MAX_FLOORS);
        if (isSelected) {
          svg += `<rect x="${x - 2}" y="${topY - 2}" width="${RACK_W + 4}" height="${totalH + 4}" fill="none" stroke="var(--cyan)" stroke-width="2" rx="3"/>`;
          svg += `<rect x="${x}" y="${topY}" width="${RACK_W}" height="${totalH}" fill="rgba(0,212,255,0.06)"/>`;
        } else if (hasProduct) {
          svg += `<rect x="${x - 1}" y="${topY - 1}" width="${RACK_W + 2}" height="${totalH + 2}" fill="none" stroke="var(--amber)" stroke-width="1.5" rx="2" stroke-dasharray="4,2"/>`;
        }

        // Rack number label
        const numY = getFloorY(rack.floors, MAX_FLOORS) - 5;
        svg += `<text x="${x + RACK_W / 2}" y="${numY}" text-anchor="middle" fill="${isSelected ? 'var(--cyan)' : hasProduct ? 'var(--amber)' : 'var(--text-secondary)'}" font-size="8.5" font-weight="${isSelected ? '700' : '400'}">${rack.rack_no}</text>`;

        // Invisible click area
        svg += `<rect x="${x}" y="${PAD_T}" width="${RACK_W}" height="${MAX_FLOORS * FLOOR_H}" fill="transparent" onclick="selectRack(${rack.id})" style="cursor:pointer;"/>`;
      });

      document.getElementById('elevSvg').innerHTML = svg;
    }

    function selectRack(rackId) {
      selRackId = selRackId === rackId ? null : rackId;
      selSlotKey = null;
      renderAll();
    }

    function renderSlotDetail() {
      if (!selRackId) {
        document.getElementById('slotDetailCard').style.display = 'none';
        document.getElementById('actionCard').style.display = 'none';
        return;
      }
      const rack = racks.find(r => r.id === selRackId);
      if (!rack) return;

      document.getElementById('slotDetailTitle').textContent = `${rack.rack_no}번 랙 — 층별 슬롯 (${rack.floors}층 × ${rack.groups}칸)`;

      const sched = selSchedId ? inboundSchedules.find(s => s.id === selSchedId) : null;
      let html = '';
      for (let fl = rack.floors; fl >= 1; fl--) {
        html += `<div style="display:flex;align-items:center;gap:8px;">
          <div style="width:32px;font-size:0.75rem;font-weight:600;color:var(--text-secondary);flex-shrink:0;">${fl}F</div>
          <div style="display:flex;gap:6px;">`;
        for (let g = 1; g <= rack.groups; g++) {
          const key = `${rack.id}-${fl}-${g}`;
          const pallet = pallets.find(p => p.location === key);
          const items = pallet ? inventoryItems.filter(i => i.pallet_id === pallet.id) : [];
          const isSel = selSlotKey === key;
          const cls = isSel ? 'selected' : pallet ? 'filled' : '';
          const label = pallet ? `${items.length}종` : '빈칸';
          html += `<button class="slot-btn ${cls}" onclick="selectSlot('${key}')">
            <span style="font-size:0.72rem;">K${g}</span>
            <span style="font-size:0.68rem;">${label}</span>
          </button>`;
        }
        html += `</div></div>`;
      }
      document.getElementById('slotGrid').innerHTML = html;
      document.getElementById('slotDetailCard').style.display = 'block';

      if (selSlotKey && sched) {
        const [rId, fl, g] = selSlotKey.split('-').map(Number);
        const rk = racks.find(r => r.id === rId);
        const prod = products.find(p => p.id === sched.product_id);
        document.getElementById('actionInfo').textContent =
          `${prod.name} ${sched.quantity}개 → ${rk.rack_no}번 랙 ${fl}층 K${g} 슬롯`;
        document.getElementById('actionCard').style.display = 'block';
      } else {
        document.getElementById('actionCard').style.display = 'none';
      }
    }

    function selectSlot(key) {
      selSlotKey = selSlotKey === key ? null : key;
      renderAll();
    }

    function executeInbound() {
      if (!selSchedId || !selSlotKey) return;
      const sched = inboundSchedules.find(s => s.id === selSchedId);
      const prod = products.find(p => p.id === sched.product_id);
      alert(`✅ 입고 완료!\n${prod.name} ${sched.quantity}개 → ${selSlotKey} 위치\n(데모: 실제 저장 없음)`);
      selSchedId = null; selRackId = null; selSlotKey = null;
      renderAll();
    }

    function renderAll() {
      renderWhTabs();
      renderSchedList();
      renderElevSvg();
      renderSlotDetail();
    }

    renderAll();
  </script>
</body>
</html>
