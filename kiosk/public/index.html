<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiosk App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .container {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }
    h1 {
      color: #333;
      margin-bottom: 20px;
    }
    p {
      color: #666;
      line-height: 1.6;
    }
    .status {
      margin-top: 20px;
      padding: 10px;
      background: #e8f5e9;
      border-left: 4px solid #4caf50;
      color: #2e7d32;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎪 Kiosk App</h1>
    <p>Electron 기반 키오스크 애플리케이션</p>
    <div class="status">
      ✓ Electron 앱이 성공적으로 실행되었습니다!
    </div>
  </div>
</body>
</html>
