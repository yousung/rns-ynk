<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>재고 리스트 - 창고 관리 시스템</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="data.js"></script><script src="shared.js"></script>
  <style id="commonStyle"></style>
  <style>
    /* 뷰 토글 버튼 */
    .view-toggle {
      display: flex;
      gap: 3px;
      margin-left: auto;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 3px;
    }
    .view-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 5px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      transition: all 0.15s;
      font-family: inherit;
    }
    .view-btn.active {
      background: var(--cyan);
      color: #000;
    }
    .view-btn svg {
      width: 15px;
      height: 15px;
    }

    /* 창고 뷰 레이아웃 */
    .wh-view {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: 100%;
    }
    .wh-search-panel {
      width: 280px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .wh-search-header {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .wh-search-header input {
      width: 100%;
      padding: 6px 10px;
      font-size: 0.8rem;
    }
    .wh-product-list {
      flex: 1;
      overflow-y: auto;
    }
    .wh-product-card {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
      border-left: 3px solid transparent;
    }
    .wh-product-card:hover {
      background: var(--bg-hover);
    }
    .wh-product-card.selected {
      background: var(--cyan-dim);
      border-left-color: var(--cyan);
    }
    .wh-product-name {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    .wh-product-meta {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 2px;
      display: flex;
      gap: 8px;
    }

    /* 창고 시각화 패널 */
    .wh-visual-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .wh-tabs-row {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 6px;
      background: var(--bg-panel);
      flex-shrink: 0;
      overflow-x: auto;
    }
    .wh-tab {
      padding: 5px 14px;
      border-radius: 5px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      color: var(--text-secondary);
      transition: all 0.15s;
      white-space: nowrap;
    }
    .wh-tab.active {
      background: var(--cyan);
      color: #000;
      border-color: var(--cyan);
    }
    .wh-rack-area {
      flex: 1;
      overflow: auto;
      padding: 16px;
    }
    .wh-rack-grid {
      display: grid;
      gap: 10px;
    }
    .rack-card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px;
      transition: all 0.15s;
    }
    .rack-card:hover {
      border-color: var(--border-bright);
    }
    .rack-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 5px;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
    }
    .rack-cells {
      display: grid;
      gap: 2px;
    }
    .rack-cell {
      height: 14px;
      border-radius: 2px;
    }
    .rack-percentage {
      text-align: center;
      font-size: 0.68rem;
      margin-top: 4px;
    }

    /* 범례 */
    .wh-legend {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 8px 16px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg-panel);
      overflow-x: auto;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }
    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-area">
      <div class="header-bar">
        <h1>재고 리스트</h1>
        <div class="view-toggle">
          <button class="view-btn active" id="btnListView" onclick="showView('list')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            <span>리스트</span>
          </button>
          <button class="view-btn" id="btnWarehouseView" onclick="showView('warehouse')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>창고</span>
          </button>
        </div>
      </div>

      <!-- 리스트 뷰 -->
      <div class="content-area" id="listView">
        <div class="mb-4 flex flex-wrap items-center gap-3">
          <div class="flex items-center gap-2">
            <label style="color:var(--text-secondary);font-size:0.875rem;">검색:</label>
            <input id="searchText" type="text" placeholder="상품명/코드" oninput="renderListView()" style="padding:0.375rem 0.5rem;border:1px solid var(--border);border-radius:0.25rem;font-size:0.875rem;width:150px;">
          </div>
          <div class="flex items-center gap-2">
            <label style="color:var(--text-secondary);font-size:0.875rem;">분류:</label>
            <select id="categoryFilter" onchange="renderListView()" style="width:auto;padding:0.375rem 0.5rem;border:1px solid var(--border);border-radius:0.25rem;font-size:0.875rem;">
              <option value="">전체</option>
            </select>
          </div>
          <button onclick="resetFilters()" style="padding:0.375rem 0.75rem;background-color:var(--bg-surface);color:var(--text-secondary);border:none;border-radius:0.25rem;cursor:pointer;font-size:0.875rem;">초기화</button>
        </div>
        <div class="overflow-x-auto">
          <table>
            <thead><tr><th>상품코드</th><th>상품명</th><th>분류</th><th>총 수량</th><th>위치 수</th><th>상세</th></tr></thead>
            <tbody id="invBody"></tbody>
          </table>
        </div>
      </div>

      <!-- 창고 뷰 -->
      <div id="warehouseView" style="display:none;flex:1;overflow:hidden;flex-direction:column;">
        <div class="wh-view" style="flex:1;overflow:hidden;">
          <!-- 왼쪽: 검색 패널 -->
          <div class="wh-search-panel">
            <div class="wh-search-header">
              <input id="whSearch" type="text" placeholder="상품명/코드 검색" oninput="renderWhSearch()">
            </div>
            <div class="wh-product-list" id="whProductList"></div>
          </div>
          <!-- 오른쪽: 창고 시각화 -->
          <div class="wh-visual-panel">
            <div class="wh-tabs-row" id="whTabsRow"></div>
            <div class="wh-rack-area" id="whRackArea"></div>
            <div class="wh-legend" id="whLegend"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('commonStyle').textContent = getCommonStyles();
    requireAuth();
    renderLayout('inventory');

    // 전역 상태
    let currentView = 'list';
    let selectedWarehouseId = 1;
    let selectedProductId = null;

    // 리스트 뷰 - 분류 초기화
    function initializeCategories() {
      const categories = [...new Set(products.map(p => p.category).filter(Boolean))].sort();
      const select = document.getElementById('categoryFilter');
      categories.forEach(cat => {
        const option = document.createElement('option');
        option.value = cat;
        option.textContent = cat;
        select.appendChild(option);
      });
    }

    // 리스트 뷰 - 렌더링
    function renderListView() {
      const searchText = document.getElementById('searchText').value.toLowerCase();
      const category = document.getElementById('categoryFilter').value;

      let filtered = products;

      if (searchText) {
        filtered = filtered.filter(p =>
          p.name.toLowerCase().includes(searchText) ||
          p.code.toLowerCase().includes(searchText)
        );
      }

      if (category !== '') {
        filtered = filtered.filter(p => p.category === category);
      }

      let html = '';
      if (filtered.length === 0) {
        html = `<tr>
          <td colspan="6" style="text-align:center;padding:40px 14px;color:var(--text-secondary);">검색 결과가 없습니다.</td>
        </tr>`;
      } else {
        filtered.forEach(p => {
          const items = inventoryItems.filter(i => i.product_id === p.id);
          const total = items.reduce((s,i)=>s+i.quantity,0);
          html += `<tr>
            <td style="font-family:'JetBrains Mono',monospace;">${p.code}</td>
            <td>${p.name}</td>
            <td>${p.category || '-'}</td>
            <td>${total}개</td>
            <td>${items.length}곳</td>
            <td><button style="color:var(--cyan);font-size:0.875rem;cursor:pointer;" onclick="toggleDetail(${p.id})">상세보기</button></td>
          </tr>
          <tr id="detail-${p.id}" style="display:none;">
            <td colspan="6">
              <div style="background:var(--bg-hover);padding:12px;border-radius:4px;">
                <table><thead><tr><th>위치</th><th>입고일</th><th>수량</th></tr></thead><tbody>
                  ${items.map(item => {
                    const pl = pallets.find(pl2 => pl2.id === item.pallet_id);
                    return `<tr>
                      <td style="font-family:'JetBrains Mono',monospace;font-size:0.8rem;">${pl ? pl.location : '-'}</td>
                      <td>${item.received_at}</td>
                      <td>${item.quantity}개</td>
                    </tr>`;
                  }).join('')}
                </tbody></table>
              </div>
            </td>
          </tr>`;
        });
      }
      document.getElementById('invBody').innerHTML = html;
    }

    function toggleDetail(id) {
      const el = document.getElementById('detail-'+id);
      el.style.display = el.style.display === 'none' ? 'table-row' : 'none';
    }

    function resetFilters() {
      document.getElementById('searchText').value = '';
      document.getElementById('categoryFilter').value = '';
      document.getElementById('whSearch').value = '';
      selectedProductId = null;
      renderListView();
      renderWhSearch();
      renderWhWarehouse();
    }

    // 뷰 전환
    function showView(view) {
      currentView = view;
      document.getElementById('listView').style.display = view === 'list' ? 'block' : 'none';
      document.getElementById('warehouseView').style.display = view === 'warehouse' ? 'flex' : 'none';
      document.getElementById('btnListView').classList.toggle('active', view === 'list');
      document.getElementById('btnWarehouseView').classList.toggle('active', view === 'warehouse');
      if (view === 'warehouse') {
        renderWhSearch();
        renderWhWarehouse();
        renderWhTabs();
        renderWhLegend();
      }
    }

    // === 창고 뷰 로직 ===

    // 점유된 위치 정보 가져오기
    function getOccupiedLocations(warehouseId) {
      const warehouseRacks = racks.filter(r => r.warehouse_id === warehouseId);
      const occupied = {}; // key: rack_no, value: [{floor, group, productNames, palletId}]

      pallets.forEach(pallet => {
        const parts = pallet.location.split('-');
        if (parts.length !== 3) return;
        const rackNo = parseInt(parts[0]);
        const floor = parseInt(parts[1]);
        const group = parseInt(parts[2]);

        const rack = warehouseRacks.find(r => r.rack_no === rackNo);
        if (!rack) return;

        const key = rackNo;
        if (!occupied[key]) occupied[key] = [];

        const items = inventoryItems.filter(i => i.pallet_id === pallet.id);
        const productNames = items.map(i => {
          const p = products.find(p2 => p2.id === i.product_id);
          return p ? p.name : '';
        }).filter(Boolean);

        occupied[key].push({ floor, group, productNames, palletId: pallet.id });
      });

      return occupied;
    }

    // 채움 정도에 따른 색상 반환
    function getFillColor(ratio) {
      if (ratio === 0) return { bg: '#05101C', color: '#1E3A5F' };
      if (ratio <= 0.33) return { bg: 'rgba(16,185,129,0.3)', color: '#6EE7B7' };
      if (ratio <= 0.66) return { bg: 'rgba(245,158,11,0.35)', color: '#FCD34D' };
      if (ratio < 1) return { bg: 'rgba(239,100,50,0.4)', color: '#FCA28A' };
      return { bg: 'rgba(239,68,68,0.45)', color: '#FCA5A5' };
    }

    // 창고 탭 렌더링
    function renderWhTabs() {
      const warehouseList = warehouses.sort((a, b) => a.id - b.id);
      let html = '';
      warehouseList.forEach(wh => {
        const isActive = selectedWarehouseId === wh.id;
        html += `
          <button class="wh-tab ${isActive ? 'active' : ''}" data-wid="${wh.id}" onclick="selectWarehouseTab(${wh.id})">
            ${wh.name}
          </button>
        `;
      });
      document.getElementById('whTabsRow').innerHTML = html;
    }

    // 범례 렌더링
    function renderWhLegend() {
      const legendItems = [
        { label: '비어있음', bg: '#05101C', border: '1px solid #1E3A5F' },
        { label: '1-33%', bg: 'rgba(16,185,129,0.3)', border: 'none' },
        { label: '34-66%', bg: 'rgba(245,158,11,0.35)', border: 'none' },
        { label: '67-99%', bg: 'rgba(239,100,50,0.4)', border: 'none' },
        { label: '100%', bg: 'rgba(239,68,68,0.45)', border: 'none' },
      ];
      let html = '<span style="margin-right:4px;">채움 정도:</span>';
      legendItems.forEach(item => {
        html += `
          <div class="legend-item">
            <div class="legend-dot" style="background:${item.bg};border:${item.border};"></div>
            ${item.label}
          </div>
        `;
      });
      html += `
        <div class="legend-item" style="margin-left:8px;">
          <div class="legend-dot" style="background:rgba(0,212,255,0.4);border:1px solid var(--cyan);"></div>
          선택 상품
        </div>
      `;
      document.getElementById('whLegend').innerHTML = html;
    }

    // 창고 랙 시각화 렌더링
    function renderWhWarehouse() {
      const warehouseRacks = racks.filter(r => r.warehouse_id === selectedWarehouseId);
      const occupied = getOccupiedLocations(selectedWarehouseId);

      // 정렬 (rack_no 순서대로)
      warehouseRacks.sort((a, b) => a.rack_no - b.rack_no);

      // 그리드 설정 (모두 6열)
      const cols = 6;

      let html = `<div class="wh-rack-grid" style="grid-template-columns:repeat(${cols},1fr);">`;

      warehouseRacks.forEach(rack => {
        const totalCells = rack.floors * rack.groups;
        const occupiedCells = (occupied[rack.rack_no] || []).length;
        const ratio = totalCells > 0 ? occupiedCells / totalCells : 0;
        const { bg, color } = getFillColor(ratio);
        const pct = Math.round(ratio * 100);

        // 선택된 상품이 이 랙에 있는지 확인
        let isHighlighted = false;
        if (selectedProductId) {
          const relevantPalletIds = inventoryItems
            .filter(i => i.product_id === selectedProductId)
            .map(i => i.pallet_id);
          const occupiedList = occupied[rack.rack_no] || [];
          isHighlighted = occupiedList.some(o => relevantPalletIds.includes(o.palletId));
        }

        const border = isHighlighted ? '2px solid var(--cyan)' : '1px solid var(--border)';

        // 셀 그리드 생성 (floors × groups)
        let cellsHtml = `<div class="rack-cells" style="grid-template-columns:repeat(${rack.groups},1fr);">`;
        for (let f = rack.floors; f >= 1; f--) {
          for (let g = 1; g <= rack.groups; g++) {
            const cellOccupied = (occupied[rack.rack_no] || []).some(o => o.floor === f && o.group === g);
            const highlighted = isHighlighted && (occupied[rack.rack_no] || [])
              .filter(o => o.floor === f && o.group === g)
              .some(o => inventoryItems.filter(i => i.product_id === selectedProductId).map(i => i.pallet_id).includes(o.palletId));
            const cellBg = highlighted ? 'rgba(0,212,255,0.4)' : (cellOccupied ? bg : '#05101C');
            cellsHtml += `<div class="rack-cell" style="background:${cellBg};"></div>`;
          }
        }
        cellsHtml += '</div>';

        const productNames = (occupied[rack.rack_no] || [])
          .flatMap(o => o.productNames)
          .filter((v,i,a) => a.indexOf(v) === i)
          .slice(0, 3)
          .join('\n');
        const tooltipText = `${pct}% 사용${productNames ? '\n' + productNames : ''}`;

        html += `
          <div class="rack-card" style="border:${border};" title="${tooltipText}">
            <div class="rack-label">랙 ${rack.rack_no}</div>
            ${cellsHtml}
            <div class="rack-percentage" style="color:${color};">${pct}%</div>
          </div>
        `;
      });

      html += '</div>';
      document.getElementById('whRackArea').innerHTML = html;
    }

    // 창고 뷰 - 상품 검색 렌더링
    function renderWhSearch() {
      const query = document.getElementById('whSearch').value.toLowerCase();
      const filtered = products.filter(p =>
        p.name.toLowerCase().includes(query) || p.code.toLowerCase().includes(query)
      );

      let html = '';
      if (filtered.length === 0) {
        html = '<div style="padding:20px;text-align:center;color:var(--text-secondary);font-size:0.85rem;">검색 결과 없음</div>';
      } else {
        filtered.forEach(p => {
          const items = inventoryItems.filter(i => i.product_id === p.id);
          const total = items.reduce((s,i) => s + i.quantity, 0);
          const isSelected = selectedProductId === p.id;
          html += `
            <div class="wh-product-card ${isSelected ? 'selected' : ''}" onclick="selectProduct(${p.id})">
              <div class="wh-product-name">${p.name}</div>
              <div class="wh-product-meta">
                <span style="font-family:'JetBrains Mono',monospace;">${p.code}</span>
                <span>${total}개</span>
                <span>${items.length}곳</span>
              </div>
            </div>
          `;
        });
      }
      document.getElementById('whProductList').innerHTML = html;
    }

    // 상품 선택 토글
    function selectProduct(productId) {
      selectedProductId = selectedProductId === productId ? null : productId;
      renderWhSearch();
      renderWhWarehouse();
    }

    // 창고 탭 선택
    function selectWarehouseTab(id) {
      selectedWarehouseId = id;
      document.querySelectorAll('.wh-tab').forEach(t => {
        t.classList.toggle('active', parseInt(t.dataset.wid) === id);
      });
      renderWhWarehouse();
    }

    // 초기화
    initializeCategories();
    renderListView();
  </script>
</body>
</html>
