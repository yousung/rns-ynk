<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>출고 처리 - 창고 관리 시스템</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="data.js"></script>
  <script src="shared.js"></script>
  <style id="commonStyle"></style>
  <style>
    .content-area { padding: 0 !important; overflow: hidden !important; display: flex !important; flex-direction: column !important; }

    /* 창고 탭 - 입고와 동일 */
    .wh-tabs-row { padding: 8px 14px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; flex-shrink: 0; background: var(--bg-panel); align-items: center; }
    .wh-tab { padding: 4px 12px; border-radius: 5px; font-size: 0.8rem; cursor: pointer; border: 1px solid var(--border); background: var(--bg-surface); color: var(--text-secondary); transition: all 0.15s; }
    .wh-tab.active { background: var(--cyan); color: #000; font-weight: 700; border-color: var(--cyan); }

    /* 예정 목록 - 입고와 동일 */
    .sched-section { flex-shrink: 0; border-bottom: 1px solid var(--border); background: #080F1A; overflow: hidden; }
    .sched-scroll { display: flex; gap: 6px; padding: 8px 14px; overflow-x: auto; }
    .sched-scroll::-webkit-scrollbar { height: 4px; }
    .sched-scroll::-webkit-scrollbar-track { background: transparent; }
    .sched-scroll::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }
    .sched-card { flex-shrink: 0; padding: 7px 11px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-surface); cursor: pointer; transition: all 0.15s; min-width: 130px; }
    .sched-card:hover { border-color: var(--border-bright); background: var(--bg-hover); }
    .sched-card.selected { border-color: var(--cyan); background: var(--cyan-dim); }
    .sched-card-name { font-size: 0.82rem; font-weight: 700; color: var(--text-primary); }
    .sched-card.selected .sched-card-name { color: var(--cyan); }
    .sched-card-meta { font-size: 0.7rem; color: var(--text-secondary); margin-top: 2px; }

    .matrix-section { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; gap: 10px; padding: 10px 0; }

    /* 액션 바 */
    .action-bar { flex-shrink: 0; padding: 8px 14px; border-bottom: 1px solid var(--border); background: #0A1420; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .action-info { flex: 1; font-size: 0.82rem; color: var(--text-secondary); display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .action-highlight { color: var(--cyan); font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .btn-exec { padding: 7px 18px; border-radius: 5px; font-weight: 700; font-size: 0.85rem; cursor: pointer; border: none; background: var(--amber); color: #000; }
    .btn-exec:disabled { background: var(--bg-surface); color: #334155; cursor: not-allowed; border: 1px solid var(--border); }
    .btn-exec:not(:disabled):hover { filter: brightness(1.1); }

    /* 재고 범례 배지 */
    .lg-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; font-size: 0.72rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .lg-stock { background: rgba(59,130,246,0.2); color: #93C5FD; border: 1px solid rgba(59,130,246,0.4); }
    .lg-inbound { background: rgba(245,158,11,0.2); color: #FCD34D; border: 1px solid rgba(245,158,11,0.4); }
    .lg-outbound { background: rgba(239,68,68,0.2); color: #FCA5A5; border: 1px solid rgba(239,68,68,0.4); }
    .lg-after { background: rgba(16,185,129,0.2); color: #6EE7B7; border: 1px solid rgba(16,185,129,0.4); }

    /* 매트릭스 - 입고와 동일한 기본 셀 */
    .matrix-scroll { flex: 1 1 auto; overflow: auto; display: flex; justify-content: center; align-items: flex-start; }
    .rack-matrix { border-collapse: collapse; font-family: 'JetBrains Mono', monospace; width: max-content; margin: 0 auto; }
    .rack-matrix thead th { background: #09131F; padding: 5px 6px; text-align: center; font-size: 0.68rem; font-weight: 700; color: #5A7A9A; border: 1px solid rgba(30,58,95,0.6); white-space: nowrap; position: sticky; top: 0; z-index: 2; min-width: 42px; }
    .rack-matrix thead th:not(.label-cell) { min-width: var(--rm-cell-size, 42px); width: var(--rm-cell-size, 42px); }
    .rack-matrix tbody td:not(.label-cell) { width: var(--rm-cell-size, 42px); }
    .rack-matrix tfoot td:not(.label-cell) { width: var(--rm-cell-size, 42px); }
    .rack-matrix tfoot td { background: #06101A; padding: 4px 6px; text-align: center; font-size: 0.65rem; font-weight: 600; color: #4A6A8A; border: 1px solid rgba(30,58,95,0.4); }
    .label-cell { padding: 4px 6px; text-align: center; font-size: 0.68rem; font-weight: 700; color: #6A8AAA; background: #060F1A; white-space: nowrap; border: 1px solid rgba(30,58,95,0.5); border-right: 1px solid var(--border) !important; min-width: 50px; }
    thead .label-cell { position: sticky; top: 0; left: 0; z-index: 3; }
    tbody .label-cell { position: sticky; left: 0; z-index: 1; }
    tfoot .label-cell { position: sticky; left: 0; z-index: 1; background: #06101A; }
    .rack-matrix td { padding: 0; border: 1px solid rgba(20,40,70,0.5); }

    .rm-cell { width: 100%; aspect-ratio: 1 / 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.12s; font-size: 0.68rem; font-weight: 700; line-height: 1.2; }
    .rm-na { background: #030A14; color: #0D1F35; cursor: default; }
    .rm-empty { background: #05101C; color: #1E3A5F; }
    .rm-occupied { background: #0B1A2A; color: #3A5A7A; }

    /* FIFO 색상 */
    .rm-fifo1 { background: rgba(239,68,68,0.5); color: #FCA5A5; border: 1px solid rgba(239,68,68,0.8) !important; }
    .rm-fifo2 { background: rgba(245,158,11,0.4); color: #FCD34D; border: 1px solid rgba(245,158,11,0.7) !important; }
    .rm-fifon { background: rgba(0,212,255,0.25); color: var(--cyan); border: 1px solid rgba(0,212,255,0.5) !important; }

    .rm-cell:not(.rm-na):hover { filter: brightness(1.35); z-index: 2; transform: scale(1.08); }
    .rack-matrix tr:hover td { background: unset; }

    .rm-dummy { background: #030A14; color: #0D1F35; cursor: default; pointer-events: none; }
    .rm-dummy-th { background: #06101A; color: #0D1F35; border: 1px solid rgba(30,58,95,0.3); min-width: 42px; }

    /* 셀 상세 패널 - 하단 고정, 최대 5행 + 헤더, 초과 시 내부 스크롤 */
    .cell-details { flex: 0 0 auto; height: 200px; display: flex; flex-direction: column; border-top: 1px solid var(--border); background: #060F1A; padding: 10px 14px; }
    .cell-details .cd-empty { color: var(--text-secondary); font-size: 0.78rem; text-align: center; padding: 20px 0; }
    .cell-details .cd-header { flex: 0 0 auto; font-size: 0.82rem; font-weight: 700; color: var(--cyan); margin-bottom: 8px; font-family: 'JetBrains Mono', monospace; }
    .cell-details .cd-table-wrap { flex: 1 1 auto; overflow: auto; }
    .cell-details table.cd-table { width: 100%; border-collapse: collapse; font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; }
    .cell-details table.cd-table thead th { background: #09131F; color: #5A7A9A; padding: 4px 8px; text-align: left; border: 1px solid rgba(30,58,95,0.6); font-weight: 700; position: sticky; top: 0; z-index: 1; }
    .cell-details table.cd-table td { padding: 4px 8px; color: #8AAACC; border: 1px solid rgba(20,40,70,0.5); }
    .cell-details table.cd-table tr.cd-empty-row td { color: #3A5A7A; font-style: italic; }

    /* 통계 바 */
    .stats-bar { flex-shrink: 0; padding: 7px 14px; border-top: 1px solid var(--border); display: flex; gap: 0; background: #060F1A; }
    .stat-item { display: flex; align-items: center; gap: 5px; padding: 0 16px; border-right: 1px solid var(--border); }
    .stat-item:first-child { padding-left: 0; }
    .stat-item:last-child { border-right: none; }
    .stat-label { font-size: 0.75rem; color: var(--text-secondary); }
    .stat-value { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 0.95rem; }
    .stat-unit { font-size: 0.68rem; color: var(--text-secondary); }

    /* ── 라이트 테마 오버라이드 ── */
    [data-theme="light"] .sched-section { background: var(--bg-surface); }
    [data-theme="light"] .action-bar { background: var(--bg-hover); }
    [data-theme="light"] .rack-matrix thead th { background: var(--bg-surface); color: var(--text-secondary); border-color: var(--border); }
    [data-theme="light"] .rack-matrix tfoot td { background: var(--bg-surface); color: var(--text-secondary); border-color: var(--border); }
    [data-theme="light"] .label-cell { background: var(--bg-hover); color: var(--text-secondary); border-color: var(--border); }
    [data-theme="light"] tfoot .label-cell { background: var(--bg-hover); }
    [data-theme="light"] .rack-matrix td { border-color: var(--border); }
    [data-theme="light"] .rm-na { background: var(--bg-hover); color: var(--border-bright); }
    [data-theme="light"] .rm-empty { background: #F1F5F9; color: #94A3B8; }
    [data-theme="light"] .rm-occupied { background: #E2E8F0; color: #64748B; }
    [data-theme="light"] .stats-bar { background: var(--bg-surface); }
    [data-theme="light"] .cell-details { background: var(--bg-panel); }
    [data-theme="light"] .cell-details table.cd-table thead th { background: var(--bg-surface); color: var(--text-secondary); }
    [data-theme="light"] .cell-details table.cd-table td { color: var(--text-primary); }
    [data-theme="light"] .rm-dummy { background: var(--bg-hover); color: var(--border); }
    [data-theme="light"] .rm-dummy-th { background: var(--bg-surface); color: var(--border); }
  </style>
</head>
<body>
  <div class="app-layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-area">
      <div class="header-bar">
        <h1>출고 처리</h1>
        <div class="ab-tabs">
          <a href="../type-a/outbound-execute.html" class="ab-tab">Type A</a>
          <span class="ab-tab active">Type B</span>
        </div>
      </div>
      <div class="content-area">
        <div class="wh-tabs-row" id="whTabs"></div>
        <div class="sched-section"><div class="sched-scroll" id="schedList"></div></div>
        <div class="matrix-section">
          <div class="action-bar">
            <div class="action-info" id="actionInfo">상품을 선택하세요</div>
            <button class="btn-exec" id="btnExec" onclick="executeOutbound()" disabled>출고 실행</button>
          </div>
          <div class="matrix-scroll">
            <table class="rack-matrix" id="rackMatrix"></table>
          </div>
          <div class="cell-details" id="cellDetails">
            <div class="cd-empty">셀을 클릭하면 내용물이 여기에 표시됩니다</div>
          </div>
          <div class="stats-bar">
            <div class="stat-item">
              <span class="stat-label">현재 재고</span>
              <span class="stat-value" style="color:#60A5FA;" id="statStock">0</span>
              <span class="stat-unit">PLT</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">출고 예정</span>
              <span class="stat-value" style="color:var(--amber);" id="statPending">0</span>
              <span class="stat-unit">건</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">잔여 용량</span>
              <span class="stat-value" style="color:var(--text-secondary);" id="statRemain">0</span>
              <span class="stat-unit">PLT</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('commonStyle').textContent = getCommonStyles();
    requireAuth();
    renderLayout('outbound-execute');

    let selectedWarehouse = 1;
    let selectedScheduleId = null;
    let fifoSlots = [];

    function getWhRacks() {
      return racks.filter(r => r.warehouse_id === selectedWarehouse);
    }

    function computeFifo() {
      fifoSlots = [];
      if (!selectedScheduleId) return;

      const sched = outboundSchedules.find(s => s.id === selectedScheduleId);
      if (!sched) return;

      const whRacks = getWhRacks();
      const rackIds = new Set(whRacks.map(r => r.id));

      pallets.forEach(pallet => {
        const [rId, dan, kan] = pallet.location.split('-').map(Number);
        if (!rackIds.has(rId)) return;
        const items = inventoryItems.filter(i => i.pallet_id === pallet.id && i.product_id === sched.product_id);
        if (items.length === 0) return;
        const earliest = items.reduce((min, i) => i.received_at < min ? i.received_at : min, items[0].received_at);
        const qty = items.reduce((s, i) => s + i.quantity, 0);
        fifoSlots.push({ rackId: rId, dan, kan, key: pallet.location, received_at: earliest, qty });
      });

      fifoSlots.sort((a, b) => a.received_at.localeCompare(b.received_at));
      fifoSlots.forEach((s, i) => { s.rank = i + 1; });
    }

    function getCellFifoInfo(rackId, kan) {
      const rack = racks.find(r => r.id === rackId);
      if (kan > rack.groups) return { type: 'na' };

      let fifoRank = null;
      let fifoData = null;

      for (let dan = 1; dan <= rack.floors; dan++) {
        const key = `${rackId}-${dan}-${kan}`;
        const slot = fifoSlots.find(s => s.key === key);
        if (slot) {
          if (fifoRank === null || slot.rank < fifoRank) {
            fifoRank = slot.rank;
            fifoData = slot;
          }
        }
      }

      if (fifoData) return { type: 'fifo', rank: fifoRank, qty: fifoData.qty, received_at: fifoData.received_at };

      // 다른 재고 있는지 확인
      let hasOther = false;
      let otherQty = 0;
      let otherKinds = 0;
      for (let dan = 1; dan <= rack.floors; dan++) {
        const key = `${rackId}-${dan}-${kan}`;
        const pallet = pallets.find(p => p.location === key);
        if (pallet) {
          const items = inventoryItems.filter(i => i.pallet_id === pallet.id);
          if (items.length) {
            hasOther = true;
            otherQty += items.reduce((s, i) => s + i.quantity, 0);
            otherKinds += items.length;
          }
        }
      }
      if (hasOther) return { type: 'occupied', qty: otherQty, kinds: otherKinds };

      // 팔렛 있지만 재고 없는 경우도 occupied로 처리
      let hasPallet = false;
      for (let dan = 1; dan <= rack.floors; dan++) {
        const key = `${rackId}-${dan}-${kan}`;
        if (pallets.find(p => p.location === key)) hasPallet = true;
      }
      if (hasPallet) return { type: 'occupied', qty: 0, kinds: 0 };

      return { type: 'empty' };
    }

    function renderWhTabs() {
      document.getElementById('whTabs').innerHTML = warehouses.map(w =>
        `<button class="wh-tab ${w.id === selectedWarehouse ? 'active' : ''}" onclick="selectWarehouse(${w.id})">${w.name}</button>`
      ).join('');
    }

    function selectWarehouse(id) {
      selectedWarehouse = id;
      selectedScheduleId = null;
      fifoSlots = [];
      resetCellDetails();
      renderAll();
    }

    function resetCellDetails() {
      const panel = document.getElementById('cellDetails');
      if (panel) panel.innerHTML = '<div class="cd-empty">셀을 클릭하면 내용물이 여기에 표시됩니다</div>';
    }

    function renderScheduleList() {
      const pending = outboundSchedules.filter(s => s.status === 'pending');
      if (pending.length === 0) {
        document.getElementById('schedList').innerHTML = '<div style="font-size:0.8rem;color:var(--text-secondary);padding:8px 14px;">출고 예정 없음</div>';
        return;
      }
      document.getElementById('schedList').innerHTML = pending.map(s => {
        const p = products.find(pr => pr.id === s.product_id);
        const isSel = s.id === selectedScheduleId;
        const noteStr = s.note ? `<span style="color:var(--amber);margin-left:4px;">[${s.note}]</span>` : '';
        return `<div class="sched-card ${isSel ? 'selected' : ''}" onclick="selectSchedule(${s.id})">
          <div class="sched-card-name">${p.name}</div>
          <div class="sched-card-meta">${s.quantity}개 · ${s.scheduled_date} ${noteStr}</div>
        </div>`;
      }).join('');
    }

    function selectSchedule(id) {
      selectedScheduleId = selectedScheduleId === id ? null : id;
      computeFifo();
      renderAll();
    }

    function renderMatrix() {
      const whRacks = getWhRacks();
      if (whRacks.length === 0) {
        document.getElementById('rackMatrix').innerHTML = '<tr><td>창고 데이터 없음</td></tr>';
        return;
      }

      const maxGroups = Math.max(...whRacks.map(r => r.groups));
      // 창고 컬럼은 실제 랙 수만큼만 렌더링하고, 좌우 여백은 CSS(justify-content:center)로 센터링한다.
      const leftDummy = 0;
      const rightDummy = 0;

      // 전체 창고 중 최대 랙 수(보통 창고3)를 기준으로 셀 크기를 산출하고,
      // 작은 창고(1,2)는 동일 셀 크기로 센터링되도록 한다.
      const maxRackCount = Math.max(...warehouses.map(w => racks.filter(r => r.warehouse_id === w.id).length));
      const scrollEl = document.querySelector('.matrix-scroll');
      if (scrollEl && maxRackCount > 0) {
        const available = scrollEl.clientWidth - 60; // 라벨 컬럼 + 보더 여유
        const cellSize = Math.max(36, Math.floor(available / maxRackCount));
        scrollEl.style.setProperty('--rm-cell-size', cellSize + 'px');
      }

      let html = '<thead><tr><th class="label-cell">칸</th>';
      for (let i = 0; i < leftDummy; i++) {
        html += '<th class="rm-dummy-th">—</th>';
      }
      for (let rack of whRacks) {
        html += `<th>${rack.rack_no}번</th>`;
      }
      for (let i = 0; i < rightDummy; i++) {
        html += '<th class="rm-dummy-th">—</th>';
      }
      html += '</tr></thead><tbody>';

      // 행: 칸 (역순, 큰 숫자부터)
      for (let kan = maxGroups; kan >= 1; kan--) {
        html += `<tr><td class="label-cell">${kan}칸</td>`;
        for (let i = 0; i < leftDummy; i++) {
          html += '<td><div class="rm-cell rm-dummy">—</div></td>';
        }
        for (let rack of whRacks) {
          const info = getCellFifoInfo(rack.id, kan);
          let cls, inner;
          if (info.type === 'na') {
            cls = 'rm-na';
            inner = '—';
          } else if (info.type === 'fifo') {
            if (info.rank === 1) cls = 'rm-fifo1';
            else if (info.rank === 2) cls = 'rm-fifo2';
            else cls = 'rm-fifon';
            inner = `<span>F${info.rank}</span><span>${info.qty}개</span>`;
          } else if (info.type === 'occupied') {
            cls = 'rm-occupied';
            inner = info.kinds > 0 ? `<span>${info.kinds}종</span><span>${info.qty}개</span>` : '0';
          } else {
            cls = 'rm-empty';
            inner = '0';
          }
          const clickAttr = info.type === 'na' ? '' : ` onclick="showCellDetails(${rack.id}, ${kan})"`;
          html += `<td><div class="rm-cell ${cls}"${clickAttr}>${inner}</div></td>`;
        }
        for (let i = 0; i < rightDummy; i++) {
          html += '<td><div class="rm-cell rm-dummy">—</div></td>';
        }
        html += '</tr>';
      }

      html += '</tbody><tfoot>';
      // 랙번호 행
      html += '<tr><td class="label-cell">랙번호</td>';
      for (let i = 0; i < leftDummy; i++) {
        html += '<td style="background:#030A14;border:1px solid rgba(30,58,95,0.3);">—</td>';
      }
      for (let rack of whRacks) {
        html += `<td>${rack.rack_no}</td>`;
      }
      for (let i = 0; i < rightDummy; i++) {
        html += '<td style="background:#030A14;border:1px solid rgba(30,58,95,0.3);">—</td>';
      }
      html += '</tr>';

      // 단수 행
      html += '<tr><td class="label-cell">단수</td>';
      for (let i = 0; i < leftDummy; i++) {
        html += '<td style="background:#030A14;border:1px solid rgba(30,58,95,0.3);">—</td>';
      }
      for (let rack of whRacks) {
        html += `<td>${rack.floors}</td>`;
      }
      for (let i = 0; i < rightDummy; i++) {
        html += '<td style="background:#030A14;border:1px solid rgba(30,58,95,0.3);">—</td>';
      }
      html += '</tr>';

      // 유효공간 행
      html += '<tr><td class="label-cell">유효공간</td>';
      for (let i = 0; i < leftDummy; i++) {
        html += '<td style="background:#030A14;border:1px solid rgba(30,58,95,0.3);">—</td>';
      }
      for (let rack of whRacks) {
        const totalSlots = rack.floors * rack.groups;
        const filledSlots = pallets.filter(p => {
          const [rId] = p.location.split('-').map(Number);
          return rId === rack.id;
        }).length;
        const emptySlots = totalSlots - filledSlots;
        html += `<td>${emptySlots}</td>`;
      }
      for (let i = 0; i < rightDummy; i++) {
        html += '<td style="background:#030A14;border:1px solid rgba(30,58,95,0.3);">—</td>';
      }
      html += '</tr>';
      html += '</tfoot>';

      document.getElementById('rackMatrix').innerHTML = html;
    }

    function updateActionBar() {
      const actionEl = document.getElementById('actionInfo');
      if (!selectedScheduleId) {
        actionEl.innerHTML = '상품을 선택하세요';
        return;
      }

      const sched = outboundSchedules.find(s => s.id === selectedScheduleId);
      const prod = products.find(p => p.id === sched.product_id);

      let html = `<span>출고: <span class="action-highlight">${prod.name} ${sched.quantity}개</span>`;
      if (sched.note) html += ` · <span class="action-highlight">${sched.note}</span>`;
      html += '</span>';

      if (fifoSlots.length > 0) {
        const top = fifoSlots[0];
        const totalAvailable = fifoSlots.reduce((sum, s) => sum + s.qty, 0);
        const rack = racks.find(r => r.id === top.rackId);
        html += ` | <span class="action-highlight">FIFO F${top.rank}: ${rack.rack_no}번 랙 · ${top.kan}칸 · ${top.dan}단 (${top.qty}개)</span>`;
        if (totalAvailable < sched.quantity) {
          html += ` <span style="color:var(--red);font-weight:700;">⚠ 재고 부족: ${totalAvailable}/${sched.quantity}개</span>`;
        }
      }

      const legend = calcStockLegend();
      html += ' | ';
      html += `<span class="lg-badge lg-stock">현재 ${legend.stock}개</span>`;
      html += `<span class="lg-badge lg-inbound">입고예정 ${legend.inbound}개</span>`;
      html += `<span class="lg-badge lg-outbound">출고수량 ${legend.outbound}개</span>`;
      html += `<span class="lg-badge lg-after">출고후잔여 ${legend.after}개</span>`;

      actionEl.innerHTML = html;
    }

    function calcStockLegend() {
      const whRacks = getWhRacks();
      const rackIds = new Set(whRacks.map(r => r.id));

      const totalItems = inventoryItems.filter(i => {
        const p = pallets.find(pl => pl.id === i.pallet_id);
        return p && rackIds.has(parseInt(p.location.split('-')[0]));
      }).reduce((s, i) => s + i.quantity, 0);

      const inboundPending = inboundSchedules
        .filter(s => s.status === 'pending')
        .reduce((sum, s) => sum + s.quantity, 0);

      const outboundQty = selectedScheduleId
        ? (outboundSchedules.find(s => s.id === selectedScheduleId)?.quantity ?? 0)
        : 0;

      return {
        stock: totalItems,
        inbound: inboundPending,
        outbound: outboundQty,
        after: Math.max(0, totalItems - outboundQty)
      };
    }

    function updateStats() {
      const whRacks = getWhRacks();
      const rackIds = new Set(whRacks.map(r => r.id));
      const filledPallets = pallets.filter(p => rackIds.has(parseInt(p.location.split('-')[0]))).length;
      const totalSlots = whRacks.reduce((s, r) => s + r.floors * r.groups, 0);
      const pendingCnt = outboundSchedules.filter(s => s.status === 'pending').length;

      document.getElementById('statStock').textContent = filledPallets;
      document.getElementById('statPending').textContent = pendingCnt;
      document.getElementById('statRemain').textContent = totalSlots - filledPallets;
    }

    function updateExecBtn() {
      if (!selectedScheduleId || fifoSlots.length === 0) {
        document.getElementById('btnExec').disabled = true;
        return;
      }
      const sched = outboundSchedules.find(s => s.id === selectedScheduleId);
      const totalAvailable = fifoSlots.reduce((sum, s) => sum + s.qty, 0);
      document.getElementById('btnExec').disabled = totalAvailable < sched.quantity;
    }

    function showCellDetails(rackId, kan) {
      const rack = racks.find(r => r.id === rackId);
      const panel = document.getElementById('cellDetails');
      if (!rack || !panel) return;

      const rows = [];
      // 아래층부터 위층 순으로 표시
      for (let dan = 1; dan <= rack.floors; dan++) {
        const loc = `${rackId}-${dan}-${kan}`;
        const pallet = pallets.find(p => p.location === loc);
        if (!pallet) {
          rows.push(`<tr class="cd-empty-row"><td>${dan}단</td><td colspan="4">(빈 슬롯)</td></tr>`);
          continue;
        }
        const items = inventoryItems.filter(i => i.pallet_id === pallet.id);
        if (items.length === 0) {
          rows.push(`<tr class="cd-empty-row"><td>${dan}단</td><td colspan="4">(팔레트 비어있음)</td></tr>`);
          continue;
        }
        items.forEach((it, idx) => {
          const prod = products.find(p => p.id === it.product_id);
          const name = prod ? prod.name : `상품#${it.product_id}`;
          const code = prod ? (prod.code || '') : '';
          const received = it.received_at ? it.received_at.substring(0, 10) : '-';
          rows.push(`<tr>
            <td>${idx === 0 ? `${dan}단` : ''}</td>
            <td>${code}</td>
            <td>${name}</td>
            <td style="text-align:right;">${it.quantity}개</td>
            <td>${received}</td>
          </tr>`);
        });
      }

      const header = `창고 ${selectedWarehouse} · ${rack.rack_no}번 랙 · ${kan}칸`;
      panel.innerHTML = `
        <div class="cd-header">${header}</div>
        <div class="cd-table-wrap">
          <table class="cd-table">
            <thead><tr><th style="width:50px;">단</th><th style="width:90px;">코드</th><th>상품명</th><th style="width:70px;">수량</th><th style="width:110px;">입고일</th></tr></thead>
            <tbody>${rows.join('')}</tbody>
          </table>
        </div>
      `;
    }

    function executeOutbound() {
      if (!selectedScheduleId || fifoSlots.length === 0) return;
      const s = outboundSchedules.find(x => x.id === selectedScheduleId);
      const p = products.find(x => x.id === s.product_id);
      const topSlots = fifoSlots.slice(0, 3).map(sl => {
        const rack = racks.find(r => r.id === sl.rackId);
        return `  F${sl.rank}: ${rack.rack_no}번 랙 · ${sl.kan}칸 · ${sl.dan}단 (${sl.qty}개)`;
      }).join('\n');
      alert(`✅ 출고 완료!\n${p.name} ${s.quantity}개 출고\n\nFIFO 출고 위치:\n${topSlots}\n\n(데모: 실제 저장 없음)`);
      selectedScheduleId = null;
      fifoSlots = [];
      renderAll();
    }

    function renderAll() {
      renderWhTabs();
      renderScheduleList();
      computeFifo();
      renderMatrix();
      updateActionBar();
      updateStats();
      updateExecBtn();
    }

    renderAll();
    // 레이아웃 확정 후 셀 크기 재계산
    requestAnimationFrame(() => renderMatrix());
    window.addEventListener('resize', () => renderMatrix());
  </script>
</body>
</html>
