<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>입고 처리 - 창고 관리 시스템</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="data.js"></script>
  <script src="shared.js"></script>
  <style id="commonStyle"></style>
  <style>
    /* Full-height content area */
    .content-area { padding: 0 !important; overflow: hidden !important; display: flex !important; flex-direction: column !important; }

    /* Warehouse tabs */
    .wh-tabs-row { padding: 8px 14px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; flex-shrink: 0; background: var(--bg-panel); align-items: center; height: auto; }
    .wh-tab { padding: 4px 12px; border-radius: 5px; font-size: 0.8rem; cursor: pointer; border: 1px solid var(--border); background: var(--bg-surface); color: var(--text-secondary); transition: all 0.15s; }
    .wh-tab.active { background: var(--cyan); color: #000; font-weight: 700; border-color: var(--cyan); }

    /* Schedule section */
    .sched-section { flex-shrink: 0; border-bottom: 1px solid var(--border); background: #080F1A; overflow: hidden; }
    .sched-scroll { display: flex; gap: 6px; padding: 8px 14px; overflow-x: auto; }
    .sched-scroll::-webkit-scrollbar { height: 4px; }
    .sched-scroll::-webkit-scrollbar-track { background: transparent; }
    .sched-scroll::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }
    .sched-card { flex-shrink: 0; padding: 7px 11px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-surface); cursor: pointer; transition: all 0.15s; min-width: 130px; }
    .sched-card:hover { border-color: var(--border-bright); background: var(--bg-hover); }
    .sched-card.selected { border-color: var(--cyan); background: var(--cyan-dim); }
    .sched-card-name { font-size: 0.82rem; font-weight: 700; color: var(--text-primary); }
    .sched-card.selected .sched-card-name { color: var(--cyan); }
    .sched-card-meta { font-size: 0.7rem; color: var(--text-secondary); margin-top: 2px; display: flex; gap: 4px; }
    .sched-note { color: var(--amber); font-weight: 600; }

    /* Matrix section */
    .matrix-section { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; gap: 10px; padding: 10px 0; }

    /* Action bar */
    .action-bar { flex-shrink: 0; padding: 8px 14px; border-bottom: 1px solid var(--border); background: #0A1420; display: flex; align-items: center; gap: 10px; height: auto; }
    .action-info { flex: 1; font-size: 0.82rem; color: var(--text-secondary); display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .action-highlight { color: var(--cyan); font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .dan-selector { display: flex; gap: 4px; align-items: center; }
    .dan-btn { padding: 2px 8px; border-radius: 3px; font-size: 0.72rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; cursor: pointer; border: 1px solid var(--border); background: var(--bg-surface); color: var(--text-secondary); transition: all 0.12s; }
    .dan-btn:hover:not(:disabled) { border-color: var(--border-bright); color: var(--text-primary); }
    .dan-btn.active { background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); }
    .dan-btn.occupied { opacity: 0.35; cursor: not-allowed; }
    .btn-exec { padding: 7px 18px; border-radius: 5px; font-weight: 700; font-size: 0.85rem; cursor: pointer; border: none; background: #10B981; color: #000; flex-shrink: 0; transition: all 0.15s; }
    .btn-exec:disabled { background: var(--bg-surface); color: #334155; cursor: not-allowed; }
    .btn-exec:not(:disabled):hover { filter: brightness(1.1); }

    /* Matrix scroll */
    .matrix-scroll { display: flex; justify-content: center; align-items: flex-start; overflow: auto; flex: 1 1 auto; }
    .rack-matrix { border-collapse: collapse; font-family: 'JetBrains Mono', monospace; width: max-content; margin: 0 auto; }
    .rack-matrix thead th { background: #09131F; padding: 5px 6px; text-align: center; font-size: 0.68rem; font-weight: 700; color: #5A7A9A; border: 1px solid rgba(30,58,95,0.6); white-space: nowrap; position: sticky; top: 0; z-index: 2; }
    .rack-matrix thead th:not(.label-cell) { min-width: var(--rm-cell-size, 42px); width: var(--rm-cell-size, 42px); }
    .rack-matrix tbody td:not(.label-cell) { width: var(--rm-cell-size, 42px); }
    .rack-matrix tfoot td { background: #06101A; padding: 4px 6px; text-align: center; font-size: 0.65rem; font-weight: 600; color: #4A6A8A; border: 1px solid rgba(30,58,95,0.4); white-space: nowrap; }
    .rack-matrix tfoot td:not(.label-cell) { width: var(--rm-cell-size, 42px); }
    .label-cell { padding: 4px 6px; text-align: center; font-size: 0.68rem; font-weight: 700; color: #6A8AAA; background: #060F1A; white-space: nowrap; border: 1px solid rgba(30,58,95,0.5); border-right: 1px solid var(--border) !important; min-width: 50px; }
    thead .label-cell { position: sticky; top: 0; left: 0; z-index: 3; }
    tbody .label-cell { position: sticky; left: 0; z-index: 1; }
    tfoot .label-cell { position: sticky; left: 0; z-index: 1; background: #06101A; }
    .rack-matrix td { padding: 0; border: 1px solid rgba(20,40,70,0.5); }

    /* Rack matrix cells */
    .rm-cell { width: 100%; aspect-ratio: 1 / 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.12s; font-size: 0.68rem; font-weight: 700; line-height: 1.2; }
    .rm-na { background: #030A14; color: #0D1F35; cursor: default; }
    .rm-empty { background: #05101C; color: #1E3A5F; }
    .rm-empty:hover { background: #0A1A2E; }
    .rm-fill-1 { background: rgba(30,80,200,0.2); color: #7BAAE8; }
    .rm-fill-2 { background: rgba(30,80,200,0.4); color: #AACCF8; }
    .rm-fill-3 { background: rgba(30,80,200,0.65); color: #D0E4FF; }
    .rm-full { background: rgba(30,80,200,0.88); color: #EFF6FF; }
    .rm-selected { background: rgba(0,212,255,0.22) !important; color: var(--cyan) !important; outline: 2px solid var(--cyan); outline-offset: -1px; }
    .rm-cell:not(.rm-na):hover { filter: brightness(1.4); z-index: 2; transform: scale(1.08); }

    /* Stats bar */
    .stats-bar { flex-shrink: 0; padding: 7px 14px; border-top: 1px solid var(--border); display: flex; gap: 0; background: #060F1A; }
    .stat-item { display: flex; align-items: center; gap: 5px; padding: 0 16px; border-right: 1px solid var(--border); }
    .stat-item:first-child { padding-left: 0; }
    .stat-item:last-child { border-right: none; }
    .stat-label { font-size: 0.75rem; color: var(--text-secondary); }
    .stat-value { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 0.95rem; }
    .stat-unit { font-size: 0.68rem; color: var(--text-secondary); }

    /* Disable row hover effect */
    .rack-matrix tr:hover td { background: unset; }

    /* Dummy cells for equal column alignment */
    .rm-dummy { background: #030A14; color: #0D1F35; cursor: default; pointer-events: none; }
    .rm-dummy-th { background: #06101A; color: #0D1F35; border: 1px solid rgba(30,58,95,0.3) !important; min-width: 42px; }

    /* ── 라이트 테마 오버라이드 ── */
    [data-theme="light"] .sched-section { background: var(--bg-surface); }
    [data-theme="light"] .action-bar { background: var(--bg-hover); }
    [data-theme="light"] .rack-matrix thead th { background: var(--bg-surface); color: var(--text-secondary); border-color: var(--border); }
    [data-theme="light"] .rack-matrix tfoot td { background: var(--bg-surface); color: var(--text-secondary); border-color: var(--border); }
    [data-theme="light"] .label-cell { background: var(--bg-hover); color: var(--text-secondary); border-color: var(--border); }
    [data-theme="light"] tfoot .label-cell { background: var(--bg-hover); }
    [data-theme="light"] .rack-matrix td { border-color: var(--border); }
    [data-theme="light"] .rm-na { background: var(--bg-hover); color: var(--border-bright); }
    [data-theme="light"] .rm-empty { background: #F1F5F9; color: #94A3B8; }
    [data-theme="light"] .rm-empty:hover { background: #E2E8F0; }
    [data-theme="light"] .rm-fill-1 { background: rgba(59,130,246,0.15); color: #2563EB; }
    [data-theme="light"] .rm-fill-2 { background: rgba(59,130,246,0.3); color: #1D4ED8; }
    [data-theme="light"] .rm-fill-3 { background: rgba(59,130,246,0.5); color: #1E40AF; }
    [data-theme="light"] .rm-full { background: rgba(59,130,246,0.75); color: #DBEAFE; }
    [data-theme="light"] .stats-bar { background: var(--bg-surface); }
    [data-theme="light"] .cell-details { background: var(--bg-panel); }
    [data-theme="light"] .cell-details table.cd-table thead th { background: var(--bg-surface); color: var(--text-secondary); }
    [data-theme="light"] .cell-details table.cd-table tbody tr:hover td { background: var(--bg-hover); }
    [data-theme="light"] .cd-dan-header { background: var(--bg-surface); color: var(--amber); }
    [data-theme="light"] .rm-dummy { background: var(--bg-hover); color: var(--border); }
    [data-theme="light"] .rm-dummy-th { background: var(--bg-surface); color: var(--border); }

    /* Cell detail panel */
    .cell-details { flex: 0 0 auto; height: 200px; display: flex; flex-direction: column; border-top: 1px solid var(--border); background: #060F1A; padding: 10px 14px; }
    .cell-details .cd-empty { color: var(--text-secondary); font-size: 0.78rem; text-align: center; padding: 20px 0; }
    .cell-details .cd-header { flex: 0 0 auto; font-size: 0.82rem; font-weight: 700; color: var(--cyan); margin-bottom: 8px; font-family: 'JetBrains Mono', monospace; }
    .cell-details .cd-table-wrap { flex: 1 1 auto; overflow: auto; }
    .cell-details table.cd-table { width: 100%; border-collapse: collapse; font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; }
    .cell-details table.cd-table thead th { background: #09131F; padding: 5px 8px; text-align: left; font-size: 0.7rem; font-weight: 700; color: #5A7A9A; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1; }
    .cell-details table.cd-table tbody td { padding: 4px 8px; border-bottom: 1px solid rgba(30,58,95,0.3); color: var(--text-primary); }
    .cell-details table.cd-table tbody tr:hover td { background: #0A1420; }
    .cd-dan-header { font-size: 0.72rem; font-weight: 700; color: var(--amber); padding: 4px 8px; background: #0A1828; border-left: 2px solid var(--amber); }
  </style>
</head>
<body>
  <div class="app-layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-area">
      <div class="header-bar">
        <h1>입고 처리</h1>
        <div class="ab-tabs">
          <a href="../type-a/inbound-execute.html" class="ab-tab">Type A</a>
          <span class="ab-tab active">Type B</span>
        </div>
      </div>
      <div class="content-area">
        <!-- 창고 탭 -->
        <div class="wh-tabs-row" id="whTabs"></div>

        <!-- 입고 예정 목록 (가로 스크롤) -->
        <div class="sched-section">
          <div class="sched-scroll" id="schedList"></div>
        </div>

        <!-- 매트릭스 섹션 -->
        <div class="matrix-section">
          <!-- 액션 바 -->
          <div class="action-bar">
            <div class="action-info" id="actionInfo">...</div>
            <button class="btn-exec" id="btnExec" onclick="executeInbound()" disabled>입고 실행</button>
          </div>

          <!-- 매트릭스 테이블 (스크롤 가능) -->
          <div class="matrix-scroll">
            <table class="rack-matrix" id="rackMatrix"></table>
          </div>

          <!-- 셀 상세 패널 -->
          <div class="cell-details" id="cellDetails">
            <div class="cd-empty">셀을 클릭하면 내용물이 여기에 표시됩니다</div>
          </div>

          <!-- 통계 바 -->
          <div class="stats-bar">
            <div class="stat-item">
              <span class="stat-label">현재 입고</span>
              <span class="stat-value" style="color:var(--cyan);" id="statFilled">0</span>
              <span class="stat-unit">PLT</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">잔여 공간</span>
              <span class="stat-value" style="color:var(--amber);" id="statRemain">0</span>
              <span class="stat-unit">PLT</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">전체 용량</span>
              <span class="stat-value" style="color:var(--text-secondary);" id="statTotal">0</span>
              <span class="stat-unit">PLT</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('commonStyle').textContent = getCommonStyles();
    requireAuth();
    renderLayout('inbound-execute');

    // 상태
    let selectedWarehouse = 1;
    let selectedScheduleId = null;
    let selectedCell = null; // { rackId, kan, dan }

    // 유틸
    function getWhRacks() { return racks.filter(r => r.warehouse_id === selectedWarehouse); }
    function getMaxGroups() { return Math.max(...getWhRacks().map(r => r.groups)); }

    function getCellInfo(rackId, kan) {
      const rack = racks.find(r => r.id === rackId);
      const occupiedDans = [];
      const productSet = new Set();
      let totalQty = 0;
      for (let dan = 1; dan <= rack.floors; dan++) {
        const key = `${rackId}-${dan}-${kan}`;
        const pallet = pallets.find(p => p.location === key);
        if (pallet) {
          occupiedDans.push(dan);
          inventoryItems.filter(i => i.pallet_id === pallet.id).forEach(i => {
            productSet.add(i.product_id);
            totalQty += i.quantity;
          });
        }
      }
      return { occupied: occupiedDans.length, total: rack.floors, occupiedDans, productTypes: productSet.size, totalQty };
    }

    // 창고 탭
    function renderWhTabs() {
      document.getElementById('whTabs').innerHTML = warehouses.map(w =>
        `<button class="wh-tab ${w.id === selectedWarehouse ? 'active' : ''}" onclick="selectWarehouse(${w.id})">${w.name}</button>`
      ).join('');
    }

    function selectWarehouse(id) {
      selectedWarehouse = id;
      selectedCell = null;
      selectedScheduleId = null;
      resetCellDetails();
      renderAll();
    }

    function resetCellDetails() {
      const panel = document.getElementById('cellDetails');
      if (panel) panel.innerHTML = '<div class="cd-empty">셀을 클릭하면 내용물이 여기에 표시됩니다</div>';
    }

    // 예정 목록 (가로 스크롤 카드)
    function renderScheduleList() {
      const pending = inboundSchedules.filter(s => s.status === 'pending');
      if (pending.length === 0) {
        document.getElementById('schedList').innerHTML = '<div style="padding:8px 14px;font-size:0.8rem;color:var(--text-secondary);">입고 예정 없음</div>';
        return;
      }
      document.getElementById('schedList').innerHTML = pending.map(s => {
        const p = products.find(pr => pr.id === s.product_id);
        const isSel = s.id === selectedScheduleId;
        const noteHtml = s.note ? `<span class="sched-note">${s.note}</span>` : '';
        return `<div class="sched-card ${isSel ? 'selected' : ''}" onclick="selectSchedule(${s.id})">
          <div class="sched-card-name">${p.name}</div>
          <div class="sched-card-meta">
            <span>${s.quantity}개</span>
            <span>${s.scheduled_date}</span>
            ${noteHtml}
          </div>
        </div>`;
      }).join('');
    }

    function selectSchedule(id) {
      selectedScheduleId = selectedScheduleId === id ? null : id;
      renderScheduleList();
      renderActionBar();
      updateExecBtn();
    }

    // 매트릭스 테이블
    function renderMatrix() {
      const whRacks = getWhRacks();
      const maxGroups = getMaxGroups();

      // 창고3(가장 많은 랙) 기준으로 셀 크기를 계산해 화면 폭을 꽉 채운다.
      const maxRackCount = Math.max(...warehouses.map(w => racks.filter(r => r.warehouse_id === w.id).length));
      const scrollEl = document.querySelector('.matrix-scroll');
      if (scrollEl && maxRackCount > 0) {
        const available = scrollEl.clientWidth - 60;
        const cellSize = Math.max(36, Math.floor(available / maxRackCount));
        scrollEl.style.setProperty('--rm-cell-size', cellSize + 'px');
      }

      let html = '<thead><tr>';
      html += '<th class="label-cell">칸</th>';

      for (const rack of whRacks) {
        html += `<th>R${rack.rack_no}</th>`;
      }

      html += '</tr></thead><tbody>';

      // 칸번호 역순: maxGroups → 1
      for (let kan = maxGroups; kan >= 1; kan--) {
        html += '<tr>';
        html += `<td class="label-cell">칸${kan}</td>`;

        for (const rack of whRacks) {
          if (kan > rack.groups) {
            html += `<td><div class="rm-cell rm-na"></div></td>`;
          } else {
            const { occupied, total, occupiedDans, productTypes, totalQty } = getCellInfo(rack.id, kan);
            const isSelected = selectedCell && selectedCell.rackId === rack.id && selectedCell.kan === kan;

            let cls = 'rm-empty';
            let inner = '0';
            if (occupied > 0) {
              if (occupied === 1)       cls = 'rm-fill-1';
              else if (occupied === 2)  cls = 'rm-fill-2';
              else if (occupied === 3)  cls = 'rm-fill-3';
              else                      cls = 'rm-full';
              inner = productTypes > 0 ? `<span>${productTypes}종</span><span>${totalQty}개</span>` : '0';
            }
            if (isSelected) cls += ' rm-selected';

            html += `<td><div class="rm-cell ${cls}" onclick="selectCell(${rack.id},${kan})">${inner}</div></td>`;
          }
        }

        html += '</tr>';
      }

      html += '</tbody><tfoot>';

      // 랙번호 행
      html += '<tr class="footer-row"><td class="label-cell">랙번호</td>';
      for (const rack of whRacks) {
        html += `<td>${rack.rack_no}</td>`;
      }
      html += '</tr>';

      // 단수 행
      html += '<tr class="footer-row"><td class="label-cell">단수</td>';
      for (const rack of whRacks) {
        html += `<td>${rack.floors}</td>`;
      }
      html += '</tr>';

      // 유효공간 행 (floors * groups)
      html += '<tr class="footer-row"><td class="label-cell">유효공간</td>';
      for (const rack of whRacks) {
        const capacity = rack.floors * rack.groups;
        html += `<td>${capacity}</td>`;
      }

      html += '</tr>';

      html += '</tfoot>';
      document.getElementById('rackMatrix').innerHTML = html;
    }

    function selectCell(rackId, kan) {
      const rack = racks.find(r => r.id === rackId);
      if (kan > rack.groups) return;

      const { occupied, total, occupiedDans, productTypes, totalQty } = getCellInfo(rackId, kan);

      // 이미 같은 셀이면 토글
      if (selectedCell && selectedCell.rackId === rackId && selectedCell.kan === kan) {
        selectedCell = null;
        resetCellDetails();
        renderAll();
        return;
      }

      // 상세 패널 항상 표시 (빈 셀이든 아니든)
      showCellDetails(rackId, kan);

      // 빈 단 찾기
      const emptyDans = [];
      for (let dan = 1; dan <= total; dan++) {
        if (!occupiedDans.includes(dan)) emptyDans.push(dan);
      }

      if (emptyDans.length === 0) {
        alert('이 위치는 이미 가득 찼습니다.');
        return;
      }

      // 가장 낮은 단번호 선택
      selectedCell = { rackId, kan, dan: emptyDans[0] };
      renderAll();
    }

    // 셀 상세 패널 (단별 적재 목록)
    function showCellDetails(rackId, kan) {
      const panel = document.getElementById('cellDetails');
      if (!panel) return;
      const rack = racks.find(r => r.id === rackId);
      const wh = warehouses.find(w => w.id === rack.warehouse_id);

      let rows = '';
      let totalKinds = 0;
      let totalQty = 0;
      const seenProducts = new Set();

      for (let dan = 1; dan <= rack.floors; dan++) {
        const key = `${rackId}-${dan}-${kan}`;
        const pallet = pallets.find(p => p.location === key);
        if (!pallet) continue;
        const items = inventoryItems.filter(i => i.pallet_id === pallet.id);
        if (items.length === 0) continue;
        rows += `<tr><td colspan="4" class="cd-dan-header">${dan}단 · 팔레트 #${pallet.id}</td></tr>`;
        items.forEach(it => {
          const pr = products.find(p => p.id === it.product_id);
          seenProducts.add(it.product_id);
          totalQty += it.quantity;
          rows += `<tr><td>${pr.code}</td><td>${pr.name}</td><td style="text-align:right;">${it.quantity}</td><td style="color:var(--text-secondary);">${it.received_at}</td></tr>`;
        });
      }
      totalKinds = seenProducts.size;

      if (rows === '') {
        panel.innerHTML = `<div class="cd-header">${wh.name} · ${rack.rack_no}번 랙 · ${kan}칸 (비어 있음)</div><div class="cd-empty">적재된 팔레트가 없습니다</div>`;
        return;
      }

      panel.innerHTML = `
        <div class="cd-header">${wh.name} · ${rack.rack_no}번 랙 · ${kan}칸 · ${totalKinds}종 ${totalQty}개</div>
        <div class="cd-table-wrap">
          <table class="cd-table">
            <thead><tr><th>상품코드</th><th>상품명</th><th style="text-align:right;">수량</th><th>입고일</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    function selectDan(dan) {
      if (!selectedCell) return;
      selectedCell.dan = dan;
      renderActionBar();
    }

    // 액션 바
    function renderActionBar() {
      const info = document.getElementById('actionInfo');
      let html = '';

      if (selectedScheduleId) {
        const s = inboundSchedules.find(x => x.id === selectedScheduleId);
        const p = products.find(x => x.id === s.product_id);
        html += `<span>입고: <span class="action-highlight">${p.name} ${s.quantity}개</span> · ${s.scheduled_date}</span>`;
      } else {
        html += `<span style="color:#334155;">← 예정 목록에서 항목 선택</span>`;
      }

      if (selectedCell) {
        const rack = racks.find(r => r.id === selectedCell.rackId);
        const { total, occupiedDans, productTypes, totalQty } = getCellInfo(selectedCell.rackId, selectedCell.kan);

        // 단 선택 버튼들
        let danBtns = '';
        for (let dan = 1; dan <= total; dan++) {
          const isOccupied = occupiedDans.includes(dan);
          const isActive = selectedCell.dan === dan;
          const cls = `dan-btn ${isActive ? 'active' : ''} ${isOccupied ? 'occupied' : ''}`;
          danBtns += `<button class="${cls}" onclick="selectDan(${dan})" ${isOccupied ? 'disabled' : ''}>${dan}단</button>`;
        }

        html += `<span style="margin-left:8px;">위치: <span class="action-highlight">${rack.rack_no}번 랙 · ${selectedCell.kan}칸</span></span>`;
        html += `<div class="dan-selector">${danBtns}</div>`;
      } else {
        html += `<span style="color:#334155;margin-left:8px;">← 매트릭스에서 위치 클릭</span>`;
      }

      info.innerHTML = html;
    }

    // 통계
    function updateStats() {
      const whRacks = getWhRacks();
      const rackIds = new Set(whRacks.map(r => r.id));
      const filled = pallets.filter(p => rackIds.has(parseInt(p.location.split('-')[0]))).length;
      const total = whRacks.reduce((s, r) => s + r.floors * r.groups, 0);
      document.getElementById('statFilled').textContent = filled;
      document.getElementById('statRemain').textContent = total - filled;
      document.getElementById('statTotal').textContent = total;
    }

    // 실행 버튼 활성화
    function updateExecBtn() {
      document.getElementById('btnExec').disabled = !(selectedScheduleId && selectedCell);
    }

    // 입고 실행
    function executeInbound() {
      if (!selectedScheduleId || !selectedCell) return;
      const s = inboundSchedules.find(x => x.id === selectedScheduleId);
      const p = products.find(x => x.id === s.product_id);
      const rack = racks.find(r => r.id === selectedCell.rackId);
      alert(`✅ 입고 완료!\n${p.name} ${s.quantity}개\n→ ${rack.rack_no}번 랙 · ${selectedCell.kan}칸 · ${selectedCell.dan}단\n\n(데모: 실제 저장 없음)`);
      selectedScheduleId = null;
      selectedCell = null;
      resetCellDetails();
      renderAll();
    }

    // 전체 렌더링
    function renderAll() {
      renderWhTabs();
      renderScheduleList();
      renderMatrix();
      renderActionBar();
      updateStats();
      updateExecBtn();
    }

    // 초기화
    renderAll();
    requestAnimationFrame(() => renderMatrix());
    window.addEventListener('resize', () => renderMatrix());
  </script>
</body>
</html>
