<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>입고처리 - 태블릿</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../data.js"></script>
  <script src="../shared.js"></script>
  <style id="commonStyle"></style>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; word-break: keep-all; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: var(--bg-base);
      background-image: linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px), linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);
      background-size: 40px 40px;
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── 헤더 ── */
    .tablet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 60px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-logo { font-size: 1.1rem; font-weight: 700; color: var(--cyan); text-shadow: 0 0 8px rgba(0,212,255,0.5); }
    .header-title { font-size: 1.1rem; font-weight: 700; color: var(--text-primary); }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .header-user { font-size: 0.85rem; color: var(--text-secondary); }
    .btn-logout {
      padding: 6px 14px; border-radius: 6px; font-size: 0.8rem; font-weight: 600;
      background: var(--red-dim); color: var(--red); border: 1px solid var(--red);
      cursor: pointer; min-height: 36px; font-family: inherit;
    }
    .btn-logout:active { opacity: 0.7; }

    /* ── 메인 2컬럼 ── */
    .tablet-main {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ── 좌측 패널 (38%) ── */
    .left-panel {
      width: 38%;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--bg-panel);
      overflow: hidden;
    }
    .panel-header {
      padding: 14px 16px 10px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .schedule-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .sched-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.15s;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .sched-card:active { opacity: 0.8; }
    .sched-card.selected {
      border-color: var(--cyan);
      background: var(--cyan-dim);
      box-shadow: 0 0 0 1px var(--cyan);
    }
    .sched-card-name { font-size: 0.95rem; font-weight: 600; color: var(--text-primary); }
    .sched-card.selected .sched-card-name { color: var(--cyan); }
    .sched-card-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .sched-meta-item {
      font-size: 0.75rem; color: var(--text-secondary);
      background: var(--bg-base); border-radius: 4px;
      padding: 2px 7px; border: 1px solid var(--border);
    }
    .sched-meta-note { font-size: 0.75rem; color: var(--amber); }
    .sched-empty { padding: 24px 16px; text-align: center; font-size: 0.85rem; color: var(--text-secondary); }

    /* ── 우측 패널 (62%) ── */
    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-base);
    }

    /* ── 창고 타입 토글 ── */
    .wh-type-toggle {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .toggle-label { font-size: 0.8rem; color: var(--text-secondary); font-weight: 600; }
    .toggle-switch {
      display: flex;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .toggle-btn {
      padding: 8px 20px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: var(--bg-surface);
      color: var(--text-secondary);
      min-height: 40px;
      font-family: inherit;
      transition: all 0.15s;
    }
    .toggle-btn.active { background: var(--cyan); color: #000; }
    .toggle-btn:active:not(.active) { opacity: 0.7; }

    /* ── 우측 콘텐츠 스크롤 영역 ── */
    .right-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-bottom: 210px;
    }

    /* ── 선택된 입고 정보 배너 ── */
    .selected-info-banner {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .selected-info-banner.has-selection {
      border-color: var(--cyan);
      background: var(--cyan-dim);
    }
    .selected-info-banner .sel-product { font-size: 1rem; font-weight: 700; color: var(--cyan); }
    .selected-info-banner .sel-meta { display: flex; gap: 10px; margin-top: 4px; flex-wrap: wrap; }
    .selected-info-banner .sel-meta span { font-size: 0.8rem; color: var(--text-secondary); }

    /* ── 일반창고 섹션 ── */
    .section-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .rack-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
      gap: 8px;
    }
    .rack-btn {
      min-height: 56px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      color: var(--text-secondary);
      transition: all 0.15s;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .rack-btn.active { background: var(--cyan); color: #000; border-color: var(--cyan); box-shadow: var(--cyan-glow); }
    .rack-btn:active:not(.active) { background: var(--bg-hover); }

    .floor-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(56px, 1fr));
      gap: 8px;
    }
    .floor-btn {
      min-height: 56px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      color: var(--text-secondary);
      transition: all 0.15s;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .floor-btn.active { background: var(--cyan); color: #000; border-color: var(--cyan); box-shadow: var(--cyan-glow); }
    .floor-btn:active:not(.active) { background: var(--bg-hover); }

    .kan-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
      gap: 8px;
    }
    .kan-btn {
      min-height: 56px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      color: var(--text-secondary);
      transition: all 0.15s;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .kan-btn.active { background: var(--cyan); color: #000; border-color: var(--cyan); box-shadow: var(--cyan-glow); }
    .kan-btn.occupied { background: var(--amber-dim); color: var(--amber); border-color: var(--amber); }
    .kan-btn:active:not(.active):not(.occupied) { background: var(--bg-hover); }

    .location-section {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
    }

    /* ── 전동랙 제어 패널 ── */
    .electric-control {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }
    .electric-title { font-size: 0.85rem; font-weight: 700; color: var(--text-secondary); margin-bottom: 14px; }
    .electric-btns { display: flex; gap: 16px; justify-content: center; }
    .electric-btn {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      border: 3px solid;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-family: inherit;
      flex-direction: column;
      gap: 4px;
    }
    .electric-btn.open {
      background: var(--green-dim);
      border-color: var(--green);
      color: var(--green);
    }
    .electric-btn.open:active { background: var(--green); color: #000; box-shadow: 0 0 20px rgba(16,185,129,0.6); }
    .electric-btn.stop {
      background: var(--amber-dim);
      border-color: var(--amber);
      color: var(--amber);
    }
    .electric-btn.stop:active { background: var(--amber); color: #000; box-shadow: 0 0 20px rgba(245,158,11,0.6); }
    .electric-btn-icon { font-size: 1.5rem; line-height: 1; }

    /* ── 하단 고정 입고 확정 버튼 ── */
    .confirm-bar {
      position: fixed;
      bottom: 56px;
      left: 38%;
      right: 0;
      padding: 10px 16px;
      background: var(--bg-base);
      border-top: 1px solid var(--border);
      z-index: 10;
    }
    .btn-confirm {
      width: 100%;
      min-height: 52px;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      background: var(--cyan);
      color: #000;
      border: none;
      font-family: inherit;
      transition: all 0.2s;
      letter-spacing: 0.03em;
    }
    .btn-confirm:disabled {
      background: var(--bg-surface);
      color: var(--text-secondary);
      cursor: not-allowed;
    }
    .btn-confirm:not(:disabled):active { opacity: 0.8; box-shadow: var(--cyan-glow); }

    /* ── 수량 입력 ── */
    .qty-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .qty-label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      white-space: nowrap;
      min-width: 32px;
    }
    .qty-input {
      flex: 1;
      min-height: 46px;
      padding: 0 14px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--bg-surface);
      color: var(--text-primary);
      font-size: 1.1rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      text-align: right;
      -webkit-appearance: none;
    }
    .qty-input:focus { outline: none; border-color: var(--cyan); background: var(--bg-hover); }
    .qty-hint {
      font-size: 0.74rem;
      color: var(--text-secondary);
      text-align: right;
      margin-bottom: 6px;
    }

    /* ── 하단 탭바 ── */
    .tab-bar {
      height: 56px;
      display: flex;
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 20;
    }
    .tab-item {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-family: inherit;
      text-decoration: none;
      transition: all 0.15s;
      border-top: 2px solid transparent;
    }
    .tab-item.active { color: var(--cyan); border-top-color: var(--cyan); }
    .tab-item:active { background: var(--bg-hover); }
    .tab-item.logout-tab:active { background: var(--red-dim); color: var(--red); }

    /* ── 스크롤바 ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

    /* ── 라이트 테마 ── */
    [data-theme="light"] { --amber-dim: rgba(245,158,11,0.12); --green-dim: rgba(16,185,129,0.12); --red-dim: rgba(239,68,68,0.12); }
    [data-theme="light"] body { background-color: var(--bg-base); background-image: linear-gradient(rgba(0,0,0,0.04) 1px,transparent 1px), linear-gradient(90deg,rgba(0,0,0,0.04) 1px,transparent 1px); background-size: 40px 40px; }
    [data-theme="light"] .confirm-bar { background: var(--bg-base); }
  </style>
</head>
<body>
  <!-- 헤더 -->
  <div class="tablet-header">
    <span class="header-logo">창고관리</span>
    <span class="header-title">입고처리</span>
    <div class="header-right">
      <span class="header-user" id="headerUser"></span>
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
  </div>

  <!-- 메인 2컬럼 -->
  <div class="tablet-main">
    <!-- 좌측: 입고 예정 목록 -->
    <div class="left-panel">
      <div class="panel-header">입고 예정 목록</div>
      <div class="schedule-list" id="scheduleList"></div>
    </div>

    <!-- 우측: 위치 선택 + 제어 -->
    <div class="right-panel">
      <!-- 창고 타입 토글 -->
      <div class="wh-type-toggle">
        <span class="toggle-label">창고 타입</span>
        <div class="toggle-switch">
          <button class="toggle-btn" id="toggleNormal" onclick="setWhMode('normal')">일반창고</button>
          <button class="toggle-btn" id="toggleElectric" onclick="setWhMode('electric')">전동랙</button>
        </div>
        <span id="whModeLabel" style="font-size:0.78rem;color:var(--text-secondary);margin-left:4px;"></span>
      </div>

      <!-- 스크롤 콘텐츠 -->
      <div class="right-content" id="rightContent">
        <!-- 선택된 입고 정보 -->
        <div id="selBanner" class="selected-info-banner">
          <div style="color:var(--text-secondary);font-size:0.85rem;">← 좌측에서 입고 예정 항목을 선택하세요</div>
        </div>

        <!-- 일반창고 위치 선택 -->
        <div id="normalSection">
          <!-- 창고 선택 -->
          <div class="location-section" id="warehouseSection">
            <div class="section-title">창고 선택</div>
            <div class="rack-grid" id="warehouseGrid"></div>
          </div>

          <!-- 랙 선택 -->
          <div class="location-section" id="rackSection" style="display:none;">
            <div class="section-title">랙 선택</div>
            <div class="rack-grid" id="rackGrid"></div>
          </div>

          <!-- 층 선택 -->
          <div class="location-section" id="floorSection" style="display:none;">
            <div class="section-title">층 선택</div>
            <div class="floor-grid" id="floorGrid"></div>
          </div>

          <!-- 칸 선택 -->
          <div class="location-section" id="kanSection" style="display:none;">
            <div class="section-title">칸 선택</div>
            <div class="kan-grid" id="kanGrid"></div>
          </div>
        </div>

        <!-- 전동랙 제어 패널 (normalSection 아래 추가 표시) -->
        <div id="electricSection" style="display:none;">
          <div class="electric-control">
            <div class="electric-title">전동랙 제어</div>
            <div class="electric-btns">
              <button class="electric-btn open" onclick="electricOpen()">
                <span class="electric-btn-icon">▶</span>
                <span>열기</span>
              </button>
              <button class="electric-btn stop" onclick="electricStop()">
                <span class="electric-btn-icon">■</span>
                <span>멈춤</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 입고 확정 버튼 (우측 패널 하단 고정) -->
  <div class="confirm-bar">
    <div class="qty-row">
      <label class="qty-label" for="inboundQty">수량</label>
      <input type="number" id="inboundQty" class="qty-input" min="1" placeholder="0" oninput="updateConfirmBtn()">
    </div>
    <div class="qty-hint" id="inboundQtyHint"></div>
    <button class="btn-confirm" id="btnConfirm" onclick="executeInbound()" disabled>입고 확정</button>
  </div>

  <!-- 하단 탭바 -->
  <div class="tab-bar">
    <div class="tab-item active">입고처리 ●</div>
    <a href="outbound.html" class="tab-item">출고처리</a>
    <button class="tab-item logout-tab" onclick="logout()">로그아웃</button>
  </div>

  <script>
    document.getElementById('commonStyle').textContent = getCommonStyles();

    // 인증 체크
    const _user = getCurrentUser();
    if (!_user) window.location.href = 'login.html';
    else document.getElementById('headerUser').textContent = _user.name;

    // 상태
    let whMode = 'normal'; // 'normal' | 'electric'
    let selectedScheduleId = null;
    let selectedWarehouseId = null;
    let selectedRackId = null;
    let selectedFloor = null;
    let selectedKan = null;

    // 일반창고 목록 (type: normal)
    const normalWarehouses = warehouses.filter(w => w.type === 'normal');
    const electricWarehouse = warehouses.find(w => w.type === 'electric');

    // ── 창고 타입 토글 ──
    function setWhMode(mode) {
      whMode = mode;
      selectedWarehouseId = null;
      selectedRackId = null;
      selectedFloor = null;
      selectedKan = null;

      document.getElementById('toggleNormal').classList.toggle('active', mode === 'normal');
      document.getElementById('toggleElectric').classList.toggle('active', mode === 'electric');

      if (mode === 'electric') {
        document.getElementById('whModeLabel').textContent = electricWarehouse ? electricWarehouse.name : '';
        selectedWarehouseId = electricWarehouse ? electricWarehouse.id : null;
      } else {
        document.getElementById('whModeLabel').textContent = '';
        selectedWarehouseId = null;
      }

      renderLocationSections();
      updateConfirmBtn();
    }

    // ── 예정 목록 렌더링 ──
    function renderScheduleList() {
      const pending = inboundSchedules.filter(s => s.status === 'pending');
      const el = document.getElementById('scheduleList');
      if (pending.length === 0) {
        el.innerHTML = '<div class="sched-empty">입고 예정 항목이 없습니다</div>';
        return;
      }
      el.innerHTML = pending.map(s => {
        const p = products.find(pr => pr.id === s.product_id);
        const isSel = s.id === selectedScheduleId;
        return `<div class="sched-card ${isSel ? 'selected' : ''}" onclick="selectSchedule(${s.id})">
          <div class="sched-card-name">${p ? p.name : '알 수 없음'}</div>
          <div class="sched-card-meta">
            <span class="sched-meta-item">${p ? p.code : ''}</span>
            <span class="sched-meta-item">${s.quantity.toLocaleString()}개</span>
            <span class="sched-meta-item">${s.scheduled_date}</span>
            ${s.note ? `<span class="sched-meta-note">${s.note}</span>` : ''}
          </div>
        </div>`;
      }).join('');
    }

    function selectSchedule(id) {
      selectedScheduleId = selectedScheduleId === id ? null : id;
      renderScheduleList();
      renderSelBanner();
      updateConfirmBtn();
    }

    // ── 선택 정보 배너 ──
    function renderSelBanner() {
      const el = document.getElementById('selBanner');
      if (!selectedScheduleId) {
        el.className = 'selected-info-banner';
        el.innerHTML = '<div style="color:var(--text-secondary);font-size:0.85rem;">← 좌측에서 입고 예정 항목을 선택하세요</div>';
        return;
      }
      const s = inboundSchedules.find(x => x.id === selectedScheduleId);
      const p = products.find(x => x.id === s.product_id);
      el.className = 'selected-info-banner has-selection';
      el.innerHTML = `
        <div class="sel-product">${p ? p.name : ''}</div>
        <div class="sel-meta">
          <span>${p ? p.code : ''}</span>
          <span>${s.quantity.toLocaleString()}개</span>
          <span>${s.scheduled_date}</span>
          ${s.note ? `<span style="color:var(--amber);">${s.note}</span>` : ''}
        </div>`;
    }

    // ── 위치 선택 섹션 렌더링 ──
    function renderLocationSections() {
      const normalSec = document.getElementById('normalSection');
      const electricSec = document.getElementById('electricSection');

      electricSec.style.display = (whMode === 'electric') ? 'block' : 'none';

      // 창고 선택 (일반모드만)
      const whSec = document.getElementById('warehouseSection');
      whSec.style.display = (whMode === 'normal') ? 'block' : 'none';

      if (whMode === 'normal') {
        renderWarehouseGrid();
        renderRackGrid();
        renderFloorGrid();
        renderKanGrid();
      } else {
        // 전동랙: 창고 자동 선택, 랙/층/칸 그리드 표시
        renderRackGrid();
        renderFloorGrid();
        renderKanGrid();
      }
    }

    function renderWarehouseGrid() {
      const grid = document.getElementById('warehouseGrid');
      grid.innerHTML = normalWarehouses.map(w =>
        `<button class="rack-btn ${selectedWarehouseId === w.id ? 'active' : ''}" onclick="selectWarehouse(${w.id})">${w.name}</button>`
      ).join('');
    }

    function selectWarehouse(id) {
      selectedWarehouseId = id;
      selectedRackId = null;
      selectedFloor = null;
      selectedKan = null;
      renderWarehouseGrid();
      renderRackGrid();
      renderFloorGrid();
      renderKanGrid();
      updateConfirmBtn();
    }

    function renderRackGrid() {
      const rackSec = document.getElementById('rackSection');
      if (!selectedWarehouseId) { rackSec.style.display = 'none'; return; }

      const whRacks = racks.filter(r => r.warehouse_id === selectedWarehouseId);
      rackSec.style.display = 'block';
      document.getElementById('rackGrid').innerHTML = whRacks.map(r =>
        `<button class="rack-btn ${selectedRackId === r.id ? 'active' : ''}" onclick="selectRack(${r.id})">R${r.rack_no}</button>`
      ).join('');
    }

    function selectRack(id) {
      selectedRackId = id;
      selectedFloor = null;
      selectedKan = null;
      renderRackGrid();
      renderFloorGrid();
      renderKanGrid();
      updateConfirmBtn();
    }

    function renderFloorGrid() {
      const floorSec = document.getElementById('floorSection');
      if (!selectedRackId) { floorSec.style.display = 'none'; return; }

      const rack = racks.find(r => r.id === selectedRackId);
      if (!rack) { floorSec.style.display = 'none'; return; }

      floorSec.style.display = 'block';
      let html = '';
      for (let f = rack.floors; f >= 1; f--) {
        html += `<button class="floor-btn ${selectedFloor === f ? 'active' : ''}" onclick="selectFloor(${f})">${f}층</button>`;
      }
      document.getElementById('floorGrid').innerHTML = html;
    }

    function selectFloor(f) {
      selectedFloor = f;
      selectedKan = null;
      renderFloorGrid();
      renderKanGrid();
      updateConfirmBtn();
    }

    function renderKanGrid() {
      const kanSec = document.getElementById('kanSection');
      if (!selectedRackId || !selectedFloor) { kanSec.style.display = 'none'; return; }

      const rack = racks.find(r => r.id === selectedRackId);
      if (!rack) { kanSec.style.display = 'none'; return; }

      kanSec.style.display = 'block';
      let html = '';
      for (let k = 1; k <= rack.groups; k++) {
        const key = `${selectedRackId}-${selectedFloor}-${k}`;
        const occupied = pallets.some(p => p.location === key);
        html += `<button class="kan-btn ${selectedKan === k ? 'active' : ''} ${occupied ? 'occupied' : ''}" onclick="selectKan(${k})">${k}칸${occupied ? ' ●' : ''}</button>`;
      }
      document.getElementById('kanGrid').innerHTML = html;
    }

    function selectKan(k) {
      selectedKan = k;
      renderKanGrid();
      updateConfirmBtn();
    }

    // ── 전동랙 제어 ──
    function electricOpen() {
      showToast('전동랙 열기 신호를 전송했습니다', 'green');
    }
    function electricStop() {
      showToast('전동랙 멈춤 신호를 전송했습니다', 'amber');
    }

    // ── 확정 버튼 ──
    function updateConfirmBtn() {
      const btn = document.getElementById('btnConfirm');
      const hint = document.getElementById('inboundQtyHint');
      const qtyInput = document.getElementById('inboundQty');
      const hasSchedule = !!selectedScheduleId;
      const hasLocation = !!selectedWarehouseId && !!selectedRackId && !!selectedFloor && !!selectedKan;
      const qty = parseInt(qtyInput.value, 10);

      if (hasSchedule) {
        const s = inboundSchedules.find(x => x.id === selectedScheduleId);
        hint.textContent = `예정 수량: ${s.quantity.toLocaleString()}개 (최대)`;
        qtyInput.max = s.quantity;
      } else {
        hint.textContent = '';
      }

      const validQty = !isNaN(qty) && qty > 0 && hasSchedule &&
        qty <= inboundSchedules.find(x => x.id === selectedScheduleId).quantity;
      btn.disabled = !(hasSchedule && hasLocation && validQty);
    }

    // ── 입고 실행 ──
    function executeInbound() {
      if (!selectedScheduleId || !selectedRackId || !selectedFloor || !selectedKan) return;
      const s = inboundSchedules.find(x => x.id === selectedScheduleId);
      const qty = parseInt(document.getElementById('inboundQty').value, 10);
      if (isNaN(qty) || qty <= 0 || qty > s.quantity) return;
      const p = products.find(x => x.id === s.product_id);
      const rack = racks.find(r => r.id === selectedRackId);
      const wh = warehouses.find(w => w.id === selectedWarehouseId);
      alert(`입고 완료!\n${p ? p.name : ''} ${qty.toLocaleString()}개\n→ ${wh ? wh.name : ''} ${rack ? rack.rack_no+'번 랙' : ''} ${selectedFloor}층 ${selectedKan}칸\n\n(데모: 실제 저장 없음)`);
      selectedScheduleId = null;
      selectedRackId = null;
      selectedFloor = null;
      selectedKan = null;
      document.getElementById('inboundQty').value = '';
      document.getElementById('inboundQtyHint').textContent = '';
      renderScheduleList();
      renderSelBanner();
      renderLocationSections();
      updateConfirmBtn();
    }

    // ── 토스트 ──
    function showToast(msg, type) {
      let toast = document.getElementById('_toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = '_toast';
        toast.style.cssText = 'position:fixed;bottom:130px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:0.9rem;font-weight:600;z-index:999;transition:opacity 0.3s;pointer-events:none;';
        document.body.appendChild(toast);
      }
      const colors = { green: ['var(--green-dim)', 'var(--green)'], amber: ['var(--amber-dim)', 'var(--amber)'], cyan: ['var(--cyan-dim)', 'var(--cyan)'] };
      const [bg, color] = colors[type] || colors.cyan;
      toast.style.background = bg;
      toast.style.color = color;
      toast.style.border = `1px solid ${color}`;
      toast.textContent = msg;
      toast.style.opacity = '1';
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => { toast.style.opacity = '0'; }, 2000);
    }

    // ── 초기화 ──
    setWhMode('normal');
    renderScheduleList();
    renderSelBanner();
  </script>
</body>
</html>
