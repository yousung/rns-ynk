<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>활동 로그 - 창고 관리 시스템</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/litepicker@2/dist/css/litepicker.css">
  <script src="https://cdn.jsdelivr.net/npm/litepicker@2/dist/litepicker.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="data.js"></script><script src="shared.js"></script>
  <style id="commonStyle"></style>
  <style>
    /* ── Litepicker 공통 ── */
    .litepicker {
      font-family: 'Noto Sans KR', sans-serif;
      --litepicker-container-months-color-bg: var(--bg-panel);
      --litepicker-month-header-color: var(--text-primary);
      --litepicker-month-button-prev-color: var(--text-secondary);
      --litepicker-month-button-next-color: var(--text-secondary);
      --litepicker-month-weekday-color: var(--text-secondary);
      --litepicker-day-color: var(--text-primary);
      --litepicker-day-color-hover: var(--cyan);
      --litepicker-is-today-color: var(--cyan);
      --litepicker-is-in-range-color: var(--cyan-dim);
      --litepicker-is-start-color-bg: var(--cyan);
      --litepicker-is-end-color-bg: var(--cyan);
      --litepicker-is-start-color: #000;
      --litepicker-is-end-color: #000;
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .litepicker .container__months { border-radius: 8px; }
    .litepicker .month-item-header select {
      background: var(--bg-surface);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 4px;
      font-size: 0.8rem;
    }
    .litepicker .button-previous-month,
    .litepicker .button-next-month { color: var(--text-secondary); }
    .litepicker .day-item:hover:not(.is-locked) { color: #000; }
    /* 라이트 테마 오버라이드 */
    [data-theme="light"] .litepicker {
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    /* 한국식 달력 헤더: 년도 위, 월 아래 */
    .litepicker .month-item-header > div {
      display: grid;
      grid-template-columns: auto 1fr auto;
      grid-template-rows: auto auto;
      gap: 4px;
      align-items: center;
    }
    .litepicker .button-previous-month {
      grid-column: 1;
      grid-row: 1 / 3;
      align-self: center;
    }
    .litepicker .button-next-month {
      grid-column: 3;
      grid-row: 1 / 3;
      align-self: center;
    }
    .litepicker .month-item-header select[name="year"] {
      grid-column: 2;
      grid-row: 1;
      text-align: center;
    }
    .litepicker .month-item-header select[name="month"] {
      grid-column: 2;
      grid-row: 2;
      text-align: center;
    }
    /* 날짜 범위 입력창 */
    #dateRange { cursor: pointer; width: 240px; }
  </style>
</head>
<body>
  <div class="app-layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-area">
      <div class="header-bar"><h1>활동 로그</h1></div>
      <div class="content-area">
        <div class="mb-4 flex flex-wrap items-center gap-3">
          <div class="flex items-center gap-2">
            <label style="color:var(--text-secondary);font-size:0.875rem;">텍스트:</label>
            <input id="searchText" type="text" placeholder="사용자명/상세" onchange="render()" style="padding:0.375rem 0.5rem;border:1px solid var(--border);border-radius:0.25rem;font-size:0.875rem;width:150px;">
          </div>
          <div class="flex items-center gap-2">
            <label style="color:var(--text-secondary);font-size:0.875rem;">기간:</label>
            <input id="dateRange" type="text" placeholder="기간 선택" readonly style="padding:0.375rem 0.5rem;border:1px solid var(--border);border-radius:0.25rem;font-size:0.875rem;">
          </div>
          <div class="flex items-center gap-2">
            <label style="color:var(--text-secondary);font-size:0.875rem;">기능:</label>
            <select id="filterSel" onchange="render()" style="width:auto;padding:0.375rem 0.5rem;border:1px solid var(--border);border-radius:0.25rem;font-size:0.875rem;">
              <option value="all">전체</option>
              <option value="inbound">입고</option>
              <option value="outbound">출고</option>
              <option value="inventory">재고</option>
              <option value="products">상품</option>
              <option value="users">사용자</option>
              <option value="settings">설정</option>
            </select>
          </div>
          <button onclick="resetFilters()" style="padding:0.375rem 0.75rem;background-color:var(--bg-surface);color:var(--text-secondary);border:none;border-radius:0.25rem;cursor:pointer;font-size:0.875rem;">초기화</button>
        </div>
        <div class="overflow-x-auto">
          <table>
            <thead><tr><th>일시</th><th>사용자</th><th>액션</th><th>상세</th></tr></thead>
            <tbody id="logBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('commonStyle').textContent = getCommonStyles();
    requireAuth();
    renderLayout('activity-log');

    const picker = new Litepicker({
      element: document.getElementById('dateRange'),
      singleMode: false,
      numberOfMonths: 2,
      numberOfColumns: 2,
      autoApply: true,
      delimiter: ' ~ ',
      format: 'YYYY. M. D.',
      lang: 'ko-KR',
      dropdowns: { minYear: 2025, maxYear: 2027, months: true, years: true },
      setup(p) {
        p.on('selected', () => render());
        p.on('clear:selection', () => render());
      }
    });

    function render() {
      const searchText = document.getElementById('searchText').value.toLowerCase();
      const startDate = picker.getStartDate()?.format('YYYY-MM-DD');
      const endDate   = picker.getEndDate()?.format('YYYY-MM-DD');
      const feature = document.getElementById('filterSel').value;

      let filtered = activityLogs;

      // 텍스트 검색 (사용자명 + 상세, 대소문자 무시)
      if (searchText) {
        filtered = filtered.filter(l =>
          l.user.toLowerCase().includes(searchText) ||
          l.detail.toLowerCase().includes(searchText)
        );
      }

      // 기간 필터 (created_at에서 날짜 부분만 추출)
      if (startDate) {
        filtered = filtered.filter(l => {
          const logDate = l.created_at.split(' ')[0];
          return logDate >= startDate;
        });
      }
      if (endDate) {
        filtered = filtered.filter(l => {
          const logDate = l.created_at.split(' ')[0];
          return logDate <= endDate;
        });
      }

      // 기능 필터
      if (feature !== 'all') {
        filtered = filtered.filter(l => l.feature === feature);
      }

      if (filtered.length === 0) {
        document.getElementById('logBody').innerHTML = `
          <tr>
            <td colspan="4" style="text-align:center;padding:40px 14px;color:var(--text-secondary);">검색 결과가 없습니다.</td>
          </tr>`;
      } else {
        document.getElementById('logBody').innerHTML = filtered.map(l => `
          <tr>
            <td style="font-family:'JetBrains Mono',monospace;font-size:0.8rem;">${l.created_at}</td>
            <td>${l.user}</td>
            <td>${l.action}</td>
            <td style="color:var(--text-secondary);font-size:0.875rem;">${l.detail}</td>
          </tr>`).join('');
      }
    }

    function resetFilters() {
      document.getElementById('searchText').value = '';
      picker.clearSelection();
      document.getElementById('filterSel').value = 'all';
      render();
    }

    render();
  </script>
</body>
</html>
