<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>입고 처리 - 창고 관리 시스템</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="data.js"></script>
  <script src="shared.js"></script>
  <style id="commonStyle"></style>
  <style>
    /* 창고 탭 */
    .wh-tab { padding: 7px 16px; border-radius: 6px; font-size: 0.875rem; cursor: pointer; border: 1px solid var(--border); transition: all 0.2s; background: var(--bg-surface); color: var(--text-secondary); }
    .wh-tab.active { background: var(--cyan); color: #000; font-weight: 600; border-color: var(--cyan); box-shadow: 0 0 12px rgba(0,212,255,0.3); }

    /* 창고 뷰 */
    .wh3d-container { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
    .wh3d-scroll { overflow-x: auto; }
    .wh3d-title { font-size: 0.875rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .wh3d-title .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--cyan); box-shadow: 0 0 8px rgba(0,212,255,0.8); }
    .wh3d-scene { display: block; }
    .wh3d-grid { display: grid; gap: 8px; }
    /* 평면 카드 랙 */
    .rack-card { background: #080F1E; border: 1px solid #182D4A; border-radius: 8px; padding: 8px; cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s, background 0.2s; }
    .rack-card:hover { border-color: #2D5A8E; background: #0C1828; }
    .rack-card.selected { border-color: var(--cyan); box-shadow: 0 0 14px rgba(0,212,255,0.45); background: #071320; }
    .rack-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .rack-card-no { font-size: 0.72rem; font-weight: 700; color: var(--text-primary); font-family: 'JetBrains Mono', monospace; }
    .rack-card.selected .rack-card-no { color: var(--cyan); }
    .rack-card-lot { font-size: 0.68rem; font-weight: 600; color: #4ADE80; }
    .rack-card-lot.empty { color: #334155; }
    .rack-cell-grid { display: grid; gap: 2px; }
    .rc { border-radius: 2px; height: 9px; }
    .rc-empty { background: #0A1828; border: 1px solid rgba(30,58,95,0.45); }
    .rc-filled { background: #3730A3; border: 1px solid #6366F1; }
    @keyframes rack-pulse {
      0%,100% { box-shadow: 0 0 14px rgba(0,212,255,0.9), 0 0 28px rgba(0,212,255,0.4); }
      50%      { box-shadow: 0 0 22px rgba(0,212,255,1.0), 0 0 44px rgba(0,212,255,0.6); }
    }

    /* 범례 */
    .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 14px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--text-secondary); }
    .legend-box { width: 14px; height: 14px; border-radius: 2px; }

    /* 슬롯 그리드 */
    .slot-grid { display: grid; gap: 6px; margin-top: 12px; }
    .slot {
      width: 60px; height: 60px; display: flex; flex-direction: column; align-items: center;
      justify-content: center; border: 1px solid var(--border); border-radius: 4px;
      cursor: pointer; transition: all 0.2s; font-family: 'JetBrains Mono', monospace; font-size: 11px;
    }
    .slot-empty { background: rgba(13,22,38,0.8); border-style: dashed; color: var(--text-secondary); }
    .slot-filled { background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); box-shadow: var(--cyan-glow); }
    .slot-selected { background: rgba(0,212,255,0.3); border-color: var(--cyan); box-shadow: 0 0 20px rgba(0,212,255,0.6); }
    .slot:hover { transform: scale(1.1); z-index: 5; }
    .floor-label { font-size: 0.75rem; color: var(--text-secondary); display: flex; align-items: center; padding-right: 8px; font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div class="app-layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-area">
      <div class="header-bar">
        <h1>입고 처리</h1>
      </div>
      <div class="content-area">
        <!-- 창고 탭 -->
        <div class="flex gap-2 mb-4" id="whTabs"></div>

        <div class="flex gap-5">
          <!-- 예정 목록 -->
          <div style="width:200px;flex-shrink:0;">
            <div class="card">
              <h3 class="font-bold mb-3" style="font-size:0.9rem;">입고 예정 목록</h3>
              <div id="scheduleList" class="space-y-2"></div>
            </div>
          </div>

          <!-- 오른쪽: 3D 뷰 + 슬롯 -->
          <div class="flex-1">
            <div class="wh3d-container">
              <div class="wh3d-title"><div class="dot"></div><span id="whName">창고1</span> — 3D 랙 배치도</div>
              <div class="wh3d-scroll">
                <div class="wh3d-scene">
                  <div class="wh3d-grid" id="rackGrid"></div>
                </div>
              </div>
              <div class="legend">
                <div class="legend-item"><div class="legend-box rc rc-empty" style="width:14px;height:14px;display:inline-block;"></div>비어있음</div>
                <div class="legend-item"><div class="legend-box rc rc-filled" style="width:14px;height:14px;display:inline-block;"></div>재고 있음</div>
                <div class="legend-item"><div style="width:14px;height:14px;border:2px solid var(--cyan);display:inline-block;border-radius:4px;"></div>선택됨</div>
              </div>
            </div>

            <!-- 선택된 랙 슬롯 상세 -->
            <div id="slotDetail" style="display:none;" class="card">
              <h4 class="font-bold mb-3" id="slotDetailTitle"></h4>
              <div id="slotGrid"></div>
            </div>

            <!-- 입고 실행 -->
            <div id="inboundAction" style="display:none;" class="card mt-4">
              <h4 class="font-bold mb-3">입고 실행</h4>
              <p class="text-sm mb-3" id="inboundActionInfo" style="color:var(--text-secondary);"></p>
              <button class="btn-success" onclick="executeInbound()">입고 실행</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('commonStyle').textContent = getCommonStyles();
    requireAuth();
    renderLayout('inbound-execute');

    let selectedWarehouse = 1;
    let selectedScheduleId = null;
    let selectedRackId = null;
    let selectedSlot = null;

    // 창고 탭 렌더링
    function renderWhTabs() {
      document.getElementById('whTabs').innerHTML = warehouses.map(w =>
        `<button class="wh-tab ${w.id === selectedWarehouse ? 'active' : ''}" onclick="selectWarehouse(${w.id})">${w.name}</button>`
      ).join('');
      document.getElementById('whName').textContent = warehouses.find(w => w.id === selectedWarehouse).name;
    }

    function selectWarehouse(id) {
      selectedWarehouse = id;
      selectedRackId = null;
      selectedSlot = null;
      renderWhTabs();
      render3DRacks();
      hideSlotDetail();
    }

    // 예정 목록
    function renderScheduleList() {
      const pending = inboundSchedules.filter(s => s.status === 'pending');
      document.getElementById('scheduleList').innerHTML = pending.map(s => {
        const p = products.find(pr => pr.id === s.product_id);
        const isSelected = s.id === selectedScheduleId;
        return `
          <div onclick="selectSchedule(${s.id})" style="
            background:${isSelected ? 'var(--cyan-dim)' : 'var(--bg-hover)'};
            color:${isSelected ? 'var(--cyan)' : 'var(--text-secondary)'};
            border-left: 3px solid ${isSelected ? 'var(--cyan)' : 'transparent'};
            padding:10px;border-radius:6px;cursor:pointer;transition:all 0.15s;
          ">
            <div style="font-weight:600;font-size:0.875rem;">${p.name}</div>
            <div style="font-size:0.75rem;">${s.quantity}개 · ${s.scheduled_date}</div>
            ${s.note ? `<div style="font-size:0.7rem;color:var(--amber);">${s.note}</div>` : ''}
          </div>
        `;
      }).join('');
    }

    function selectSchedule(id) {
      selectedScheduleId = id;
      selectedRackId = null;
      selectedSlot = null;
      renderScheduleList();
      render3DRacks();
      hideSlotDetail();
    }

    // 평면 카드 랙 그리드 렌더링
    function render3DRacks() {
      const whRacks = racks.filter(r => r.warehouse_id === selectedWarehouse);
      const cols = selectedWarehouse === 3 ? 6 : 3;
      const grid = document.getElementById('rackGrid');
      grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

      grid.innerHTML = whRacks.map(rack => {
        const isSelected = rack.id === selectedRackId;
        const palletsInRack = pallets.filter(p => parseInt(p.location.split('-')[0]) === rack.id);
        const filledCount = palletsInRack.length;

        let cells = '';
        for (let floor = rack.floors; floor >= 1; floor--) {
          for (let grp = 1; grp <= rack.groups; grp++) {
            const key = `${rack.id}-${floor}-${grp}`;
            const pallet = pallets.find(p => p.location === key);
            cells += `<div class="rc ${pallet ? 'rc-filled' : 'rc-empty'}" title="${floor}층 ${grp}그룹"></div>`;
          }
        }

        const lotLabel = filledCount > 0
          ? `<span class="rack-card-lot">${filledCount}Lot</span>`
          : `<span class="rack-card-lot empty">빈칸</span>`;

        return `<div class="rack-card${isSelected ? ' selected' : ''}" onclick="selectRack(${rack.id})" title="${rack.rack_no}번 랙 | ${rack.floors}층×${rack.groups}그룹">
          <div class="rack-card-header">
            <span class="rack-card-no">${rack.rack_no}번</span>
            ${lotLabel}
          </div>
          <div class="rack-cell-grid" style="grid-template-columns:repeat(${rack.groups},1fr);">${cells}</div>
        </div>`;
      }).join('');
    }

    function selectRack(rackId) {
      selectedRackId = selectedRackId === rackId ? null : rackId;
      selectedSlot = null;
      render3DRacks();
      if (selectedRackId) {
        renderSlotDetail();
      } else {
        hideSlotDetail();
      }
    }

    function hideSlotDetail() {
      document.getElementById('slotDetail').style.display = 'none';
      document.getElementById('inboundAction').style.display = 'none';
    }

    function renderSlotDetail() {
      const rack = racks.find(r => r.id === selectedRackId);
      if (!rack) return;

      const detail = document.getElementById('slotDetail');
      const grid = document.getElementById('slotGrid');
      document.getElementById('slotDetailTitle').textContent = `${rack.rack_no}번 랙 — 층별 슬롯 현황 (${rack.floors}층 × ${rack.groups}그룹)`;

      const schedule = selectedScheduleId ? inboundSchedules.find(s => s.id === selectedScheduleId) : null;

      let html = '';
      for (let floor = rack.floors; floor >= 1; floor--) {
        html += `<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">`;
        html += `<div class="floor-label">${floor}F</div>`;
        html += `<div style="display:flex;gap:6px;">`;
        for (let grp = 1; grp <= rack.groups; grp++) {
          const slotKey = `${rack.id}-${floor}-${grp}`;
          const pallet = pallets.find(p => p.location === slotKey);
          const items = pallet ? inventoryItems.filter(i => i.pallet_id === pallet.id) : [];
          const isEmpty = !pallet;
          const isSelected = selectedSlot === slotKey;

          let cls = isEmpty ? 'slot-empty' : 'slot-filled';
          if (isSelected) cls = 'slot-selected';

          const label = isEmpty ? `<span style="font-size:9px;">빈칸</span>` : `<span>${items.length}종</span><span style="font-size:9px;">${items.reduce((s,i)=>s+i.quantity,0)}개</span>`;

          html += `<div class="slot ${cls}" onclick="selectSlot('${slotKey}')" title="${slotKey}">${label}</div>`;
        }
        html += `</div></div>`;
      }

      grid.innerHTML = html;
      grid.style.gridTemplateColumns = 'none';
      detail.style.display = 'block';
    }

    function selectSlot(key) {
      selectedSlot = selectedSlot === key ? null : key;
      renderSlotDetail();

      if (selectedSlot && selectedScheduleId) {
        const [rackId, floor, grp] = selectedSlot.split('-').map(Number);
        const rack = racks.find(r => r.id === rackId);
        const schedule = inboundSchedules.find(s => s.id === selectedScheduleId);
        const product = products.find(p => p.id === schedule.product_id);
        document.getElementById('inboundActionInfo').textContent =
          `${product.name} ${schedule.quantity}개 → ${rack.rack_no}번 랙 ${floor}층 ${grp}번 슬롯`;
        document.getElementById('inboundAction').style.display = 'block';
      } else {
        document.getElementById('inboundAction').style.display = 'none';
      }
    }

    function executeInbound() {
      if (!selectedScheduleId || !selectedSlot) return;
      const schedule = inboundSchedules.find(s => s.id === selectedScheduleId);
      const product = products.find(p => p.id === schedule.product_id);
      alert(`✅ 입고 완료!\n${product.name} ${schedule.quantity}개 → ${selectedSlot} 위치에 입고되었습니다.\n(데모: 실제 저장 없음)`);
      selectedScheduleId = null;
      selectedSlot = null;
      selectedRackId = null;
      renderScheduleList();
      render3DRacks();
      hideSlotDetail();
    }

    // 초기화
    renderWhTabs();
    renderScheduleList();
    render3DRacks();
  </script>
</body>
</html>
