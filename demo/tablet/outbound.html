<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>출고처리 - 태블릿</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="../data.js"></script>
  <script src="../shared.js"></script>
  <style>
    :root {
      --bg-base:#070C14; --bg-panel:#0D1626; --bg-surface:#132035; --bg-hover:#1A2D47;
      --border:#1E3A5F; --border-bright:#2D5A8E;
      --cyan:#00D4FF; --cyan-dim:rgba(0,212,255,0.15); --cyan-glow:0 0 12px rgba(0,212,255,0.5);
      --amber:#F59E0B; --amber-dim:rgba(245,158,11,0.15);
      --red:#EF4444; --red-dim:rgba(239,68,68,0.15);
      --green:#10B981; --green-dim:rgba(16,185,129,0.15);
      --text-primary:#E8F0FE; --text-secondary:#7B91AD; --text-accent:#00D4FF;
    }
    [data-theme="light"] {
      --bg-base:#F0F4F8; --bg-panel:#FFFFFF; --bg-surface:#F1F5F9; --bg-hover:#E2E8F0;
      --border:#CBD5E1; --border-bright:#94A3B8;
      --cyan:#0284C7; --cyan-dim:rgba(2,132,199,0.12);
      --text-primary:#1E293B; --text-secondary:#64748B; --text-accent:#0284C7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; word-break: keep-all; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: var(--bg-base);
      background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 헤더 ── */
    .t-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 56px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .t-header-logo {
      font-size: 1rem;
      font-weight: 700;
      color: var(--cyan);
      text-shadow: 0 0 8px rgba(0,212,255,0.5);
      letter-spacing: -0.5px;
    }
    .t-header-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    .t-header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .t-worker-name {
      font-size: 0.82rem;
      color: var(--text-secondary);
    }
    .t-logout-btn {
      min-height: 36px;
      padding: 0 14px;
      border-radius: 6px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 0.82rem;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .t-logout-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── 메인 2컬럼 ── */
    .t-body {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* ── 좌측 패널: 출고 예정 목록 ── */
    .left-panel {
      width: 38%;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }
    .left-panel-title {
      padding: 12px 16px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .schedule-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .sched-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      cursor: pointer;
      transition: all 0.15s;
      min-height: 48px;
    }
    .sched-card:hover { border-color: var(--border-bright); background: var(--bg-hover); }
    .sched-card.selected {
      border-color: var(--cyan);
      background: var(--cyan-dim);
    }
    .sched-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 5px;
    }
    .sched-card-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    .fifo-badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      background: var(--amber-dim);
      color: var(--amber);
      border: 1px solid rgba(245,158,11,0.3);
      flex-shrink: 0;
    }
    .sched-card-sku {
      font-size: 0.75rem;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 4px;
    }
    .sched-card-meta {
      font-size: 0.78rem;
      color: var(--text-secondary);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .sched-card-meta span { display: flex; align-items: center; gap: 3px; }
    .sched-qty { color: var(--cyan); font-weight: 600; }
    .sched-dest { color: var(--amber); }
    .sched-empty {
      padding: 24px 16px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
    }

    /* ── 우측 패널: 출고 위치 + 제어 ── */
    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 타입 토글 */
    .type-toggle-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .type-toggle-label {
      font-size: 0.78rem;
      color: var(--text-secondary);
    }
    .type-toggle-btns {
      display: flex;
      gap: 4px;
    }
    .type-btn {
      min-height: 34px;
      padding: 0 16px;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-panel);
      color: var(--text-secondary);
      font-family: inherit;
      transition: all 0.15s;
    }
    .type-btn.active { background: var(--cyan); color: #000; border-color: var(--cyan); }
    .type-btn:not(.active):hover { border-color: var(--border-bright); color: var(--text-primary); }

    /* 출고 위치 정보 */
    .fifo-location-block {
      padding: 16px 20px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .fifo-location-empty {
      color: var(--text-secondary);
      font-size: 0.88rem;
      text-align: center;
      padding: 8px 0;
    }
    .fifo-location-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .fifo-location-main {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }
    .fifo-loc-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .fifo-loc-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--cyan);
      font-family: 'JetBrains Mono', monospace;
      line-height: 1;
      text-shadow: var(--cyan-glow);
    }
    .fifo-loc-unit {
      font-size: 0.7rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .fifo-loc-sep {
      font-size: 1.4rem;
      color: var(--border-bright);
      margin-bottom: 12px;
    }
    .fifo-received {
      margin-top: 8px;
      font-size: 0.78rem;
      color: var(--text-secondary);
    }
    .fifo-received span { color: var(--amber); font-weight: 600; }

    /* 제어 패널 공통 */
    .control-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* 일반창고 위치 확인 카드 */
    .normal-location-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }
    .normal-location-card-title {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .normal-rows { display: flex; flex-direction: column; gap: 8px; }
    .normal-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--bg-panel);
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .normal-row-label { font-size: 0.8rem; color: var(--text-secondary); }
    .normal-row-value { font-size: 0.88rem; font-weight: 600; color: var(--text-primary); }
    .normal-row-value.highlight { color: var(--cyan); }

    /* 전동랙 제어 패널 */
    .electric-panel {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }
    .electric-panel-title {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .electric-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      margin-bottom: 14px;
    }
    .elec-btn {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 3px solid;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 4px;
      transition: all 0.2s;
    }
    .elec-btn-open {
      background: var(--green-dim);
      border-color: var(--green);
      color: var(--green);
    }
    .elec-btn-open:hover { background: var(--green); color: #000; box-shadow: 0 0 16px rgba(16,185,129,0.5); }
    .elec-btn-stop {
      background: var(--amber-dim);
      border-color: var(--amber);
      color: var(--amber);
    }
    .elec-btn-stop:hover { background: var(--amber); color: #000; box-shadow: 0 0 16px rgba(245,158,11,0.5); }
    .elec-status {
      text-align: center;
      font-size: 0.82rem;
      color: var(--text-secondary);
      padding: 8px;
      border-radius: 6px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
    }
    .elec-status.active { color: var(--green); border-color: var(--green); background: var(--green-dim); }
    .elec-status.stopped { color: var(--amber); border-color: var(--amber); background: var(--amber-dim); }

    /* FIFO 위치 강조 (전동랙) */
    .fifo-highlight-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--cyan-dim);
      border: 1px solid var(--cyan);
      border-radius: 8px;
      font-size: 0.85rem;
    }
    .fifo-highlight-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
      flex-shrink: 0;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.2); }
    }
    .fifo-highlight-text { color: var(--text-primary); }
    .fifo-highlight-text strong { color: var(--cyan); }

    /* [출고 확정] 버튼 - 하단 고정 */
    .confirm-bar {
      flex-shrink: 0;
      padding: 12px 16px;
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
    }
    .confirm-btn {
      width: 100%;
      min-height: 52px;
      background: var(--cyan);
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }
    .confirm-btn:hover { background: #00b8d9; box-shadow: var(--cyan-glow); }
    .confirm-btn:disabled {
      background: var(--bg-surface);
      color: var(--text-secondary);
      cursor: not-allowed;
      box-shadow: none;
    }

    /* 빈 상태 */
    .right-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    .right-empty svg { opacity: 0.3; }

    /* ── 하단 탭바 ── */
    .t-tabbar {
      display: flex;
      height: 56px;
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .t-tab {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      cursor: pointer;
      border: none;
      background: transparent;
      font-family: inherit;
      transition: all 0.15s;
      min-height: 48px;
      border-top: 2px solid transparent;
    }
    .t-tab:hover { color: var(--text-primary); background: var(--bg-hover); }
    .t-tab.active {
      color: var(--cyan);
      border-top-color: var(--cyan);
      background: var(--cyan-dim);
    }
    .t-tab-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 6px var(--cyan);
      margin-left: 5px;
      vertical-align: middle;
    }

    /* ── 재고 로트 목록 ── */
    .lot-list-section {
      padding: 10px 16px 0;
      flex-shrink: 0;
    }
    .lot-list-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .lot-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-height: 180px;
      overflow-y: auto;
    }
    .lot-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--bg-surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      gap: 8px;
    }
    .lot-card:hover { border-color: var(--border-bright); background: var(--bg-hover); }
    .lot-card.selected { border-color: var(--cyan); background: var(--cyan-dim); }
    .lot-card-rank {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--amber-dim);
      border: 1px solid rgba(245,158,11,0.4);
      color: var(--amber);
      font-size: 0.7rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .lot-card.selected .lot-card-rank { background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); }
    .lot-card-body { flex: 1; min-width: 0; }
    .lot-card-date {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
    }
    .lot-card-loc {
      font-size: 0.74rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .lot-card-qty {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--cyan);
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
    }
    .lot-empty {
      padding: 10px 0;
      font-size: 0.82rem;
      color: var(--text-secondary);
      text-align: center;
    }

    /* ── 수량 입력 ── */
    .qty-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .qty-label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      white-space: nowrap;
      min-width: 32px;
    }
    .qty-input {
      flex: 1;
      min-height: 46px;
      padding: 0 14px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--bg-surface);
      color: var(--text-primary);
      font-size: 1.1rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      text-align: right;
      -webkit-appearance: none;
    }
    .qty-input:focus { outline: none; border-color: var(--cyan); background: var(--bg-hover); }
    .qty-hint {
      font-size: 0.74rem;
      color: var(--text-secondary);
      text-align: right;
      margin-bottom: 6px;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }
  </style>
</head>
<body>
  <!-- 헤더 -->
  <header class="t-header">
    <div class="t-header-logo">WMS</div>
    <div class="t-header-title">출고처리</div>
    <div class="t-header-right">
      <span class="t-worker-name" id="workerName"></span>
      <button class="t-logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </header>

  <!-- 바디 -->
  <div class="t-body">
    <!-- 좌측: 출고 예정 목록 -->
    <div class="left-panel">
      <div class="left-panel-title">출고 예정</div>
      <div class="schedule-list" id="scheduleList"></div>
    </div>

    <!-- 우측: 출고 위치 + 제어 -->
    <div class="right-panel" id="rightPanel">
      <div class="right-empty" id="rightEmpty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <span>좌측에서 출고 항목을 선택하세요</span>
      </div>
      <div id="rightContent" style="display:none; flex:1; flex-direction:column; min-height:0; overflow:hidden;">
        <!-- 타입 토글 -->
        <div class="type-toggle-bar">
          <span class="type-toggle-label">창고 타입</span>
          <div class="type-toggle-btns">
            <button class="type-btn" id="btnTypeNormal" onclick="setWhType('normal')">일반창고</button>
            <button class="type-btn" id="btnTypeElectric" onclick="setWhType('electric')">전동창고</button>
          </div>
        </div>

        <!-- 재고 로트 선택 (FIFO 순) -->
        <div class="lot-list-section" id="lotListSection">
          <div class="lot-list-label">재고 로트 선택 (선입선출 순)</div>
          <div class="lot-list" id="lotList"></div>
        </div>

        <!-- FIFO 위치 표시 -->
        <div class="fifo-location-block" id="fifoLocationBlock"></div>

        <!-- 제어 영역 -->
        <div class="control-area" id="controlArea"></div>

        <!-- 출고 확정 버튼 -->
        <div class="confirm-bar">
          <div class="qty-row">
            <label class="qty-label" for="outboundQty">수량</label>
            <input type="number" id="outboundQty" class="qty-input" min="1" placeholder="0" oninput="updateConfirmBtn()">
          </div>
          <div class="qty-hint" id="outboundQtyHint"></div>
          <button class="confirm-btn" id="confirmBtn" onclick="executeOutbound()">출고 확정</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 하단 탭바 -->
  <nav class="t-tabbar">
    <a class="t-tab" href="inbound.html">입고처리</a>
    <span class="t-tab active">출고처리<span class="t-tab-dot"></span></span>
    <button class="t-tab" onclick="doLogout()">로그아웃</button>
  </nav>

  <script>
    // ── 인증 체크 ──
    const _user = getCurrentUser();
    if (!_user) window.location.href = 'login.html';
    else document.getElementById('workerName').textContent = _user.name;

    function doLogout() {
      localStorage.removeItem('wms_user');
      window.location.href = 'login.html';
    }

    // ── 상태 ──
    let selectedId = null;       // 출고 예정 스케줄 id
    let selectedLotId = null;    // 선택된 재고 로트(inventoryItem) id
    let currentWhType = 'normal';
    let elecStatus = 'idle';

    // ── 제품별 재고 로트 목록 (FIFO 순) ──
    function getProductLots(scheduleId) {
      if (!scheduleId) return [];
      const sched = outboundSchedules.find(s => s.id === scheduleId);
      if (!sched) return [];
      return inventoryItems
        .filter(i => i.product_id === sched.product_id)
        .map(i => {
          const pallet = pallets.find(p => p.id === i.pallet_id);
          if (!pallet) return null;
          const [rId, floor, kan] = pallet.location.split('-').map(Number);
          const rack = racks.find(r => r.id === rId);
          return { ...i, pallet, rackId: rId, floor, kan, rack };
        })
        .filter(Boolean)
        .sort((a, b) => a.received_at.localeCompare(b.received_at));
    }

    // ── 출고 예정 목록 렌더링 ──
    function renderScheduleList() {
      const pending = outboundSchedules.filter(s => s.status === 'pending');
      const el = document.getElementById('scheduleList');
      if (pending.length === 0) {
        el.innerHTML = '<div class="sched-empty">출고 예정 항목이 없습니다</div>';
        return;
      }
      el.innerHTML = pending.map(s => {
        const prod = products.find(p => p.id === s.product_id);
        const isSel = s.id === selectedId;
        const lotCount = getProductLots(s.id).length;
        return `
          <div class="sched-card ${isSel ? 'selected' : ''}" onclick="selectSchedule(${s.id})">
            <div class="sched-card-header">
              <div class="sched-card-name">${prod ? prod.name : '알 수 없음'}</div>
              ${lotCount > 0 ? `<span class="fifo-badge">FIFO · ${lotCount}로트</span>` : ''}
            </div>
            <div class="sched-card-sku">${prod ? prod.code : '-'}</div>
            <div class="sched-card-meta">
              <span><span class="sched-qty">${s.quantity.toLocaleString()}개</span></span>
              <span>${s.scheduled_date}</span>
              ${s.note ? `<span class="sched-dest">${s.note}</span>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    // ── 출고 예정 선택 ──
    function selectSchedule(id) {
      selectedId = selectedId === id ? null : id;
      selectedLotId = null;
      elecStatus = 'idle';
      renderScheduleList();
      renderRight();
    }

    // ── 로트 선택 ──
    function selectLot(lotId) {
      selectedLotId = selectedLotId === lotId ? null : lotId;
      elecStatus = 'idle';
      renderLotList();
      renderFifoLocation();
      renderControlArea();
      updateConfirmBtn();
    }

    // ── 창고 타입 토글 ──
    function setWhType(type) {
      currentWhType = type;
      elecStatus = 'idle';
      document.getElementById('btnTypeNormal').classList.toggle('active', type === 'normal');
      document.getElementById('btnTypeElectric').classList.toggle('active', type === 'electric');
      renderControlArea();
    }

    // ── 우측 패널 렌더링 ──
    function renderRight() {
      const empty = document.getElementById('rightEmpty');
      const content = document.getElementById('rightContent');

      if (!selectedId) {
        empty.style.display = '';
        content.style.display = 'none';
        return;
      }

      empty.style.display = 'none';
      content.style.display = 'flex';

      document.getElementById('btnTypeNormal').classList.toggle('active', currentWhType === 'normal');
      document.getElementById('btnTypeElectric').classList.toggle('active', currentWhType === 'electric');

      renderLotList();
      renderFifoLocation();
      renderControlArea();
      updateConfirmBtn();
    }

    // ── 재고 로트 목록 렌더링 ──
    function renderLotList() {
      const el = document.getElementById('lotList');
      if (!selectedId) { el.innerHTML = ''; return; }

      const lots = getProductLots(selectedId);
      if (lots.length === 0) {
        el.innerHTML = '<div class="lot-empty">재고가 없습니다</div>';
        return;
      }

      el.innerHTML = lots.map((lot, idx) => {
        const rackNo = lot.rack ? lot.rack.rack_no : lot.rackId;
        const isSel = lot.id === selectedLotId;
        return `
          <div class="lot-card ${isSel ? 'selected' : ''}" onclick="selectLot(${lot.id})">
            <div class="lot-card-rank">${idx + 1}</div>
            <div class="lot-card-body">
              <div class="lot-card-date">입고 ${lot.received_at}</div>
              <div class="lot-card-loc">${rackNo}번 랙 · ${lot.floor}층 · ${lot.kan}칸</div>
            </div>
            <div class="lot-card-qty">${lot.quantity.toLocaleString()}개</div>
          </div>
        `;
      }).join('');
    }

    // ── 선택된 로트 위치 표시 ──
    function renderFifoLocation() {
      const block = document.getElementById('fifoLocationBlock');
      if (!selectedLotId) {
        block.innerHTML = '<div class="fifo-location-empty">위의 목록에서 출고할 로트를 선택하세요</div>';
        return;
      }
      const lots = getProductLots(selectedId);
      const lot = lots.find(l => l.id === selectedLotId);
      if (!lot) { block.innerHTML = ''; return; }
      const rackNo = lot.rack ? lot.rack.rack_no : lot.rackId;

      block.innerHTML = `
        <div class="fifo-location-label">출고 위치</div>
        <div class="fifo-location-main">
          <div class="fifo-loc-item">
            <div class="fifo-loc-value">${rackNo}</div>
            <div class="fifo-loc-unit">번 랙</div>
          </div>
          <div class="fifo-loc-sep">·</div>
          <div class="fifo-loc-item">
            <div class="fifo-loc-value">${lot.floor}</div>
            <div class="fifo-loc-unit">층</div>
          </div>
          <div class="fifo-loc-sep">·</div>
          <div class="fifo-loc-item">
            <div class="fifo-loc-value">${lot.kan}</div>
            <div class="fifo-loc-unit">칸</div>
          </div>
          <div class="fifo-loc-item" style="margin-left:8px;">
            <div class="fifo-loc-value" style="font-size:1.4rem;">${lot.quantity.toLocaleString()}</div>
            <div class="fifo-loc-unit">개</div>
          </div>
        </div>
        <div class="fifo-received">입고일: <span>${lot.received_at}</span></div>
      `;
    }

    // ── 제어 영역 렌더링 ──
    function renderControlArea() {
      const area = document.getElementById('controlArea');
      if (!selectedId || !selectedLotId) { area.innerHTML = ''; return; }

      const sched = outboundSchedules.find(s => s.id === selectedId);
      const prod = products.find(p => p.id === sched.product_id);
      const lots = getProductLots(selectedId);
      const lot = lots.find(l => l.id === selectedLotId);

      if (currentWhType === 'normal') {
        renderNormalControl(area, prod, lot);
      } else {
        renderElectricControl(area, prod, lot);
      }
    }

    function renderNormalControl(area, prod, lot) {
      if (!lot) { area.innerHTML = ''; return; }
      const rackNo = lot.rack ? lot.rack.rack_no : lot.rackId;
      area.innerHTML = `
        <div class="normal-location-card">
          <div class="normal-location-card-title">위치 확인</div>
          <div class="normal-rows">
            <div class="normal-row">
              <span class="normal-row-label">상품명</span>
              <span class="normal-row-value">${prod ? prod.name : '-'}</span>
            </div>
            <div class="normal-row">
              <span class="normal-row-label">SKU</span>
              <span class="normal-row-value">${prod ? prod.code : '-'}</span>
            </div>
            <div class="normal-row">
              <span class="normal-row-label">랙 번호</span>
              <span class="normal-row-value highlight">${rackNo}번</span>
            </div>
            <div class="normal-row">
              <span class="normal-row-label">층 / 칸</span>
              <span class="normal-row-value highlight">${lot.floor}층 · ${lot.kan}칸</span>
            </div>
            <div class="normal-row">
              <span class="normal-row-label">입고일 (FIFO)</span>
              <span class="normal-row-value">${lot.received_at}</span>
            </div>
            <div class="normal-row">
              <span class="normal-row-label">재고 수량</span>
              <span class="normal-row-value highlight">${lot.quantity.toLocaleString()}개</span>
            </div>
          </div>
        </div>
      `;
    }

    function renderElectricControl(area, prod, lot) {
      if (!lot) { area.innerHTML = ''; return; }
      const rackNo = lot.rack ? lot.rack.rack_no : lot.rackId;

      const statusHtml = elecStatus === 'idle'
        ? '<div class="elec-status">대기 중 — [열기] 버튼을 눌러 전동랙을 이동하세요</div>'
        : elecStatus === 'running'
        ? '<div class="elec-status active">전동랙 이동 중... [멈춤]을 눌러 정지할 수 있습니다</div>'
        : '<div class="elec-status stopped">정지됨 — 위치를 확인 후 출고 확정하세요</div>';

      area.innerHTML = `
        <div class="electric-panel">
          <div class="electric-panel-title">전동랙 제어</div>
          <div class="electric-btns">
            <button class="elec-btn elec-btn-open" onclick="elecOpen()">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="5 12 12 5 19 12"/><line x1="12" y1="5" x2="12" y2="19"/></svg>
              열기
            </button>
            <button class="elec-btn elec-btn-stop" onclick="elecStop()">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
              멈춤
            </button>
          </div>
          ${statusHtml}
        </div>
        <div class="fifo-highlight-row">
          <div class="fifo-highlight-dot"></div>
          <div class="fifo-highlight-text">
            출고 위치: <strong>${rackNo}번 랙 · ${lot.floor}층 · ${lot.kan}칸</strong>
            &nbsp;(재고 ${lot.quantity.toLocaleString()}개 / 입고 ${lot.received_at})
          </div>
        </div>
      `;
    }

    function elecOpen() { elecStatus = 'running'; renderControlArea(); }
    function elecStop() { elecStatus = 'stopped'; renderControlArea(); }

    // ── 확정 버튼 상태 ──
    function updateConfirmBtn() {
      const btn = document.getElementById('confirmBtn');
      const hint = document.getElementById('outboundQtyHint');
      const qtyInput = document.getElementById('outboundQty');
      if (!btn) return;

      if (selectedLotId) {
        const lots = getProductLots(selectedId);
        const lot = lots.find(l => l.id === selectedLotId);
        if (lot) {
          hint.textContent = `재고 수량: ${lot.quantity.toLocaleString()}개 (최대)`;
          qtyInput.max = lot.quantity;
        }
      } else {
        hint.textContent = '';
      }

      const qty = parseInt(qtyInput.value, 10);
      const lots = selectedLotId ? getProductLots(selectedId) : [];
      const lot = lots.find(l => l.id === selectedLotId);
      const validQty = lot && !isNaN(qty) && qty > 0 && qty <= lot.quantity;
      btn.disabled = !(selectedId && selectedLotId && validQty);
    }

    // ── 출고 실행 ──
    function executeOutbound() {
      if (!selectedId || !selectedLotId) return;
      const s = outboundSchedules.find(x => x.id === selectedId);
      const p = products.find(x => x.id === s.product_id);
      const lots = getProductLots(selectedId);
      const lot = lots.find(l => l.id === selectedLotId);
      const qty = parseInt(document.getElementById('outboundQty').value, 10);
      if (!lot || isNaN(qty) || qty <= 0 || qty > lot.quantity) return;
      const rackNo = lot.rack ? lot.rack.rack_no : lot.rackId;
      alert(`출고 완료!\n${p ? p.name : ''} ${qty.toLocaleString()}개\n입고일: ${lot.received_at}\n\n출고 위치: ${rackNo}번 랙 · ${lot.floor}층 · ${lot.kan}칸\n\n(데모: 실제 저장 없음)`);
      selectedId = null;
      selectedLotId = null;
      elecStatus = 'idle';
      document.getElementById('outboundQty').value = '';
      document.getElementById('outboundQtyHint').textContent = '';
      renderScheduleList();
      renderRight();
    }

    // ── 초기화 ──
    renderScheduleList();
    renderRight();
  </script>
</body>
</html>
