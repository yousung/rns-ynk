<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>창고 관리 시스템 - 로그인</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="data.js"></script>
  <script src="shared.js"></script>
  <style>
    :root {
      --bg-base:#070C14; --bg-panel:#0D1626; --bg-surface:#132035;
      --border:#1E3A5F; --border-bright:#2D5A8E;
      --cyan:#00D4FF; --cyan-dim:rgba(0,212,255,0.15); --cyan-glow:0 0 12px rgba(0,212,255,0.5);
      --text-primary:#E8F0FE; --text-secondary:#7B91AD;
    }
    [data-theme="light"] {
      --bg-base:#F0F4F8; --bg-panel:#FFFFFF; --bg-surface:#F1F5F9;
      --border:#CBD5E1; --border-bright:#94A3B8;
      --cyan:#0284C7; --cyan-dim:rgba(2,132,199,0.12); --cyan-glow:0 0 12px rgba(2,132,199,0.3);
      --text-primary:#1E293B; --text-secondary:#64748B;
    }
    [data-theme="light"] body {
      background-image:
        radial-gradient(ellipse at 30% 50%, rgba(2,132,199,0.05) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 50%, rgba(100,150,200,0.05) 0%, transparent 60%),
        linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
    }
    [data-theme="light"] .login-card {
      box-shadow: 0 0 40px rgba(2,132,199,0.08), 0 20px 60px rgba(0,0,0,0.1);
    }
    * { word-break: keep-all; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: var(--bg-base);
      background-image:
        radial-gradient(ellipse at 30% 50%, rgba(0,212,255,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 50%, rgba(0,100,200,0.08) 0%, transparent 60%),
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
    }
    .login-card {
      background: var(--bg-panel);
      border: 1px solid var(--border-bright);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 40px rgba(0,212,255,0.1), 0 20px 60px rgba(0,0,0,0.5);
    }
    .login-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--cyan);
      text-align: center;
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(0,212,255,0.5);
      letter-spacing: -0.02em;
    }
    .login-sub {
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 32px;
    }
    label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
    input {
      width: 100%; background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 10px 14px; color: var(--text-primary);
      font-size: 0.875rem; box-sizing: border-box; outline: none;
    }
    input:focus { border-color: var(--cyan); box-shadow: 0 0 0 2px rgba(0,212,255,0.15); }
    .mb-5 { margin-bottom: 20px; }
    .btn-login {
      width: 100%; background: var(--cyan); color: #000; padding: 12px;
      border-radius: 6px; font-weight: 700; font-size: 0.95rem; cursor: pointer;
      border: none; transition: all 0.2s; margin-top: 8px;
    }
    .btn-login:hover { background: #00b8d9; box-shadow: 0 0 20px rgba(0,212,255,0.4); }
    .hint { text-align: center; font-size: 0.78rem; color: var(--text-secondary); margin-top: 16px; }
    .error-msg { color: #EF4444; font-size: 0.8rem; text-align: center; margin-top: 12px; display: none; }
    .back-link { margin-top: 20px; font-size: 0.78rem; color: var(--text-secondary); text-decoration: none; }
    .back-link:hover { color: var(--cyan); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-title">관리용 웹 로그인</div>
    <div class="login-sub">Warehouse Management System</div>
    <div class="mb-5">
      <label>이메일</label>
      <input type="email" id="loginEmail" placeholder="이메일 입력" onkeydown="if(event.key==='Enter') login()">
    </div>
    <div class="mb-5">
      <label>비밀번호</label>
      <input type="password" id="loginPassword" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter') login()">
    </div>
    <button class="btn-login" onclick="login()">로그인</button>
    <div class="hint">데모용: 아무 값이나 입력 후 로그인</div>
    <div class="error-msg" id="errorMsg">로그인에 실패했습니다.</div>
  </div>
  <a href="index.html" class="back-link">← 플랫폼 선택으로 돌아가기</a>

  <script>
    if (getCurrentUser()) {
      window.location.href = 'samples/type-b/inbound-execute.html';
    }

    function login() {
      const email = document.getElementById('loginEmail').value.trim();
      if (!email) {
        document.getElementById('errorMsg').style.display = 'block';
        document.getElementById('errorMsg').textContent = '이메일을 입력하세요.';
        return;
      }
      const user = users.find(u => u.email === email) || users[1];
      localStorage.setItem('wms_user', JSON.stringify(user));
      window.location.href = 'samples/type-b/inbound-execute.html';
    }
  </script>
</body>
</html>
