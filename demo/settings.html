<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>계정 설정 - 창고 관리 시스템</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="data.js"></script><script src="shared.js"></script>
  <style id="commonStyle"></style>
  <style>
    .settings-section {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .settings-section h2 {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    .form-row.single { grid-template-columns: 1fr; }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 9px 12px;
      color: var(--text-primary);
      font-size: 0.875rem;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--cyan);
      box-shadow: 0 0 0 2px var(--cyan-dim);
    }
    .form-group input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .section-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    /* 테마 토글 */
    .theme-options {
      display: flex;
      gap: 12px;
      margin-bottom: 8px;
    }
    .theme-card {
      flex: 1;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .theme-card:hover { border-color: var(--border-bright); }
    .theme-card.selected {
      border-color: var(--cyan);
      background: var(--cyan-dim);
    }
    .theme-preview {
      width: 44px;
      height: 36px;
      border-radius: 6px;
      border: 1px solid var(--border);
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
    }
    .theme-preview-dark {
      background: #070C14;
    }
    .theme-preview-dark::after {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 40%;
      background: #0D1626;
      border-right: 1px solid #1E3A5F;
    }
    .theme-preview-light {
      background: #F0F4F8;
    }
    .theme-preview-light::after {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 40%;
      background: #FFFFFF;
      border-right: 1px solid #CBD5E1;
    }
    .theme-card-label { font-size: 0.875rem; font-weight: 600; color: var(--text-primary); }
    .theme-card-desc { font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px; }
    .theme-check {
      margin-left: auto;
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 0.7rem;
    }
    .theme-card.selected .theme-check {
      background: var(--cyan);
      border-color: var(--cyan);
      color: #000;
    }

    /* 토스트 */
    #toast {
      position: fixed;
      bottom: 32px; right: 32px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-left: 3px solid var(--green);
      border-radius: 8px;
      padding: 14px 20px;
      font-size: 0.875rem;
      color: var(--text-primary);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.25s;
      pointer-events: none;
      z-index: 1000;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <div class="app-layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-area">
      <div class="header-bar"><h1>계정 설정</h1></div>
      <div class="content-area" style="max-width:720px;">

        <!-- 프로필 -->
        <div class="settings-section">
          <h2>프로필</h2>
          <div class="form-row">
            <div class="form-group">
              <label>이름</label>
              <input type="text" id="inputName" placeholder="이름">
            </div>
            <div class="form-group">
              <label>이메일</label>
              <input type="email" id="inputEmail" placeholder="이메일" disabled>
            </div>
          </div>
          <div class="form-row single">
            <div class="form-group">
              <label>역할</label>
              <input type="text" id="inputRole" disabled>
            </div>
          </div>
          <div class="section-footer">
            <button class="btn-primary" onclick="saveProfile()">저장</button>
          </div>
        </div>

        <!-- 보안 -->
        <div class="settings-section">
          <h2>보안</h2>
          <div class="form-row single">
            <div class="form-group">
              <label>현재 비밀번호</label>
              <input type="password" id="inputCurrentPw" placeholder="현재 비밀번호 입력">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>새 비밀번호</label>
              <input type="password" id="inputNewPw" placeholder="새 비밀번호 입력">
            </div>
            <div class="form-group">
              <label>새 비밀번호 확인</label>
              <input type="password" id="inputConfirmPw" placeholder="새 비밀번호 재입력">
            </div>
          </div>
          <div class="section-footer">
            <button class="btn-primary" onclick="savePassword()">변경</button>
          </div>
        </div>

        <!-- 화면 설정 -->
        <div class="settings-section">
          <h2>화면 설정</h2>
          <div class="theme-options" id="themeOptions">
            <div class="theme-card" id="card-dark" onclick="selectTheme('dark')">
              <div class="theme-preview theme-preview-dark"></div>
              <div>
                <div class="theme-card-label">다크 모드</div>
                <div class="theme-card-desc">어두운 배경, 눈의 피로 감소</div>
              </div>
              <div class="theme-check" id="check-dark">✓</div>
            </div>
            <div class="theme-card" id="card-light" onclick="selectTheme('light')">
              <div class="theme-preview theme-preview-light"></div>
              <div>
                <div class="theme-card-label">라이트 모드</div>
                <div class="theme-card-desc">밝은 배경, 선명한 가독성</div>
              </div>
              <div class="theme-check" id="check-light">✓</div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    document.getElementById('commonStyle').textContent = getCommonStyles();
    requireAuth();
    renderLayout('settings');

    // 프로필 초기값 채우기
    const user = getCurrentUser();
    if (user) {
      document.getElementById('inputName').value  = user.name  || '';
      document.getElementById('inputEmail').value = user.email || '';
      document.getElementById('inputRole').value  = getRoleText(user.role);
    }

    // 테마 카드 초기 상태
    updateThemeCards(getTheme());

    function selectTheme(theme) {
      setTheme(theme);
      updateThemeCards(theme);
    }

    function updateThemeCards(theme) {
      ['dark', 'light'].forEach(t => {
        document.getElementById('card-' + t).classList.toggle('selected', t === theme);
      });
    }

    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2500);
    }

    function saveProfile() {
      const name = document.getElementById('inputName').value.trim();
      if (!name) { showToast('이름을 입력해주세요.'); return; }
      showToast('프로필이 저장되었습니다. (데모)');
    }

    function savePassword() {
      const cur  = document.getElementById('inputCurrentPw').value;
      const nw   = document.getElementById('inputNewPw').value;
      const conf = document.getElementById('inputConfirmPw').value;
      if (!cur || !nw || !conf) { showToast('모든 항목을 입력해주세요.'); return; }
      if (nw !== conf) { showToast('새 비밀번호가 일치하지 않습니다.'); return; }
      if (nw.length < 8) { showToast('비밀번호는 8자 이상이어야 합니다.'); return; }
      document.getElementById('inputCurrentPw').value = '';
      document.getElementById('inputNewPw').value = '';
      document.getElementById('inputConfirmPw').value = '';
      showToast('비밀번호가 변경되었습니다. (데모)');
    }
  </script>
</body>
</html>
