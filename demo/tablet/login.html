<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>창고 관리 시스템 - 태블릿 로그인</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../data.js"></script>
  <script src="../shared.js"></script>
  <style>
    :root {
      --bg-base:#070C14; --bg-panel:#0D1626; --bg-surface:#132035;
      --border:#1E3A5F; --border-bright:#2D5A8E;
      --cyan:#00D4FF; --cyan-dim:rgba(0,212,255,0.15); --cyan-glow:0 0 12px rgba(0,212,255,0.5);
      --amber:#F59E0B; --green:#10B981;
      --text-primary:#E8F0FE; --text-secondary:#7B91AD;
    }
    [data-theme="light"] {
      --bg-base:#F0F4F8; --bg-panel:#FFFFFF; --bg-surface:#F1F5F9;
      --border:#CBD5E1; --border-bright:#94A3B8;
      --cyan:#0284C7; --cyan-dim:rgba(2,132,199,0.12); --cyan-glow:0 0 12px rgba(2,132,199,0.3);
      --text-primary:#1E293B; --text-secondary:#64748B;
    }
    [data-theme="light"] body {
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(2,132,199,0.06) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 30%, rgba(100,150,200,0.06) 0%, transparent 55%),
        linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
    }
    [data-theme="light"] .login-card {
      box-shadow: 0 0 60px rgba(2,132,199,0.08), 0 24px 80px rgba(0,0,0,0.1);
    }
    [data-theme="light"] .brand-panel {
      background: linear-gradient(145deg, rgba(2,132,199,0.08) 0%, rgba(2,132,199,0.03) 100%);
      border-right-color: var(--border);
    }
    [data-theme="light"] .feature-item {
      background: rgba(2,132,199,0.06);
      border-color: rgba(2,132,199,0.15);
    }
    * { word-break: keep-all; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: var(--bg-base);
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(0,212,255,0.1) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 30%, rgba(0,100,200,0.08) 0%, transparent 55%),
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
      padding: 24px;
    }

    /* 태블릿 배지 */
    .tablet-badge {
      position: fixed;
      top: 16px;
      right: 16px;
      background: var(--cyan-dim);
      border: 1px solid var(--cyan);
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--cyan);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.05em;
    }

    /* 로그인 카드 */
    .login-card {
      background: var(--bg-panel);
      border: 1px solid var(--border-bright);
      border-radius: 16px;
      width: 100%;
      max-width: 880px;
      min-height: 520px;
      display: flex;
      box-shadow: 0 0 60px rgba(0,212,255,0.1), 0 24px 80px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    /* 좌측 브랜딩 패널 */
    .brand-panel {
      flex: 1;
      background: linear-gradient(145deg, rgba(0,212,255,0.06) 0%, rgba(0,100,200,0.04) 100%);
      border-right: 1px solid var(--border);
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .brand-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .brand-icon {
      width: 48px;
      height: 48px;
      background: var(--cyan-dim);
      border: 1px solid var(--cyan);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .brand-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--cyan);
      text-shadow: var(--cyan-glow);
      line-height: 1.2;
    }
    .brand-sub {
      font-size: 0.78rem;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
    }
    .brand-desc {
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .feature-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .feature-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(0,212,255,0.05);
      border: 1px solid rgba(0,212,255,0.12);
      border-radius: 8px;
      font-size: 0.82rem;
      color: var(--text-secondary);
    }
    .feature-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--cyan);
      flex-shrink: 0;
      box-shadow: 0 0 6px rgba(0,212,255,0.6);
    }
    .tablet-app-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 32px;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.3);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.78rem;
      color: var(--green);
      font-family: 'JetBrains Mono', monospace;
    }
    .app-badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* 우측 로그인 폼 */
    .form-panel {
      width: 360px;
      flex-shrink: 0;
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .form-title {
      font-size: 1.375rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
    }
    .form-sub {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 36px;
    }
    .field-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }
    input {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 13px 16px;
      color: var(--text-primary);
      font-size: 1rem;
      outline: none;
      transition: all 0.2s;
      font-family: 'Noto Sans KR', sans-serif;
    }
    input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.12);
    }
    input::placeholder { color: var(--text-secondary); opacity: 0.6; }
    .btn-login {
      width: 100%;
      background: var(--cyan);
      color: #000;
      padding: 14px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      margin-top: 8px;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .btn-login:hover {
      background: #00b8d9;
      box-shadow: 0 0 24px rgba(0,212,255,0.4);
      transform: translateY(-1px);
    }
    .btn-login:active { transform: translateY(0); }
    .hint-box {
      margin-top: 20px;
      padding: 12px 16px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }
    .hint-box code {
      font-family: 'JetBrains Mono', monospace;
      color: var(--cyan);
      font-size: 0.72rem;
    }
    .error-msg {
      color: #EF4444;
      font-size: 0.8rem;
      text-align: center;
      margin-top: 12px;
      display: none;
      padding: 10px;
      background: rgba(239,68,68,0.08);
      border-radius: 6px;
      border: 1px solid rgba(239,68,68,0.2);
    }

    /* 태블릿 반응형 */
    @media (max-width: 768px) {
      body { padding: 16px; align-items: flex-start; padding-top: 60px; }
      .login-card { flex-direction: column; max-width: 100%; min-height: auto; }
      .brand-panel { padding: 32px 28px; border-right: none; border-bottom: 1px solid var(--border); }
      .form-panel { width: 100%; padding: 32px 28px; }
      .feature-list { display: none; }
      .brand-desc { margin-bottom: 0; }
    }

    @media (min-width: 769px) and (max-width: 1024px) {
      .login-card { max-width: 820px; }
      .form-panel { width: 320px; padding: 40px 32px; }
      .brand-panel { padding: 40px 32px; }
    }
  </style>
</head>
<body>
  <div class="tablet-badge">Tablet Demo</div>

  <div class="login-card">
    <!-- 좌측 브랜딩 패널 -->
    <div class="brand-panel">
      <div>
        <div class="brand-logo">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:26px;height:26px;">
              <rect x="2" y="7" width="20" height="14" rx="2"/>
              <path d="M16 3H8L6 7h12z"/>
              <line x1="12" y1="12" x2="12" y2="17"/>
              <line x1="9.5" y1="14.5" x2="14.5" y2="14.5"/>
            </svg>
          </div>
          <div>
            <div class="brand-name">창고 관리 시스템</div>
            <div class="brand-sub">Warehouse Management System</div>
          </div>
        </div>

        <p class="brand-desc">
          전동랙 창고의 입출고 및 재고를 실시간으로 관리하는<br>
          통합 창고 관리 솔루션입니다. 태블릿에 최적화된<br>
          현장 작업 환경을 제공합니다.
        </p>

        <div class="feature-list">
          <div class="feature-item">
            <span class="feature-dot"></span>
            실시간 입출고 처리 및 이력 관리
          </div>
          <div class="feature-item">
            <span class="feature-dot"></span>
            전동랙 랙 매트릭스 시각화
          </div>
          <div class="feature-item">
            <span class="feature-dot"></span>
            FIFO 기반 자동 위치 추천
          </div>
          <div class="feature-item">
            <span class="feature-dot"></span>
            재고 현황 및 상품 관리
          </div>
        </div>
      </div>

      <div class="tablet-app-badge">
        <span class="app-badge-dot"></span>
        태블릿 현장 작업 앱
      </div>
    </div>

    <!-- 우측 로그인 폼 -->
    <div class="form-panel">
      <div class="form-title">로그인</div>
      <div class="form-sub">계정 정보를 입력하여 시작하세요</div>

      <div class="field-group">
        <label for="loginEmail">이메일</label>
        <input
          type="email"
          id="loginEmail"
          placeholder="이메일 주소 입력"
          autocomplete="email"
          onkeydown="if(event.key==='Enter') document.getElementById('loginPassword').focus()"
        >
      </div>

      <div class="field-group">
        <label for="loginPassword">비밀번호</label>
        <input
          type="password"
          id="loginPassword"
          placeholder="비밀번호 입력"
          autocomplete="current-password"
          onkeydown="if(event.key==='Enter') login()"
        >
      </div>

      <button class="btn-login" onclick="login()">로그인</button>

      <div class="error-msg" id="errorMsg">이메일 또는 비밀번호를 확인해주세요.</div>

      <div class="hint-box">
        <div style="margin-bottom:4px;font-weight:600;">데모 계정</div>
        <div>이메일: <code>admin@wms.com</code></div>
        <div>비밀번호: <code>admin1234</code></div>
      </div>
    </div>
  </div>

  <script>
    // 이미 로그인된 경우 바로 이동
    if (getCurrentUser()) {
      window.location.href = 'inbound.html';
    }

    function login() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errEl = document.getElementById('errorMsg');

      errEl.style.display = 'none';

      if (!email) {
        errEl.textContent = '이메일을 입력하세요.';
        errEl.style.display = 'block';
        document.getElementById('loginEmail').focus();
        return;
      }
      if (!password) {
        errEl.textContent = '비밀번호를 입력하세요.';
        errEl.style.display = 'block';
        document.getElementById('loginPassword').focus();
        return;
      }

      if (email === 'admin@wms.com' && password === 'admin1234') {
        const user = users.find(u => u.email === email) || { email, name: '관리자', role: 'admin' };
        localStorage.setItem('wms_user', JSON.stringify(user));
        window.location.href = 'inbound.html';
      } else {
        errEl.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
        errEl.style.display = 'block';
        document.getElementById('loginPassword').value = '';
        document.getElementById('loginPassword').focus();
      }
    }
  </script>
</body>
</html>
