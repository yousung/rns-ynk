<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>출고 처리 (평면도) - 창고 관리 시스템</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../../data.js"></script>
  <script src="shared.js"></script>
  <style id="commonStyle"></style>
  <style>
    .plan-wrap { overflow: auto; }
    .sched-item { padding:10px 12px; border-radius:6px; cursor:pointer; transition:all 0.15s; border-left:3px solid transparent; }
    .sched-item:hover { background:var(--bg-hover); }
    .sched-item.active { background:var(--cyan-dim); border-left-color:var(--cyan); color:var(--cyan); }
    .slot-btn { display:inline-flex; align-items:center; justify-content:center; flex-direction:column;
      width:64px; height:52px; border-radius:6px; border:1px solid var(--border); cursor:pointer;
      font-size:0.72rem; gap:2px; transition:all 0.15s; background:var(--bg-surface); color:var(--text-secondary); }
    .slot-btn.filled { background:rgba(245,158,11,0.12); border-color:rgba(245,158,11,0.4); color:var(--amber); }
    .slot-btn.fifo1 { background:rgba(0,255,150,0.15); border-color:#00c878; color:#00c878; box-shadow:0 0 6px rgba(0,200,120,0.3); }
    .slot-btn.fifo2 { background:rgba(0,212,255,0.15); border-color:var(--cyan); color:var(--cyan); }
    .slot-btn.fifon { background:rgba(100,180,255,0.12); border-color:rgba(100,180,255,0.5); color:rgba(100,180,255,0.9); }
    .slot-btn.selected { outline:2px solid var(--green); outline-offset:2px; }
    .legend-dot { width:12px; height:12px; border-radius:2px; flex-shrink:0; }
  </style>
</head>
<body>
  <div class="app-layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-area">
      <div class="header-bar">
        <h1>출고 처리</h1>
        <span style="font-size:0.78rem;color:var(--text-secondary);background:var(--bg-surface);padding:3px 10px;border-radius:4px;border:1px solid var(--border);">C — 평면도</span>
      </div>
      <div class="content-area">
        <div style="display:flex;gap:6px;margin-bottom:16px;" id="whTabs"></div>
        <div style="display:flex;gap:16px;">
          <!-- 예정 목록 -->
          <div style="width:190px;flex-shrink:0;">
            <div class="card" style="padding:16px;">
              <h3 style="font-size:0.85rem;font-weight:700;margin-bottom:12px;">출고 예정 목록</h3>
              <div id="schedList" style="display:flex;flex-direction:column;gap:6px;"></div>
            </div>
          </div>
          <!-- 평면도 + 상세 -->
          <div style="flex:1;display:flex;flex-direction:column;gap:12px;min-width:0;">
            <div class="card" style="padding:16px;">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
                <span style="font-size:0.85rem;font-weight:700;">평면도 — 랙 배치</span>
                <div style="display:flex;gap:10px;align-items:center;font-size:0.72rem;color:var(--text-secondary);">
                  <span style="display:flex;align-items:center;gap:4px;"><span class="legend-dot" style="background:rgba(0,255,150,0.5);border:1px solid #00c878;"></span>FIFO 1순위</span>
                  <span style="display:flex;align-items:center;gap:4px;"><span class="legend-dot" style="background:rgba(0,212,255,0.4);border:1px solid var(--cyan);"></span>FIFO 2순위</span>
                  <span style="display:flex;align-items:center;gap:4px;"><span class="legend-dot" style="background:rgba(100,180,255,0.3);border:1px solid rgba(100,180,255,0.5);"></span>기타 재고</span>
                  <span style="display:flex;align-items:center;gap:4px;"><span class="legend-dot" style="background:rgba(94,226,198,0.25);border:1px solid rgba(94,226,198,0.4);"></span>비어있음</span>
                </div>
              </div>
              <div class="plan-wrap">
                <svg id="planSvg" viewBox="0 0 800 300" width="800" height="300"></svg>
              </div>
            </div>
            <div id="slotDetailCard" class="card" style="display:none;padding:16px;">
              <h4 style="font-size:0.85rem;font-weight:700;margin-bottom:12px;" id="slotDetailTitle"></h4>
              <div id="slotGrid" style="display:flex;flex-direction:column;gap:8px;"></div>
            </div>
            <div id="actionCard" class="card" style="display:none;padding:16px;">
              <h4 style="font-size:0.85rem;font-weight:700;margin-bottom:8px;">출고 실행</h4>
              <p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:12px;" id="actionInfo"></p>
              <button class="btn-success" onclick="executeOutbound()">출고 실행</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('commonStyle').textContent = getCommonStyles();
    requireAuth();
    renderLayout('outbound-execute');

    let selWh = 3, selSchedId = null, selRackId = null, selSlotKey = null;
    const RACK_W = 42, RACK_G = 6, GROUP_H = 22, PAD_L = 44, BACK_Y = 28, FRONT_Y = 170;

    function heatColor(rate) {
      if (rate <= 0) return 'rgba(94,226,198,0.25)';
      if (rate < 0.34) return 'rgba(0,212,255,0.4)';
      if (rate < 0.67) return 'rgba(245,158,11,0.5)';
      return 'rgba(248,113,113,0.65)';
    }

    function getFifoRank(rackId, productId) {
      // Returns sorted pallets with product in rack (FIFO: lowest pallet id = oldest)
      const productPalletIds = new Set(inventoryItems.filter(i => i.product_id === productId).map(i => i.pallet_id));
      return pallets
        .filter(p => parseInt(p.location.split('-')[0]) === rackId && productPalletIds.has(p.id))
        .sort((a, b) => a.id - b.id);
    }

    function renderWhTabs() {
      document.getElementById('whTabs').innerHTML = warehouses.map(w =>
        `<button onclick="selWh=${w.id};renderAll()" style="padding:5px 14px;border-radius:5px;font-size:0.82rem;font-weight:600;cursor:pointer;border:1px solid ${w.id===selWh?'var(--cyan)':'var(--border)'};background:${w.id===selWh?'var(--cyan-dim)':'var(--bg-surface)'};color:${w.id===selWh?'var(--cyan)':'var(--text-secondary)'};">${w.name}</button>`
      ).join('');
    }

    function renderSchedList() {
      const pending = outboundSchedules.filter(s => s.status === 'pending');
      document.getElementById('schedList').innerHTML = pending.map(s => {
        const p = products.find(pr => pr.id === s.product_id);
        return `<div class="sched-item ${s.id===selSchedId?'active':''}" onclick="selSchedId=${s.id};selRackId=null;selSlotKey=null;renderAll()">
          <div style="font-weight:600;font-size:0.82rem;">${p.name}</div>
          <div style="font-size:0.72rem;margin-top:2px;">${s.quantity}개 · ${s.scheduled_date}</div>
        </div>`;
      }).join('') || '<div style="font-size:0.78rem;color:var(--text-secondary);">예정 없음</div>';
    }

    function renderPlanSvg() {
      const whRacks = racks.filter(r => r.warehouse_id === selWh);
      const sched = selSchedId ? outboundSchedules.find(s => s.id === selSchedId) : null;
      const productPalletIds = sched
        ? new Set(inventoryItems.filter(i => i.product_id === sched.product_id).map(i => i.pallet_id))
        : null;

      // Get FIFO ranked pallets for product
      let fifoRanked = [];
      if (sched) {
        fifoRanked = pallets
          .filter(p => productPalletIds.has(p.id))
          .sort((a, b) => a.id - b.id);
      }
      const fifo1Id = fifoRanked[0]?.id;
      const fifo2Id = fifoRanked[1]?.id;

      let svg = '';
      svg += `<text x="4" y="${FRONT_Y + 44 + 4}" fill="var(--text-secondary)" font-size="9" text-anchor="middle" transform="rotate(-90,14,${FRONT_Y + 44})">전면(R01~15)</text>`;
      svg += `<text x="4" y="${BACK_Y + 44 + 4}" fill="var(--text-secondary)" font-size="9" text-anchor="middle" transform="rotate(-90,14,${BACK_Y + 44})">후면(R16~30)</text>`;
      const aisleY = BACK_Y + 4 * GROUP_H + 10;
      svg += `<text x="400" y="${aisleY + 15}" text-anchor="middle" fill="var(--text-secondary)" font-size="10" opacity="0.5">← 통 로 →</text>`;
      svg += `<text x="400" y="292" text-anchor="middle" fill="var(--cyan)" font-size="11" opacity="0.8">▼ 입구 / 출구</text>`;
      svg += `<line x1="200" y1="285" x2="600" y2="285" stroke="var(--cyan)" stroke-width="1" opacity="0.3" stroke-dasharray="4,3"/>`;

      whRacks.forEach(rack => {
        const isFront = rack.rack_no <= 15;
        const idx = isFront ? rack.rack_no - 1 : rack.rack_no - 16;
        const x = PAD_L + idx * (RACK_W + RACK_G);
        const baseY = isFront ? FRONT_Y : BACK_Y;
        const rackDepth = rack.groups * GROUP_H;
        const palletsInRack = pallets.filter(p => parseInt(p.location.split('-')[0]) === rack.id);
        const isSelected = rack.id === selRackId;

        // Check FIFO rank for this rack
        const rackFifo1 = palletsInRack.find(p => p.id === fifo1Id);
        const rackFifo2 = palletsInRack.find(p => p.id === fifo2Id);
        const hasProduct = productPalletIds && palletsInRack.some(p => productPalletIds.has(p.id));

        for (let g = 1; g <= rack.groups; g++) {
          const gy = isFront ? baseY + (g - 1) * GROUP_H : baseY + (rack.groups - g) * GROUP_H;
          const gPallets = palletsInRack.filter(p => parseInt(p.location.split('-')[2]) === g);
          let fill = heatColor(gPallets.length / Math.max(rack.floors, 1));
          // FIFO override
          if (rackFifo1 && parseInt(rackFifo1.location.split('-')[2]) === g) fill = 'rgba(0,255,150,0.45)';
          else if (rackFifo2 && parseInt(rackFifo2.location.split('-')[2]) === g) fill = 'rgba(0,212,255,0.45)';
          svg += `<rect x="${x}" y="${gy}" width="${RACK_W}" height="${GROUP_H}" fill="${fill}" stroke="rgba(30,58,95,0.6)" stroke-width="0.5"/>`;
        }

        if (isSelected) {
          svg += `<rect x="${x-2}" y="${baseY-2}" width="${RACK_W+4}" height="${rackDepth+4}" fill="none" stroke="var(--cyan)" stroke-width="2" rx="3"/>`;
        } else if (rackFifo1) {
          svg += `<rect x="${x-1}" y="${baseY-1}" width="${RACK_W+2}" height="${rackDepth+2}" fill="none" stroke="#00c878" stroke-width="2" rx="2"/>`;
        } else if (hasProduct) {
          svg += `<rect x="${x-1}" y="${baseY-1}" width="${RACK_W+2}" height="${rackDepth+2}" fill="none" stroke="var(--amber)" stroke-width="1" rx="2" stroke-dasharray="3,2"/>`;
        }

        const labelY = isFront ? baseY + rackDepth + 13 : baseY - 5;
        svg += `<text x="${x + RACK_W/2}" y="${labelY}" text-anchor="middle" fill="${isSelected?'var(--cyan)':rackFifo1?'#00c878':hasProduct?'var(--amber)':'var(--text-secondary)'}" font-size="9.5" font-weight="${(isSelected||rackFifo1)?'700':'400'}">${rack.rack_no}</text>`;
        svg += `<rect x="${x}" y="${baseY}" width="${RACK_W}" height="${rackDepth}" fill="transparent" onclick="selectRack(${rack.id})" style="cursor:pointer;"/>`;
      });

      document.getElementById('planSvg').innerHTML = svg;
    }

    function selectRack(rackId) {
      selRackId = selRackId === rackId ? null : rackId;
      selSlotKey = null;
      renderAll();
    }

    function renderSlotDetail() {
      if (!selRackId) {
        document.getElementById('slotDetailCard').style.display = 'none';
        document.getElementById('actionCard').style.display = 'none';
        return;
      }
      const rack = racks.find(r => r.id === selRackId);
      const sched = selSchedId ? outboundSchedules.find(s => s.id === selSchedId) : null;
      const productPalletIds = sched
        ? new Set(inventoryItems.filter(i => i.product_id === sched.product_id).map(i => i.pallet_id))
        : null;

      let fifoRanked = [];
      if (sched) {
        fifoRanked = pallets.filter(p => productPalletIds.has(p.id)).sort((a,b)=>a.id-b.id);
      }

      document.getElementById('slotDetailTitle').textContent = `${rack.rack_no}번 랙 — 층별 슬롯 (${rack.floors}층 × ${rack.groups}칸)`;

      let html = '';
      for (let fl = rack.floors; fl >= 1; fl--) {
        html += `<div style="display:flex;align-items:center;gap:8px;">
          <div style="width:32px;font-size:0.75rem;font-weight:600;color:var(--text-secondary);flex-shrink:0;">${fl}F</div>
          <div style="display:flex;gap:6px;">`;
        for (let g = 1; g <= rack.groups; g++) {
          const key = `${rack.id}-${fl}-${g}`;
          const pallet = pallets.find(p => p.location === key);
          const items = pallet ? inventoryItems.filter(i => i.pallet_id === pallet.id) : [];
          const isSel = selSlotKey === key;
          const fifoRank = pallet ? fifoRanked.findIndex(p => p.id === pallet.id) : -1;
          let cls = pallet ? (fifoRank === 0 ? 'fifo1' : fifoRank === 1 ? 'fifo2' : fifoRank >= 2 ? 'fifon' : 'filled') : '';
          if (isSel) cls += ' selected';
          const label = pallet ? `${items.length}종` : '빈칸';
          const fifoLabel = fifoRank === 0 ? 'FIFO1' : fifoRank === 1 ? 'FIFO2' : fifoRank >= 2 ? 'FIFO' : '';
          html += `<button class="slot-btn ${cls}" onclick="selectSlot('${key}')">
            <span style="font-size:0.72rem;">K${g}</span>
            <span style="font-size:0.68rem;">${fifoLabel || label}</span>
          </button>`;
        }
        html += `</div></div>`;
      }
      document.getElementById('slotGrid').innerHTML = html;
      document.getElementById('slotDetailCard').style.display = 'block';

      if (selSlotKey && sched) {
        const [rId, fl, g] = selSlotKey.split('-').map(Number);
        const rk = racks.find(r => r.id === rId);
        const prod = products.find(p => p.id === sched.product_id);
        document.getElementById('actionInfo').textContent =
          `${prod.name} ${sched.quantity}개 → ${rk.rack_no}번 랙 ${fl}층 K${g} 슬롯에서 출고`;
        document.getElementById('actionCard').style.display = 'block';
      } else {
        document.getElementById('actionCard').style.display = 'none';
      }
    }

    function selectSlot(key) {
      selSlotKey = selSlotKey === key ? null : key;
      renderAll();
    }

    function executeOutbound() {
      if (!selSchedId || !selSlotKey) return;
      const sched = outboundSchedules.find(s => s.id === selSchedId);
      const prod = products.find(p => p.id === sched.product_id);
      alert(`✅ 출고 완료!\n${prod.name} ${sched.quantity}개 → ${selSlotKey} 위치에서 출고\n(데모: 실제 저장 없음)`);
      selSchedId = null; selRackId = null; selSlotKey = null;
      renderAll();
    }

    function renderAll() {
      renderWhTabs(); renderSchedList(); renderPlanSvg(); renderSlotDetail();
    }
    renderAll();
  </script>
</body>
</html>
