<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>출고 처리 - 창고 관리 시스템</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="data.js"></script>
  <script src="shared.js"></script>
  <style id="commonStyle"></style>
  <style>
    .wh-tab { padding: 7px 16px; border-radius: 6px; font-size: 0.875rem; cursor: pointer; border: 1px solid var(--border); transition: all 0.2s; background: var(--bg-surface); color: var(--text-secondary); }
    .wh-tab.active { background: var(--cyan); color: #000; font-weight: 600; border-color: var(--cyan); }
    .wh3d-container { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
    .wh3d-scroll { overflow-x: auto; }
    .wh3d-title { font-size: 0.875rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .wh3d-title .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--amber); box-shadow: 0 0 8px rgba(245,158,11,0.8); }
    .wh3d-scene { display: block; }
    .wh3d-grid { display: grid; gap: 8px; }
    /* 평면 카드 랙 */
    .rack-card { background: #080F1E; border: 1px solid #182D4A; border-radius: 8px; padding: 8px; cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s, background 0.2s; }
    .rack-card:hover { border-color: #2D5A8E; background: #0C1828; }
    .rack-card.selected { border-color: var(--cyan); box-shadow: 0 0 14px rgba(0,212,255,0.45); background: #071320; }
    .rack-card.has-product { border-color: var(--amber); box-shadow: 0 0 8px rgba(245,158,11,0.3); }
    .rack-card.selected.has-product { border-color: var(--cyan); box-shadow: 0 0 14px rgba(0,212,255,0.45); }
    .rack-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .rack-card-no { font-size: 0.72rem; font-weight: 700; color: var(--text-primary); font-family: 'JetBrains Mono', monospace; }
    .rack-card.selected .rack-card-no { color: var(--cyan); }
    .rack-card-lot { font-size: 0.68rem; font-weight: 600; color: #4ADE80; }
    .rack-card-lot.empty { color: #334155; }
    .rack-card-lot.has-target { color: var(--amber); }
    .rack-cell-grid { display: grid; gap: 2px; }
    .rc { border-radius: 2px; height: 9px; }
    .rc-empty { background: #0A1828; border: 1px solid rgba(30,58,95,0.45); }
    .rc-occupied { background: #152238; border: 1px solid rgba(30,58,95,0.6); }
    .rc-fifo1 { background: rgba(239,68,68,0.65); border: 1px solid rgba(239,68,68,0.95); }
    .rc-fifo2 { background: rgba(245,158,11,0.55); border: 1px solid rgba(245,158,11,0.85); }
    .rc-fifon { background: rgba(0,212,255,0.35); border: 1px solid rgba(0,212,255,0.65); }
    .rc-amber { background: rgba(245,158,11,0.2); border: 1px solid rgba(245,158,11,0.45); }
    @keyframes rack-pulse { 0%,100% { box-shadow: 0 0 14px rgba(0,212,255,0.9), 0 0 28px rgba(0,212,255,0.4); } 50% { box-shadow: 0 0 22px rgba(0,212,255,1.0), 0 0 44px rgba(0,212,255,0.6); } }
    @keyframes amber-pulse { 0%,100% { box-shadow: 0 0 8px rgba(245,158,11,0.5); } 50% { box-shadow: 0 0 16px rgba(245,158,11,0.9); } }
    .slot { width: 60px; height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; transition: all 0.2s; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
    .slot-empty { background: rgba(13,22,38,0.8); border-style: dashed; color: var(--text-secondary); }
    .slot-fifo-1 { background: rgba(239,68,68,0.25); border-color: var(--red); color: var(--red); box-shadow: 0 0 10px rgba(239,68,68,0.4); }
    .slot-fifo-2 { background: rgba(245,158,11,0.2); border-color: var(--amber); color: var(--amber); }
    .slot-fifo-n { background: rgba(0,212,255,0.1); border-color: rgba(0,212,255,0.4); color: rgba(0,212,255,0.8); }
    .slot-no-product { background: rgba(13,22,38,0.6); border-color: var(--border); color: var(--text-secondary); }
    .slot:hover { transform: scale(1.1); z-index: 5; }
    .floor-label { font-size: 0.75rem; color: var(--text-secondary); display: flex; align-items: center; padding-right: 8px; font-family: 'JetBrains Mono', monospace; }
    .fifo-legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="app-layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main-area">
      <div class="header-bar"><h1>출고 처리</h1></div>
      <div class="content-area">
        <div class="flex gap-2 mb-4" id="whTabs"></div>
        <div class="flex gap-5">
          <div style="width:200px;flex-shrink:0;">
            <div class="card">
              <h3 class="font-bold mb-3" style="font-size:0.9rem;">출고 예정 목록</h3>
              <div id="scheduleList" class="space-y-2"></div>
            </div>
          </div>
          <div class="flex-1">
            <div class="wh3d-container">
              <div class="wh3d-title"><div class="dot"></div><span id="whName">창고1</span> — 3D 랙 배치도 (FIFO)</div>
              <div class="wh3d-scroll"><div class="wh3d-scene"><div class="wh3d-grid" id="rackGrid"></div></div></div>
              <div class="fifo-legend">
                <div class="legend-item"><div class="rc rc-fifo1" style="width:14px;height:14px;display:inline-block;border-radius:2px;"></div>FIFO 1순위</div>
                <div class="legend-item"><div class="rc rc-fifo2" style="width:14px;height:14px;display:inline-block;border-radius:2px;"></div>FIFO 2순위</div>
                <div class="legend-item"><div class="rc rc-fifon" style="width:14px;height:14px;display:inline-block;border-radius:2px;"></div>FIFO 3순위+</div>
                <div class="legend-item"><div style="width:14px;height:14px;border:2px solid var(--amber);display:inline-block;border-radius:4px;"></div>대상상품 보유랙</div>
              </div>
            </div>
            <div id="slotDetail" style="display:none;" class="card"></div>
            <div id="fifoPreview" style="display:none;" class="card mt-4"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('commonStyle').textContent = getCommonStyles();
    requireAuth();
    renderLayout('outbound-execute');

    let selectedWarehouse = 1;
    let selectedScheduleId = null;
    let selectedRackId = null;

    function renderWhTabs() {
      document.getElementById('whTabs').innerHTML = warehouses.map(w =>
        `<button class="wh-tab ${w.id === selectedWarehouse ? 'active' : ''}" onclick="selectWarehouse(${w.id})">${w.name}</button>`
      ).join('');
      document.getElementById('whName').textContent = warehouses.find(w => w.id === selectedWarehouse).name;
    }

    function selectWarehouse(id) {
      selectedWarehouse = id;
      selectedRackId = null;
      renderWhTabs();
      render3DRacks();
      document.getElementById('slotDetail').style.display = 'none';
    }

    function renderScheduleList() {
      const pending = outboundSchedules.filter(s => s.status === 'pending');
      document.getElementById('scheduleList').innerHTML = pending.map(s => {
        const p = products.find(pr => pr.id === s.product_id);
        const isSelected = s.id === selectedScheduleId;
        return `
          <div onclick="selectSchedule(${s.id})" style="
            background:${isSelected ? 'var(--amber-dim)' : 'var(--bg-hover)'};
            color:${isSelected ? 'var(--amber)' : 'var(--text-secondary)'};
            border-left:3px solid ${isSelected ? 'var(--amber)' : 'transparent'};
            padding:10px;border-radius:6px;cursor:pointer;transition:all 0.15s;">
            <div style="font-weight:600;font-size:0.875rem;">${p.name}</div>
            <div style="font-size:0.75rem;">${s.quantity}개 · ${s.scheduled_date}</div>
            ${s.note ? `<div style="font-size:0.7rem;color:var(--red);">${s.note}</div>` : ''}
          </div>
        `;
      }).join('');
    }

    function selectSchedule(id) {
      selectedScheduleId = id;
      selectedRackId = null;
      renderScheduleList();
      render3DRacks();
      renderFifoPreview();
      document.getElementById('slotDetail').style.display = 'none';
    }

    function render3DRacks() {
      const whRacks = racks.filter(r => r.warehouse_id === selectedWarehouse);
      const cols = selectedWarehouse === 3 ? 6 : 3;
      const grid = document.getElementById('rackGrid');
      grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

      const schedule = selectedScheduleId ? outboundSchedules.find(s => s.id === selectedScheduleId) : null;
      const fifoItems = schedule
        ? inventoryItems.filter(i => i.product_id === schedule.product_id)
            .sort((a,b) => new Date(a.received_at)-new Date(b.received_at))
        : [];

      grid.innerHTML = whRacks.map(rack => {
        const isSelected = rack.id === selectedRackId;
        const palletsInRack = pallets.filter(p => parseInt(p.location.split('-')[0]) === rack.id);
        const hasProduct = schedule && palletsInRack.some(p =>
          inventoryItems.some(i => i.pallet_id === p.id && i.product_id === schedule.product_id)
        );

        let cells = '';
        for (let floor = rack.floors; floor >= 1; floor--) {
          for (let grp = 1; grp <= rack.groups; grp++) {
            const slotKey = `${rack.id}-${floor}-${grp}`;
            const pallet = pallets.find(p => p.location === slotKey);
            let rcClass = 'rc-empty';
            if (pallet) {
              if (schedule) {
                const targetItem = inventoryItems.find(i => i.pallet_id === pallet.id && i.product_id === schedule.product_id);
                if (targetItem) {
                  const fifoIdx = fifoItems.findIndex(i => i.id === targetItem.id);
                  if (fifoIdx === 0) rcClass = 'rc-fifo1';
                  else if (fifoIdx === 1) rcClass = 'rc-fifo2';
                  else rcClass = 'rc-fifon';
                } else {
                  rcClass = 'rc-occupied';
                }
              } else {
                rcClass = hasProduct ? 'rc-amber' : 'rc-occupied';
              }
            }
            cells += `<div class="rc ${rcClass}" title="${floor}층 ${grp}그룹"></div>`;
          }
        }

        const targetCount = schedule
          ? palletsInRack.filter(p => inventoryItems.some(i => i.pallet_id === p.id && i.product_id === schedule.product_id)).length
          : 0;
        const filledCount = palletsInRack.length;
        let lotLabel;
        if (schedule && hasProduct) {
          lotLabel = `<span class="rack-card-lot has-target">${targetCount}Lot</span>`;
        } else if (filledCount > 0) {
          lotLabel = `<span class="rack-card-lot">${filledCount}Lot</span>`;
        } else {
          lotLabel = `<span class="rack-card-lot empty">빈칸</span>`;
        }

        const cardCls = ['rack-card', isSelected ? 'selected' : '', hasProduct ? 'has-product' : ''].filter(Boolean).join(' ');

        return `<div class="${cardCls}" onclick="selectRack(${rack.id})" title="${rack.rack_no}번 랙 | ${rack.floors}층×${rack.groups}그룹${hasProduct ? ' | 출고 대상 재고' : ''}">
          <div class="rack-card-header">
            <span class="rack-card-no">${rack.rack_no}번</span>
            ${lotLabel}
          </div>
          <div class="rack-cell-grid" style="grid-template-columns:repeat(${rack.groups},1fr);">${cells}</div>
        </div>`;
      }).join('');
    }

    function selectRack(rackId) {
      selectedRackId = selectedRackId === rackId ? null : rackId;
      render3DRacks();
      if (selectedRackId) renderSlotDetail();
      else document.getElementById('slotDetail').style.display = 'none';
    }

    function renderSlotDetail() {
      const rack = racks.find(r => r.id === selectedRackId);
      if (!rack) return;

      const schedule = selectedScheduleId ? outboundSchedules.find(s => s.id === selectedScheduleId) : null;
      const sortedItems = schedule
        ? inventoryItems.filter(i => i.product_id === schedule.product_id).sort((a,b) => new Date(a.received_at)-new Date(b.received_at))
        : [];

      let html = `<h4 class="font-bold mb-3">${rack.rack_no}번 랙 — FIFO 슬롯 현황</h4>`;
      for (let floor = rack.floors; floor >= 1; floor--) {
        html += `<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">`;
        html += `<div class="floor-label">${floor}F</div><div style="display:flex;gap:6px;">`;
        for (let grp = 1; grp <= rack.groups; grp++) {
          const slotKey = `${rack.id}-${floor}-${grp}`;
          const pallet = pallets.find(p => p.location === slotKey);
          if (!pallet) {
            html += `<div class="slot slot-empty"><span style="font-size:9px;">빈칸</span></div>`;
            continue;
          }
          const items = inventoryItems.filter(i => i.pallet_id === pallet.id);
          if (!schedule) {
            const totalQty = items.reduce((s,i)=>s+i.quantity,0);
            html += `<div class="slot slot-fifo-n" title="${slotKey}"><span>${items.length}종</span><span style="font-size:9px;">${totalQty}개</span></div>`;
            continue;
          }
          const targetItem = items.find(i => i.product_id === schedule.product_id);
          if (!targetItem) {
            html += `<div class="slot slot-no-product" title="${slotKey}"><span style="font-size:9px;">無</span></div>`;
            continue;
          }
          const fifoIdx = sortedItems.findIndex(i => i.id === targetItem.id);
          let cls = 'slot-fifo-n';
          if (fifoIdx === 0) cls = 'slot-fifo-1';
          else if (fifoIdx === 1) cls = 'slot-fifo-2';
          html += `<div class="slot ${cls}" title="${slotKey} | ${targetItem.received_at}">
            <span style="font-weight:700;">${fifoIdx+1}</span>
            <span style="font-size:9px;">${targetItem.quantity}개</span>
          </div>`;
        }
        html += `</div></div>`;
      }

      const detail = document.getElementById('slotDetail');
      detail.innerHTML = html;
      detail.style.display = 'block';
    }

    function renderFifoPreview() {
      if (!selectedScheduleId) return;
      const schedule = outboundSchedules.find(s => s.id === selectedScheduleId);
      const product = products.find(p => p.id === schedule.product_id);
      const sorted = inventoryItems.filter(i => i.product_id === schedule.product_id)
        .sort((a,b) => new Date(a.received_at)-new Date(b.received_at));

      let remaining = schedule.quantity;
      let rows = '';
      sorted.forEach((item, idx) => {
        if (remaining <= 0) return;
        const qty = Math.min(item.quantity, remaining);
        const pallet = pallets.find(p => p.id === item.pallet_id);
        rows += `<tr>
          <td><span class="badge" style="background:var(--amber-dim);color:var(--amber);">${idx+1}</span></td>
          <td style="font-family:'JetBrains Mono',monospace;font-size:0.8rem;">${pallet ? pallet.location : '-'}</td>
          <td>${item.received_at}</td>
          <td>${qty}개</td>
        </tr>`;
        remaining -= qty;
      });

      const preview = document.getElementById('fifoPreview');
      preview.innerHTML = `
        <h4 class="font-bold mb-3">FIFO 출고 예상 — ${product.name} ${schedule.quantity}개</h4>
        <table>
          <thead><tr><th>순서</th><th>위치</th><th>입고일</th><th>출고량</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <button class="btn-success mt-4" onclick="executeOutbound()">출고 실행</button>
      `;
      preview.style.display = 'block';
    }

    function executeOutbound() {
      const schedule = outboundSchedules.find(s => s.id === selectedScheduleId);
      const product = products.find(p => p.id === schedule.product_id);
      alert(`✅ 출고 완료!\n${product.name} ${schedule.quantity}개 FIFO 출고 처리되었습니다.\n(데모: 실제 저장 없음)`);
      selectedScheduleId = null;
      selectedRackId = null;
      renderScheduleList();
      render3DRacks();
      document.getElementById('slotDetail').style.display = 'none';
      document.getElementById('fifoPreview').style.display = 'none';
    }

    renderWhTabs();
    renderScheduleList();
    render3DRacks();
  </script>
</body>
</html>
